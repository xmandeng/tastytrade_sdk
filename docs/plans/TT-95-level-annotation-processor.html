        title: "Context & Problem",
        content: `The live charting module (TT-94) needs horizontal price level annotations — prior day close/high/low and 5/15/30-min opening ranges. These annotations already have a fully built persistence model (\`HorizontalLine\` extends \`BaseAnnotation\` extends \`BaseEvent\`), but **no automated process creates them**.

Today they're only created manually in the chart playground notebook for in-memory Plotly rendering. The InfluxDB persistence code in the notebook is commented out.

### What Exists

- **\`HorizontalLine\` model** — \`src/tastytrade/analytics/visualizations/models.py\`. Extends \`BaseEvent\`, compatible with dual pipeline (Redis + InfluxDB)
- **\`get_daily_candle()\`** — \`src/tastytrade/providers/market.py\`. Queries InfluxDB for prior day OHLC
- **\`get_opening_range()\`** — \`src/tastytrade/analytics/visualizations/utils.py\`. Queries InfluxDB for OR high/low
- **\`TelegrafHTTPEventProcessor\`** — writes any \`BaseEvent\` to InfluxDB
- **\`RedisEventProcessor\`** — publishes any \`BaseEvent\` to Redis pub/sub
- **Processor pattern** — \`EventHandler.add_processor()\` in subscription orchestrator

### What's Missing

A processor that creates \`HorizontalLine\` events and emits them through the existing pipeline.

### Architectural Rule

> **Live feeds → Redis pub/sub. Historical queries → InfluxDB.** Annotations follow the same dual-write pattern as candles.`

        content: `\`LevelAnnotationProcessor\` plugs into the candle event handler alongside existing processors:

\`\`\`
DXLink → EventHandler → [RedisEventProcessor, TelegrafHTTPProcessor, LevelAnnotationProcessor]

### Interface

It implements the same processor protocol as \`RedisEventProcessor\`:

\`\`\`python
class LevelAnnotationProcessor:
    async def process_event(self, event: BaseEvent) -> None:
        if not isinstance(event, CandleEvent):

        # Track state, emit annotations at time boundaries
\`\`\`

### State Machine

The processor tracks per-symbol state for the current trading day:

\`\`\`python
@dataclass
class SymbolDayState:
    date: date
    prior_day_emitted: bool = False
    or_5m_high: float | None = None
    or_5m_low: float | None = None
    or_5m_locked: bool = False
    or_15m_high: float | None = None
    or_15m_low: float | None = None
    or_15m_locked: bool = False
    or_30m_high: float | None = None
    or_30m_low: float | None = None
    or_30m_locked: bool = False
\`\`\`

### Key Behaviors

- **First candle of the day:** Query prior day candle, emit 3 \`HorizontalLine\` events (close, high, low)
- **Candles 9:30-9:35:** Update \`or_5m_high/low\` running max/min
- **First candle after 9:35:** Lock 5m OR, emit 2 \`HorizontalLine\` events
- **Same pattern** for 15m (9:45) and 30m (10:00)
- **After 10:00:** All levels locked, processor becomes a no-op for that symbol/day
- **Day rollover:** Reset state when date changes`

      {
        id: "pipeline",
        title: "Pipeline Integration",
        content: `### How Annotations Flow

When \`LevelAnnotationProcessor\` emits a \`HorizontalLine\`, it doesn't write directly to InfluxDB or Redis. It **returns the event** (or emits via a callback/queue) so the \`EventHandler\` can route it through the standard processor chain:

\`\`\`
LevelAnnotationProcessor creates HorizontalLine
         ↓
EventHandler routes to all processors:
    → RedisEventProcessor: publishes to market:HorizontalLine:{symbol}
    → TelegrafHTTPEventProcessor: writes to InfluxDB
\`\`\`

### Design Question: Emission Pattern

The current processor protocol is \`process_event(event) -> None\`. Processors consume events, they don't emit new ones. We need a pattern for a processor that **creates** events. Options:

**A. Direct write** — Processor holds references to Redis and InfluxDB, writes directly. Simplest, but breaks the single-responsibility pattern.

**B. Event queue** — Processor pushes new events to an output queue. The orchestrator drains this queue and routes events back through the handler. Clean, but requires new plumbing.

**C. Callback** — Processor receives a \`publish\` callback at construction time. Calls it with new events. Lightweight, but we avoid callbacks in this codebase.

**D. Emit via the handler** — Processor holds a reference to the \`EventHandler\` and calls \`handler.handle_events([annotation])\`. This routes through all processors naturally. Risk: infinite loop if LevelAnnotationProcessor receives its own output. Mitigated by the \`isinstance(event, CandleEvent)\` guard.

### Recommendation

**Option D** is the most consistent with existing patterns. The guard clause (\`if not isinstance(event, CandleEvent): return\`) prevents recursion. The annotation flows through the exact same pipeline as any other event — Redis pub/sub + InfluxDB.

    handler=candle_handler,  # for re-emitting annotations
    timezone="America/New_York",
)
candle_handler.add_processor(level_processor)
\`\`\``

        id: "idempotency",
        title: "Idempotency & Restarts",
        content: `### Problem

If the subscription service restarts mid-day, the processor loses its in-memory state. It might re-emit annotations that were already written.

### Solution

\`BaseAnnotation\` already includes deterministic microsecond jitter derived from SHA-256 hash of the label. This ensures:
- Same label + same symbol + same time → same jitter → same InfluxDB point
- InfluxDB deduplication merges identical points (same measurement, tags, timestamp, fields)
- Redis pub/sub will re-publish, but consumers should handle duplicate price lines idempotently (update existing line if same label)

### Restart Recovery

On startup, the processor checks what's already been written for today:

1. Query InfluxDB for \`HorizontalLine\` annotations with today's date and matching symbol
2. If prior day levels exist → set \`prior_day_emitted = True\`
3. If OR levels exist → set corresponding \`locked = True\`
4. Resume tracking only the OR windows that haven't locked yet

This prevents duplicate writes AND ensures the processor picks up where it left off if restarted at, say, 9:40 AM (prior day + 5m OR already done, still tracking 15m and 30m).`

\`HullMacdEngine\` could use prior day levels as signal filters (e.g., "don't signal long below prior low"). Now that these levels are in InfluxDB, any engine can query them.

### Backtesting

\`ReplayEngine\` can query historical annotations to render accurate levels when replaying past trading days.

### Notebooks

Notebooks can query persisted annotations instead of computing them manually. The commented-out persistence code in the chart notebook becomes the read path instead.`

    const priorApprovals = {};

    const PLAN_NAME = "TT-95: LevelAnnotationProcessor";

    const STORAGE_KEY = 'review-state:' + PLAN_NAME;
    const LAYOUT_KEY = 'review-layout:' + PLAN_NAME;

    function saveToStorage() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ sections: state.sections.map(s => ({ id: s.id, status: s.status, comment: s.comment })), activeSection: state.activeSection, activeFilter: state.activeFilter })); } catch (e) { } }
    function loadFromStorage() { try { const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return; const data = JSON.parse(raw); (data.sections || []).forEach(saved => { const s = state.sections.find(s => s.id === saved.id); if (s) { s.status = saved.status || 'pending'; s.comment = saved.comment || ''; } }); if (data.activeSection) state.activeSection = data.activeSection; if (data.activeFilter) state.activeFilter = data.activeFilter; } catch (e) { } }

    const state = { sections: docSections.map(s => ({ ...s, status: priorApprovals[s.id] || 'pending', comment: '' })), activeSection: docSections[0]?.id || '', activeFilter: 'all' };

    function renderMarkdown(text) { let html = ''; const lines = text.split('\n'); let inCode = false; let codeLines = []; let inList = false; let listTag = 'ul'; let inTable = false; let tableRows = []; for (let i = 0; i < lines.length; i++) { const line = lines[i]; if (line.trim().startsWith('```')) { if (inCode) { html += '<pre><code>' + codeLines.join('\n').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>'; codeLines = []; inCode = false; } else { if (inList) { html += `</${listTag}>`; inList = false; } if (inTable) { html += renderTable(tableRows); inTable = false; tableRows = []; } inCode = true; } continue; } if (inCode) { codeLines.push(line); continue; } if (line.trim().startsWith('|')) { if (inList) { html += `</${listTag}>`; inList = false; } if (!inTable) inTable = true; if (!line.trim().match(/^\|[\s-|]+\|$/)) { tableRows.push(line); } continue; } else if (inTable) { html += renderTable(tableRows); inTable = false; tableRows = []; } if (line.trim() === '') { if (inList) { html += `</${listTag}>`; inList = false; } continue; } if (line.startsWith('### ')) { if (inList) { html += `</${listTag}>`; inList = false; } html += '<h4 style="font-size:14px;font-weight:600;color:var(--text);margin:16px 0 8px">' + inlineFormat(line.slice(4)) + '</h4>'; continue; } if (line.trim().startsWith('- ') || line.trim().startsWith('* ')) { if (!inList) { listTag = 'ul'; html += '<ul>'; inList = true; } html += '<li>' + inlineFormat(line.trim().slice(2)) + '</li>'; continue; } if (line.trim().match(/^\d+\.\s/)) { if (!inList) { listTag = 'ol'; html += '<ol>'; inList = true; } html += '<li>' + inlineFormat(line.trim().replace(/^\d+\.\s/, '')) + '</li>'; continue; } if (inList) { html += `</${listTag}>`; inList = false; } html += '<p>' + inlineFormat(line) + '</p>'; } if (inCode) html += '<pre><code>' + codeLines.join('\n').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>'; if (inList) html += `</${listTag}>`; if (inTable) html += renderTable(tableRows); return html; }
    function renderTable(rows) { if (rows.length === 0) return ''; let html = '<table>'; rows.forEach((row, idx) => { const cells = row.split('|').filter(c => c.trim() !== ''); const tag = idx === 0 ? 'th' : 'td'; html += '<tr>' + cells.map(c => `<${tag}>${inlineFormat(c.trim())}</${tag}>`).join('') + '</tr>'; }); html += '</table>'; return html; }
    function inlineFormat(text) { return text.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent);text-decoration:none">$1</a>'); }
    function renderNav() { const nav = document.getElementById('nav'); nav.innerHTML = state.sections.map(s => { const icon = s.status === 'approved' ? '<span style="color:var(--green)">&#10003;</span>' : s.status === 'revision' ? '<span style="color:var(--red)">&#9998;</span>' : s.status === 'question' ? '<span style="color:var(--purple)">?</span>' : '<span style="color:var(--text-dim)">&bull;</span>'; return `<div class="nav-item ${s.id === state.activeSection ? 'active' : ''}" onclick="navigateTo('${s.id}')"><span class="status-icon">${icon}</span><span class="label">${s.title}</span></div>`; }).join(''); }
    function renderDoc() { const panel = document.getElementById('docPanel'); panel.innerHTML = state.sections.map(s => { const borderColor = s.status === 'approved' ? 'var(--green)' : s.status === 'revision' ? 'var(--red)' : s.status === 'question' ? 'var(--purple)' : 'transparent'; const bgColor = s.status === 'approved' ? 'var(--green-bg)' : s.status === 'revision' ? 'var(--red-bg)' : s.status === 'question' ? 'rgba(188,140,255,0.06)' : 'transparent'; return `<div class="section" id="section-${s.id}" style="border-left: 3px solid ${borderColor}; background: ${bgColor};"><div class="section-header"><h2>${s.title}</h2></div><div class="section-content">${renderMarkdown(s.content)}</div><div class="review-bar"><button class="review-btn ${s.status === 'approved' ? 'active-approved' : ''}" onclick="setStatus('${s.id}','approved')">Approve</button><button class="review-btn ${s.status === 'revision' ? 'active-revision' : ''}" onclick="setStatus('${s.id}','revision')">Needs Revision</button><button class="review-btn ${s.status === 'question' ? 'active-question' : ''}" onclick="setStatus('${s.id}','question')">Question</button><button class="review-btn" onclick="toggleComment('${s.id}')" style="margin-left:auto">Comment</button></div><div class="comment-area" id="comment-${s.id}">${s.comment ? `<div class="existing-comment">${s.comment.replace(/</g, '&lt;').replace(/\n/g, '<br>')}<button class="edit-btn" onclick="editComment('${s.id}')">edit</button></div>` : `<textarea placeholder="Add your feedback..." onblur="saveComment('${s.id}', this.value)" id="textarea-${s.id}"></textarea>`}</div></div>`; }).join(''); }
    function renderStats() { const counts = { pending: 0, approved: 0, revision: 0, question: 0 }; state.sections.forEach(s => counts[s.status]++); document.getElementById('stats').innerHTML = `<div class="stat"><div class="dot dot-pending"></div>${counts.pending} Pending</div><div class="stat"><div class="dot dot-approved"></div>${counts.approved} Approved</div><div class="stat"><div class="dot dot-revision"></div>${counts.revision} Needs Revision</div><div class="stat"><div class="dot dot-question"></div>${counts.question} Questions</div>`; }
    function renderFeedback() { const list = document.getElementById('feedbackList'); const filtered = state.sections.filter(s => { if (state.activeFilter === 'all') return s.status !== 'pending'; return s.status === state.activeFilter; }); const count = state.sections.filter(s => s.status !== 'pending').length; document.getElementById('feedbackCount').textContent = count > 0 ? `${count} reviewed` : ''; if (filtered.length === 0) { list.innerHTML = `<div class="prompt-placeholder">${state.activeFilter === 'all' ? 'Review sections to see feedback here.' : 'No sections with this status.'}</div>`; return; } list.innerHTML = filtered.map(s => `<div class="feedback-item" onclick="navigateTo('${s.id}')" style="cursor:pointer"><div class="fb-section"><span class="fb-status ${s.status}">${s.status === 'approved' ? 'APPROVED' : s.status === 'revision' ? 'REVISION' : 'QUESTION'}</span>${s.title}</div>${s.comment ? `<div class="fb-comment">"${s.comment}"</div>` : ''}</div>`).join(''); }
    function navigateTo(id) { state.activeSection = id; saveToStorage(); renderNav(); document.getElementById('section-' + id).scrollIntoView({ behavior: 'smooth', block: 'start' }); }
    function setStatus(id, status) { const section = state.sections.find(s => s.id === id); if (section.status === status) section.status = 'pending'; else { section.status = status; if (status === 'revision' || status === 'question') setTimeout(() => { const area = document.getElementById('comment-' + id); if (area) area.classList.add('visible'); }, 50); } renderAll(); saveToStorage(); }
    function toggleComment(id) { const area = document.getElementById('comment-' + id); area.classList.toggle('visible'); if (area.classList.contains('visible')) { const ta = document.getElementById('textarea-' + id); if (ta) ta.focus(); } }
    function saveComment(id, value) { const section = state.sections.find(s => s.id === id); section.comment = value.trim(); renderAll(); saveToStorage(); }
    function editComment(id) { const section = state.sections.find(s => s.id === id); const area = document.getElementById('comment-' + id); area.innerHTML = `<textarea placeholder="Edit..." onblur="saveComment('${id}', this.value)" id="textarea-${id}">${section.comment}</textarea>`; area.classList.add('visible'); document.getElementById('textarea-' + id).focus(); }
    function generatePrompt() { const approved = state.sections.filter(s => s.status === 'approved'); const revision = state.sections.filter(s => s.status === 'revision'); const questions = state.sections.filter(s => s.status === 'question'); if (approved.length === 0 && revision.length === 0 && questions.length === 0) return ''; let prompt = `Here is my review of the ${PLAN_NAME} plan:\n\n`; if (approved.length > 0) { prompt += `## Approved Sections (${approved.length}/${state.sections.length})\n`; approved.forEach(s => { prompt += `- **${s.title}**: Approved`; if (s.comment) prompt += ` — ${s.comment}`; prompt += '\n'; }); prompt += '\n'; } if (revision.length > 0) { prompt += `## Needs Revision (${revision.length})\n`; revision.forEach(s => { prompt += `- **${s.title}**`; if (s.comment) prompt += `: ${s.comment}`; else prompt += ': (no specific feedback)'; prompt += '\n'; }); prompt += '\n'; } if (questions.length > 0) { prompt += `## Questions (${questions.length})\n`; questions.forEach(s => { prompt += `- **${s.title}**`; if (s.comment) prompt += `: ${s.comment}`; else prompt += ': (question not specified)'; prompt += '\n'; }); prompt += '\n'; } const remaining = state.sections.filter(s => s.status === 'pending'); if (remaining.length > 0) { prompt += `## Not Yet Reviewed (${remaining.length})\n`; remaining.forEach(s => prompt += `- ${s.title}\n`); } return prompt; }
    function copyPrompt() { const prompt = generatePrompt(); if (!prompt) return; const btn = document.getElementById('copyBtn'); function fallbackCopy(text) { const ta = document.createElement('textarea'); ta.value = text; ta.setAttribute('readonly', ''); ta.style.cssText = 'position:fixed;left:0;top:0;opacity:0;'; document.body.appendChild(ta); ta.focus(); ta.setSelectionRange(0, text.length); let ok = false; try { ok = document.execCommand('copy'); } catch (e) { } document.body.removeChild(ta); return ok; } function onSuccess() { btn.textContent = 'Copied!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = 'Copy Feedback as Prompt'; btn.classList.remove('copied'); }, 2000); } function showModal() { const overlay = document.createElement('div'); overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;'; overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); }; const box = document.createElement('div'); box.style.cssText = 'background:var(--bg-surface);border:1px solid var(--border);border-radius:10px;padding:16px;max-width:600px;width:100%;max-height:80vh;display:flex;flex-direction:column;'; box.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><span style="font-size:13px;font-weight:600;">Select All & Copy</span><button onclick="this.closest('div[style*=fixed]').remove()" style="background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;">&times;</button></div><textarea readonly style="flex:1;min-height:300px;background:var(--bg-surface-2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:12px;font-family:monospace;font-size:12px;resize:none;">${prompt.replace(/</g, '&lt;')}</textarea>`; overlay.appendChild(box); document.body.appendChild(overlay); box.querySelector('textarea').focus(); box.querySelector('textarea').setSelectionRange(0, prompt.length); } if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(prompt).then(onSuccess).catch(() => { if (fallbackCopy(prompt)) onSuccess(); else showModal(); }); } else { if (fallbackCopy(prompt)) onSuccess(); else showModal(); } }
    document.getElementById('filterTabs').addEventListener('click', e => { const tab = e.target.closest('.filter-tab'); if (!tab) return; state.activeFilter = tab.dataset.filter; document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active')); tab.classList.add('active'); renderFeedback(); saveToStorage(); });
    function renderAll() { renderNav(); renderDoc(); renderStats(); renderFeedback(); }

    (function () { const nav = document.getElementById('nav'); const rightPanel = document.getElementById('rightPanel'); const leftHandle = document.getElementById('leftHandle'); const rightHandle = document.getElementById('rightHandle'); const leftToggle = document.getElementById('leftToggle'); const rightToggle = document.getElementById('rightToggle'); let dragging = null; let navWidth = 240; let rightWidth = 360; const savedLayout = (() => { try { return JSON.parse(localStorage.getItem(LAYOUT_KEY) || '{}'); } catch (e) { return {}; } })(); if (savedLayout.navWidth) navWidth = savedLayout.navWidth; if (savedLayout.rightWidth) rightWidth = savedLayout.rightWidth; if (savedLayout.navCollapsed) nav.classList.add('collapsed'); else nav.style.width = navWidth + 'px'; if (savedLayout.rightCollapsed) rightPanel.classList.add('collapsed'); else rightPanel.style.width = rightWidth + 'px'; function saveLayout() { try { localStorage.setItem(LAYOUT_KEY, JSON.stringify({ navWidth, rightWidth, navCollapsed: nav.classList.contains('collapsed'), rightCollapsed: rightPanel.classList.contains('collapsed') })); } catch (e) { } } function updateToggles() { leftToggle.classList.toggle('panel-collapsed', nav.classList.contains('collapsed')); rightToggle.classList.toggle('panel-collapsed', rightPanel.classList.contains('collapsed')); } function toggleNav(e) { e.preventDefault(); e.stopPropagation(); if (nav.classList.contains('collapsed')) { nav.classList.remove('collapsed'); nav.style.width = navWidth + 'px'; } else { navWidth = nav.offsetWidth; nav.classList.add('collapsed'); } updateToggles(); saveLayout(); } function toggleRight(e) { e.preventDefault(); e.stopPropagation(); if (rightPanel.classList.contains('collapsed')) { rightPanel.classList.remove('collapsed'); rightPanel.style.width = rightWidth + 'px'; } else { rightWidth = rightPanel.offsetWidth; rightPanel.classList.add('collapsed'); } updateToggles(); saveLayout(); } let tfl = false, tfr = false; leftToggle.addEventListener('touchend', e => { tfl = true; toggleNav(e); }, { passive: false }); leftToggle.addEventListener('click', e => { if (tfl) { tfl = false; return; } toggleNav(e); }); rightToggle.addEventListener('touchend', e => { tfr = true; toggleRight(e); }, { passive: false }); rightToggle.addEventListener('click', e => { if (tfr) { tfr = false; return; } toggleRight(e); }); updateToggles(); function onDragStart(e, side) { e.preventDefault(); dragging = side; document.body.classList.add('resizing'); (side === 'left' ? leftHandle : rightHandle).classList.add('dragging'); } leftHandle.addEventListener('mousedown', e => onDragStart(e, 'left')); rightHandle.addEventListener('mousedown', e => onDragStart(e, 'right')); document.addEventListener('mousemove', e => { if (!dragging) return; applyDrag(e.clientX); }); document.addEventListener('mouseup', endDrag); leftHandle.addEventListener('touchstart', e => { e.preventDefault(); onDragStart(e, 'left'); }, { passive: false }); rightHandle.addEventListener('touchstart', e => { e.preventDefault(); onDragStart(e, 'right'); }, { passive: false }); document.addEventListener('touchmove', e => { if (!dragging) return; e.preventDefault(); applyDrag(e.touches[0].clientX); }, { passive: false }); document.addEventListener('touchend', endDrag); function applyDrag(clientX) { if (dragging === 'left') { const w = Math.max(140, Math.min(400, clientX)); nav.classList.remove('collapsed'); nav.style.width = w + 'px'; navWidth = w; } else { const w = Math.max(200, Math.min(600, window.innerWidth - clientX)); rightPanel.classList.remove('collapsed'); rightPanel.style.width = w + 'px'; rightWidth = w; } updateToggles(); } function endDrag() { if (!dragging) return; document.body.classList.remove('resizing'); leftHandle.classList.remove('dragging'); rightHandle.classList.remove('dragging'); dragging = null; saveLayout(); } })();

    loadFromStorage();
    document.querySelectorAll('.filter-tab').forEach(t => { t.classList.toggle('active', t.dataset.filter === state.activeFilter); });
    renderAll();
  </script>
</body>
