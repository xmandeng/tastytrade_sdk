<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plan Review: Phase 2 — 0DTE Strategy Paper Trading</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0d1117;
      --bg-surface: #161b22;
      --bg-surface-2: #1c2128;
      --bg-hover: #21262d;
      --border: #30363d;
      --border-light: #484f58;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --text-dim: #6e7681;
      --accent: #58a6ff;
      --green: #3fb950;
      --green-bg: rgba(63, 185, 80, 0.10);
      --amber: #d29922;
      --amber-bg: rgba(210, 153, 34, 0.10);
      --red: #f85149;
      --red-bg: rgba(248, 81, 73, 0.08);
      --purple: #bc8cff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      height: 52px;
    }

    .topbar h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .topbar .stats {
      display: flex;
      gap: 16px;
      font-size: 12px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .dot-pending {
      background: var(--amber);
    }

    .dot-approved {
      background: var(--green);
    }

    .dot-revision {
      background: var(--red);
    }

    .dot-question {
      background: var(--purple);
    }

    /* Main layout */
    .main {
      display: flex;
      height: calc(100vh - 52px);
    }

    /* Resize handles */
    .resize-handle {
      width: 1px;
      cursor: col-resize;
      background: var(--border);
      position: relative;
      flex-shrink: 0;
      z-index: 10;
      overflow: visible;
    }

    .resize-handle:hover,
    .resize-handle.dragging {
      background: var(--accent);
      width: 3px;
    }

    body.resizing {
      cursor: col-resize;
      user-select: none;
    }

    /* Topbar collapse toggle buttons */
    .topbar-toggles {
      display: flex;
      gap: 6px;
    }

    .collapse-toggle {
      width: 36px;
      height: 32px;
      background: var(--bg-surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }

    @media (hover: hover) {
      .collapse-toggle:hover {
        background: var(--bg-hover);
        color: var(--text);
        border-color: var(--accent);
      }
    }

    .collapse-toggle.panel-collapsed {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    /* Collapsed panel states */
    .nav.collapsed {
      width: 0 !important;
      min-width: 0 !important;
      padding: 0 !important;
      overflow: hidden;
    }

    .right-panel.collapsed {
      width: 0 !important;
      min-width: 0 !important;
      overflow: hidden;
    }

    .right-panel.collapsed>* {
      display: none;
    }

    .nav.collapsed>* {
      display: none;
    }

    .nav,
    .right-panel {
      transition: width 0.2s ease, min-width 0.2s ease, padding 0.2s ease;
    }

    /* Section nav */
    .nav {
      width: 240px;
      min-width: 140px;
      background: var(--bg-surface);
      overflow-y: auto;
      padding: 12px 0;
    }

    .nav-item {
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-item:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    .nav-item.active {
      background: var(--bg-hover);
      border-left-color: var(--accent);
      color: var(--text);
    }

    .nav-item .status-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    .nav-item .label {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-divider {
      height: 1px;
      background: var(--border);
      margin: 8px 16px;
    }

    .nav-group-label {
      padding: 8px 16px 4px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* Document panel */
    .doc-panel {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      min-width: 0;
    }

    .doc-panel::-webkit-scrollbar {
      width: 8px;
    }

    .doc-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    .doc-panel::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    /* Section rendering */
    .section {
      margin-bottom: 16px;
      scroll-margin-top: 20px;
      padding: 16px 16px 10px;
      border-radius: 6px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .section-header h2 {
      font-size: 18px;
      font-weight: 600;
      flex: 1;
    }

    .section-header h3 {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
    }

    .section-content {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-muted);
    }

    .section-content p {
      margin-bottom: 12px;
    }

    .section-content strong {
      color: var(--text);
      font-weight: 600;
    }

    .section-content code {
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 12px;
      background: var(--bg-surface-2);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent);
    }

    .section-content pre {
      background: var(--bg-surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      margin: 12px 0;
      overflow-x: auto;
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.5;
      color: var(--text-muted);
    }

    .section-content pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    .section-content ul,
    .section-content ol {
      margin: 8px 0 12px 24px;
    }

    .section-content li {
      margin-bottom: 4px;
    }

    .section-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      font-size: 13px;
    }

    .section-content th,
    .section-content td {
      text-align: left;
      padding: 8px 12px;
      border: 1px solid var(--border);
    }

    .section-content th {
      background: var(--bg-surface-2);
      color: var(--text);
      font-weight: 600;
    }

    .section-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    /* Review actions */
    .review-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .review-btn {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      background: var(--bg-surface);
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .review-btn:hover {
      border-color: var(--border-light);
      color: var(--text);
    }

    .review-btn.active-approved {
      background: var(--green-bg);
      border-color: var(--green);
      color: var(--green);
    }

    .review-btn.active-revision {
      background: var(--red-bg);
      border-color: var(--red);
      color: var(--red);
    }

    .review-btn.active-question {
      background: rgba(188, 140, 255, 0.10);
      border-color: var(--purple);
      color: var(--purple);
    }

    .comment-area {
      margin-top: 10px;
      display: none;
    }

    .comment-area.visible {
      display: block;
    }

    .comment-area textarea {
      width: 100%;
      background: var(--bg-surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 10px;
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
      min-height: 60px;
      outline: none;
      margin-bottom: 0;
      display: block;
    }

    .comment-area textarea:focus {
      border-color: var(--accent);
    }

    .comment-area textarea::placeholder {
      color: var(--text-dim);
    }

    .existing-comment {
      background: var(--bg-surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 8px;
      position: relative;
    }

    .existing-comment .edit-btn {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 11px;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
    }

    /* Right panel: prompt output */
    .right-panel {
      width: 360px;
      min-width: 200px;
      background: var(--bg-surface);
      display: flex;
      flex-direction: column;
    }

    .right-panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .right-panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .right-panel-content::-webkit-scrollbar {
      width: 6px;
    }

    .right-panel-content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .prompt-output {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .prompt-placeholder {
      color: var(--text-dim);
      font-style: italic;
      font-size: 13px;
      text-align: center;
      padding: 40px 20px;
    }

    .copy-btn {
      padding: 8px 16px;
      margin: 12px 16px 16px;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .copy-btn:hover {
      opacity: 0.9;
    }

    .copy-btn.copied {
      background: var(--green);
    }

    /* Filter tabs in right panel */
    .filter-tabs {
      display: flex;
      gap: 2px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
    }

    .filter-tab {
      padding: 4px 10px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s;
    }

    .filter-tab:hover {
      background: var(--bg-hover);
    }

    .filter-tab.active {
      background: var(--bg-hover);
      color: var(--text);
    }

    /* Feedback summary items */
    .feedback-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .feedback-item:last-child {
      border-bottom: none;
    }

    .feedback-item .fb-section {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      font-size: 12px;
    }

    .feedback-item .fb-status {
      display: inline-block;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 600;
      margin-right: 6px;
    }

    .fb-status.approved {
      background: var(--green-bg);
      color: var(--green);
    }

    .fb-status.revision {
      background: var(--red-bg);
      color: var(--red);
    }

    .fb-status.question {
      background: rgba(188, 140, 255, 0.1);
      color: var(--purple);
    }

    .feedback-item .fb-comment {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 4px;
    }

    /* Revised section highlight */
    .section.revised {
      border-left: 3px solid var(--accent) !important;
      background: rgba(88, 166, 255, 0.04) !important;
    }

    .revised-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
  </style>
</head>

  <script>
    const docSections = [
      {
        id: "epic-overview",
        title: "Epic Overview",
        content: `**Problem:** 0DTE trading moves too fast for manual chart review across multiple timeframes. By the time you've checked 1m, 5m, 15m, assessed key levels, and formed a view \u2014 the opportunity has moved. The system needs to do what a trader does, at machine speed.

**Goal:** Build a paper trading system that monitors for signal-based entry conditions, assembles multi-timeframe market context, gets AI chart review, constructs concrete trades from the option chain, and tracks positions with mechanical exit rules \u2014 all persisted to InfluxDB for live observation and EOD review.

**Deliverable:** One fully working playbook (0DTE bull put spread on HullMACD bullish signal) that validates the entire pipeline end-to-end. After that, new strategies are TOML config blocks, not code.

### What Exists Today (after TT-79)

- Real-time streaming (positions, orders, quotes, Greeks, candles)
- Signal detection (HullMACD engine with pluggable protocol)
- Strategy classification (identify spreads/strangles/condors from positions)
- Entry credit computation (LIFO replay, live on fills)
- Backtesting (historical replay through signal engine)
- InfluxDB + Grafana for persistence and visualization
- \`playground_signals\` notebook: signal \u2192 chart \u2192 persist loop already working

**What's missing is everything between "signal fires" and "trade tracked."**`
      },
      {
        id: "gap-1-chain",
        title: "Gap 1: Chain Resolver",
        content: `> *"What's the 16-delta put for SPX expiring today?"*

On-demand option chain query filtered to specific deltas. Thin utility wrapping existing \`OptionsClient\`. Flash lookup when a strategy needs to construct a trade \u2014 **not a streaming service**.

### Reuses
- \`OptionsClient.get_chains()\` at \`src/tastytrade/market/options.py\`
- \`EquityOptionInstrument\` model

### New Code
- \`ChainLookup\` service \u2014 wraps OptionsClient with delta-based filtering and typed response models
- \`OptionStrike\` frozen Pydantic model: strike_price, bid, ask, mid, delta, IV, theta, gamma, dte
- Parse \`OptionsClient\` raw dict response into typed models`
      },
      {
        id: "gap-2-constructor",
        title: "Gap 2: Trade Constructor",
        content: `> *"Signal says BULLISH \u2192 build a bull put spread."*

The bridge between a signal and a concrete position with specific strikes, structure, and entry credit. Takes signal + strategy spec + chain data \u2192 produces a fully-defined paper position.

### Reuses
- \`TradeSignal\` model \u2014 the entry trigger
- \`StrategyClassifier\` \u2014 knows spread/strangle/condor structure

### New Code
- \`TradeConstructor\` \u2014 takes \`TradeSignal\` + \`OptionStrike[]\` + strategy config \u2192 \`PaperPosition\`
- \`PaperPosition\` model with lifecycle states (WATCHING / OPEN / CLOSED / SKIPPED)
- Constructs legs (e.g., sell 16-delta put, buy put 25pts lower)
- Records entry credit (mid price), entry Greeks, entry timestamp`
      },
      {
        id: "gap-3-context",
        title: "Gap 3: Multi-Timeframe Market Context",
        content: `> *"What do the 1m, 5m, 15m, and 1h charts say? Where are the key levels?"*

**This is the CORE framework element.** A trader's entire decision process IS multi-timeframe analysis with key level identification. Not just input prep for the AI agent \u2014 it IS the decision framework. Both the agent and any dashboard consume this same context.

### Pipeline

\`\`\`
Candle streams (1m, 5m, 15m, 1h) + indicator computation (HMA, MACD per TF)
         |
         v
MarketContext \u2014 assembled, multi-timeframe view:
  - Per-timeframe: trend direction, momentum, HMA/MACD state
  - Cross-timeframe: key levels, trend alignment, notable confluences
  - Snapshot at a point in time (immutable, frozen)
\`\`\`

### Key Level Identification
- Prior close, VWAP, session high/low, round numbers
- Support/resistance from swing highs/lows across timeframes
- Levels are **verifiable** \u2014 did price react there?

### Reuses
- \`hull()\` and \`macd()\` indicators at \`analytics/indicators/momentum.py\`
- \`MarketDataProvider.download()\` for historical candles
- \`CandleEvent\` model

### New Code
- \`MarketContext\` pipeline: new \`src/tastytrade/analytics/context/\` package
- \`KeyLevel\` identification logic
- \`TrendAlignment\` assessment (ALIGNED / MIXED / OPPOSED across TFs)
- Publishes snapshots to Redis + InfluxDB for dashboard consumption`
      },
      {
        id: "gap-4-observation",
        title: "Gap 4: Real-Time Observation",
        content: `> *"Watch the day unfold \u2014 signals firing, positions opening, P&L tracking, context updating."*

The notebook is offline replay. The live system needs real-time visibility **during the trading day**, not just EOD review:

- Signals as they fire
- Paper positions with live P&L
- Market context updating as candles close
- Key levels being tested/broken

### Implementation
- Grafana dashboard + InfluxDB persistence designed for **live observation**
- Signal timeline, paper position P&L, market context updates
- P&L curve per playbook over trading days
- Exit reason breakdown (profit target / max loss / time exit)
- Analyst scorecard (win rate by FAVORABLE / NEUTRAL / UNFAVORABLE)
- Trade journal: entries, assessments, exits, outcomes
- Skipped trades: what happened to UNFAVORABLE-gated trades?`
      },
      {
        id: "gap-5-analyst",
        title: "Gap 5: LLM Analyst",
        content: `> *"Given this multi-timeframe context and proposed trade, what does the chart say?"*

AI agent that consumes \`MarketContext\` and produces qualitative assessment. Automates what a human trader does looking at charts across timeframes. T-shirt sized setup quality: **FAVORABLE / NEUTRAL / UNFAVORABLE**. NO pseudo-scientific confidence scores. Verifiable observations only.

### Design Principles
- **No fake precision** \u2014 "0.73 confidence" implies calibrated probability that doesn't exist
- **Verifiable observations** \u2014 key levels can be checked (did price react?), trend direction is measurable
- **T-shirt quality** \u2014 three buckets. Over time: "Do FAVORABLE setups have a higher win rate?" is a real, measurable question
- **Latency matters** \u2014 for 0DTE, assessment needs to come back in seconds, not minutes

### Implementation
- Claude API (Haiku 4.5 for speed/cost, upgrade to Sonnet only if quality lacking)
- Structured output via tool_use \u2014 typed JSON, not free text
- Prompt template versioned in repo at \`src/tastytrade/analyst/prompts/\``
      },
      {
        id: "gap-6-journal",
        title: "Gap 6: Decision Journal",
        content: `> *"What happened? Did FAVORABLE setups win more often?"*

Connects decisions to outcomes. Every paper trade records: trigger, market context, agent assessment, and actual outcome. This is how you learn which setups work and whether the agent adds value.

### What Gets Tracked
- Entry trigger (which signal, what time, market conditions)
- Agent assessment at entry (FAVORABLE / NEUTRAL / UNFAVORABLE / NONE)
- Exit reason (profit_target / max_loss / time_exit)
- P&L outcome (entry credit, exit debit, net)
- Key levels identified vs. key levels respected

### How Results Are Measured
- Simple tallies \u2014 not pseudo-calibration
- Win rate by setup_quality: did FAVORABLE setups actually win more?
- Key level accuracy: how often did identified S/R hold?
- Skipped trade analysis: what happened to trades the analyst gated?`
      },
      {
        id: "pipeline-flow",
        title: "Pipeline Flow",
        content: `### Signal \u2192 Trade Lifecycle

\`\`\`
HullMACD Signal fires (BULLISH on SPX 5m)
    \u2502
    \u251c\u2500\u2500\u2192 MarketContext assembled (1m / 5m / 15m / 1h + key levels)
    \u2502        \u2502
    \u2502        \u2514\u2500\u2500\u2192 LLM Analyst reviews context + proposed trade

    // Render markdown-like content to HTML
    function renderMarkdown(text) {
      let html = '';
      const lines = text.split('\n');
      let inCode = false;
      let codeLines = [];
      let inList = false;
      let listTag = 'ul';
      let inTable = false;
      let tableRows = [];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.trim().startsWith('```')) {
          if (inCode) {
            html += '<pre><code>' + codeLines.join('\n').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
            codeLines = [];
            inCode = false;
          } else {
            if (inList) { html += '</' + listTag + '>'; inList = false; }
            if (inTable) { html += renderTable(tableRows); inTable = false; tableRows = []; }
            inCode = true;
          }
          continue;
        }
        if (inCode) { codeLines.push(line); continue; }

        if (line.trim().startsWith('|')) {
          if (inList) { html += '</' + listTag + '>'; inList = false; }
          if (!inTable) inTable = true;
          if (!line.trim().match(/^\|[\s-|]+\|$/)) {
            tableRows.push(line);
          }
          continue;
        } else if (inTable) {
          html += renderTable(tableRows);
          inTable = false;
          tableRows = [];
        }

        if (line.trim().startsWith('> ')) {
          if (inList) { html += '</' + listTag + '>'; inList = false; }
          html += '<blockquote style="border-left:3px solid var(--border);padding:4px 12px;margin:8px 0;color:var(--text-muted);font-style:italic">' + inlineFormat(line.trim().slice(2)) + '</blockquote>';
          continue;
        }

        if (line.trim() === '') {
          if (inList) { html += '</' + listTag + '>'; inList = false; }
          continue;
        }

        if (line.startsWith('### ')) {
          if (inList) { html += '</' + listTag + '>'; inList = false; }
          html += '<h4 style="font-size:14px;font-weight:600;color:var(--text);margin:16px 0 8px">' + inlineFormat(line.slice(4)) + '</h4>';
          continue;
        }

        if (line.trim().startsWith('- ') || line.trim().startsWith('* ')) {
          if (!inList) { listTag = 'ul'; html += '<ul>'; inList = true; }
          html += '<li>' + inlineFormat(line.trim().slice(2)) + '</li>';
          continue;
        }
        if (line.trim().match(/^\d+\.\s/)) {
          if (!inList) { listTag = 'ol'; html += '<ol>'; inList = true; }
          html += '<li>' + inlineFormat(line.trim().replace(/^\d+\.\s/, '')) + '</li>';
          continue;
        }

        if (inList) { html += '</' + listTag + '>'; inList = false; }
        html += '<p>' + inlineFormat(line) + '</p>';
      }

      if (inCode) html += '<pre><code>' + codeLines.join('\n').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
      if (inList) html += '</' + listTag + '>';
      if (inTable) html += renderTable(tableRows);

      return html;
    }

    function renderTable(rows) {
      if (rows.length === 0) return '';
      let html = '<table>';
      rows.forEach((row, idx) => {
        const cells = row.split('|').filter(c => c.trim() !== '');
        const tag = idx === 0 ? 'th' : 'td';
        html += '<tr>' + cells.map(c => `<${tag}>${inlineFormat(c.trim())}</${tag}>`).join('') + '</tr>';
      });
      html += '</table>';
      return html;
    }

    function inlineFormat(text) {
      return text
        .replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent);text-decoration:none">$1</a>')
        .replace(/\\`/g, '`');
    }

      document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="dot dot-pending"></div>${counts.pending} Pending</div>
    <div class="stat"><div class="dot dot-approved"></div>${counts.approved} Approved</div>
    <div class="stat"><div class="dot dot-revision"></div>${counts.revision} Needs Revision</div>
    <div class="stat"><div class="dot dot-question"></div>${counts.question} Questions</div>
  `;
    }

    // Render feedback panel
    function renderFeedback() {
      const list = document.getElementById('feedbackList');
      const filtered = state.sections.filter(s => {
        if (state.activeFilter === 'all') return s.status !== 'pending';
        return s.status === state.activeFilter;
      });

      const count = state.sections.filter(s => s.status !== 'pending').length;
      document.getElementById('feedbackCount').textContent = count > 0 ? `${count} reviewed` : '';

      if (filtered.length === 0) {
        list.innerHTML = `<div class="prompt-placeholder">
      ${state.activeFilter === 'all'
            ? 'Review sections by clicking Approve, Needs Revision, or Question. Your feedback will appear here.'
            : 'No sections with this status yet.'}
    </div>`;
        return;
      }

      list.innerHTML = filtered.map(s => `
    <div class="feedback-item" onclick="navigateTo('${s.id}')" style="cursor:pointer">
      <div class="fb-section">
        <span class="fb-status ${s.status}">${s.status === 'approved' ? 'APPROVED' : s.status === 'revision' ? 'REVISION' : 'QUESTION'}</span>
        ${s.title}
      </div>
      ${s.comment ? `<div class="fb-comment">"${s.comment}"</div>` : ''}
    </div>
  `).join('');
    }

    // Actions
    function navigateTo(id) {
      state.activeSection = id;
      saveToStorage();
      renderNav();
      document.getElementById('section-' + id).scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function setStatus(id, status) {
      const section = state.sections.find(s => s.id === id);
      if (section.status === status) {
        section.status = 'pending';
      } else {
        section.status = status;
        if (status === 'revision' || status === 'question') {
          setTimeout(() => {
            const area = document.getElementById('comment-' + id);
            if (area) area.classList.add('visible');
          }, 50);
        }
      }
      renderAll();
      saveToStorage();
    }

    function toggleComment(id) {
      const area = document.getElementById('comment-' + id);
      area.classList.toggle('visible');
      if (area.classList.contains('visible')) {
        const ta = document.getElementById('textarea-' + id);
        if (ta) ta.focus();
      }
    }

    function saveComment(id, value) {
      const section = state.sections.find(s => s.id === id);
      section.comment = value.trim();
      renderAll();
      saveToStorage();
    }

    function editComment(id) {
      const section = state.sections.find(s => s.id === id);
      const area = document.getElementById('comment-' + id);
      area.innerHTML = `<textarea placeholder="Edit your feedback..."
    onblur="saveComment('${id}', this.value)"
    id="textarea-${id}">${section.comment}</textarea>`;
      area.classList.add('visible');
      document.getElementById('textarea-' + id).focus();
    }

    function generatePrompt() {
      const approved = state.sections.filter(s => s.status === 'approved');
      const revision = state.sections.filter(s => s.status === 'revision');
      const questions = state.sections.filter(s => s.status === 'question');

      if (approved.length === 0 && revision.length === 0 && questions.length === 0) {
        return '';
      }

      let prompt = `Here is my review of the ${PLAN_NAME} plan:\n\n`;

      if (approved.length > 0) {
        prompt += `## Approved Sections (${approved.length}/${state.sections.length})\n`;
        approved.forEach(s => {
          prompt += `- **${s.title}**: Approved`;
          if (s.comment) prompt += ` \u2014 ${s.comment}`;
          prompt += '\n';
        });
        prompt += '\n';
      }

      if (revision.length > 0) {
        prompt += `## Needs Revision (${revision.length})\n`;
        revision.forEach(s => {
          prompt += `- **${s.title}**`;
          if (s.comment) prompt += `: ${s.comment}`;
          else prompt += ': (no specific feedback provided)';
          prompt += '\n';
        });
        prompt += '\n';
      }

      if (questions.length > 0) {
        prompt += `## Questions (${questions.length})\n`;
        questions.forEach(s => {
          prompt += `- **${s.title}**`;
          if (s.comment) prompt += `: ${s.comment}`;
          else prompt += ': (question not specified)';
          prompt += '\n';
        });
        prompt += '\n';
      }

      const remaining = state.sections.filter(s => s.status === 'pending');
      if (remaining.length > 0) {
        prompt += `## Not Yet Reviewed (${remaining.length})\n`;
        remaining.forEach(s => prompt += `- ${s.title}\n`);
      }

      return prompt;
    }

    function copyPrompt() {
      const prompt = generatePrompt();
      if (!prompt) return;
      navigator.clipboard.writeText(prompt).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy Feedback as Prompt'; btn.classList.remove('copied'); }, 2000);
      });
    }

    // Filter tabs
    document.getElementById('filterTabs').addEventListener('click', e => {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;
      state.activeFilter = tab.dataset.filter;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderFeedback();
      saveToStorage();
    });

    function renderAll() {
      renderNav();
      renderDoc();
      renderStats();
      renderFeedback();
    }

    // Resizable & collapsible panels
    (function () {
      const nav = document.getElementById('nav');
      const rightPanel = document.getElementById('rightPanel');
      const leftHandle = document.getElementById('leftHandle');
      const rightHandle = document.getElementById('rightHandle');
      const leftToggle = document.getElementById('leftToggle');
      const rightToggle = document.getElementById('rightToggle');

      let dragging = null;
      let navWidth = 240;
      let rightWidth = 360;

      const savedLayout = (() => { try { return JSON.parse(localStorage.getItem(LAYOUT_KEY) || '{}'); } catch (e) { return {}; } })();
      if (savedLayout.navWidth) navWidth = savedLayout.navWidth;
      if (savedLayout.rightWidth) rightWidth = savedLayout.rightWidth;
      if (savedLayout.navCollapsed) nav.classList.add('collapsed');
      else nav.style.width = navWidth + 'px';
      if (savedLayout.rightCollapsed) rightPanel.classList.add('collapsed');
      else rightPanel.style.width = rightWidth + 'px';

      function saveLayout() {
        try {
          localStorage.setItem(LAYOUT_KEY, JSON.stringify({
            navWidth, rightWidth,
            navCollapsed: nav.classList.contains('collapsed'),
            rightCollapsed: rightPanel.classList.contains('collapsed')
          }));
        } catch (e) { }
      }

      function updateToggles() {
        const navCollapsed = nav.classList.contains('collapsed');
        const rightCollapsed = rightPanel.classList.contains('collapsed');
        leftToggle.title = navCollapsed ? 'Show sections' : 'Hide sections';
        leftToggle.classList.toggle('panel-collapsed', navCollapsed);
        rightToggle.title = rightCollapsed ? 'Show feedback' : 'Hide feedback';
        rightToggle.classList.toggle('panel-collapsed', rightCollapsed);
      }

      function toggleNav(e) {
        e.preventDefault();
        e.stopPropagation();
        if (nav.classList.contains('collapsed')) {
          nav.classList.remove('collapsed');
          nav.style.width = navWidth + 'px';
        } else {
          navWidth = nav.offsetWidth;
          nav.classList.add('collapsed');
        }
        updateToggles();
        saveLayout();
      }

      function toggleRight(e) {
        e.preventDefault();
        e.stopPropagation();
        if (rightPanel.classList.contains('collapsed')) {
          rightPanel.classList.remove('collapsed');
          rightPanel.style.width = rightWidth + 'px';
        } else {
          rightWidth = rightPanel.offsetWidth;
          rightPanel.classList.add('collapsed');
        }
        updateToggles();
        saveLayout();
      }

      let touchFiredLeft = false, touchFiredRight = false;

      leftToggle.addEventListener('touchend', e => { touchFiredLeft = true; toggleNav(e); }, { passive: false });
      leftToggle.addEventListener('click', e => { if (touchFiredLeft) { touchFiredLeft = false; return; } toggleNav(e); });

      rightToggle.addEventListener('touchend', e => { touchFiredRight = true; toggleRight(e); }, { passive: false });
      rightToggle.addEventListener('click', e => { if (touchFiredRight) { touchFiredRight = false; return; } toggleRight(e); });

      updateToggles();

      function onDragStart(e, side) {
        e.preventDefault();
        dragging = side;
        document.body.classList.add('resizing');
        (side === 'left' ? leftHandle : rightHandle).classList.add('dragging');
      }

      leftHandle.addEventListener('mousedown', e => onDragStart(e, 'left'));
      rightHandle.addEventListener('mousedown', e => onDragStart(e, 'right'));

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        applyDrag(e.clientX);
      });

      document.addEventListener('mouseup', endDrag);

      leftHandle.addEventListener('touchstart', e => { e.preventDefault(); onDragStart(e, 'left'); }, { passive: false });
      rightHandle.addEventListener('touchstart', e => { e.preventDefault(); onDragStart(e, 'right'); }, { passive: false });

      document.addEventListener('touchmove', e => {
        if (!dragging) return;
        e.preventDefault();
        applyDrag(e.touches[0].clientX);
      }, { passive: false });

      document.addEventListener('touchend', endDrag);

      function applyDrag(clientX) {
        if (dragging === 'left') {
          const w = Math.max(140, Math.min(400, clientX));
          nav.classList.remove('collapsed');
          nav.style.width = w + 'px';
          navWidth = w;
        } else {
          const w = Math.max(200, Math.min(600, window.innerWidth - clientX));
          rightPanel.classList.remove('collapsed');
          rightPanel.style.width = w + 'px';
          rightWidth = w;
        }
        updateToggles();
      }

      function endDrag() {
        if (!dragging) return;
        document.body.classList.remove('resizing');
        leftHandle.classList.remove('dragging');
        rightHandle.classList.remove('dragging');
        dragging = null;
        saveLayout();
      }
    })();

    // Init
    loadFromStorage();
    document.querySelectorAll('.filter-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.filter === state.activeFilter);
    });
    renderAll();
  </script>
</body>

</html>
