        content: `**Jira:** [TT-64](https://mandeng.atlassian.net/browse/TT-64)

### Current Architecture

Three sources can trigger reconnection, but all route through DXLinkManager via a callback:

\`\`\`
ControlHandler  --callback-->  DXLinkManager.trigger_reconnect()  --sets-->  reconnect_event  <--awaits--  Orchestrator
socket_listener -----calls-->  DXLinkManager.trigger_reconnect()
send_keepalives -----calls-->  DXLinkManager.trigger_reconnect()
\`\`\`

### Problems

1. **Circular dependency** — DXLinkManager creates ControlHandler (via MessageRouter), then ControlHandler calls back into DXLinkManager
2. **Hidden control flow** — the callback isn't visible in the architecture diagram; ControlHandler appears disconnected from the orchestrator
3. **Bypassed pipeline** — socket_listener and send_keepalives call trigger_reconnect() directly, bypassing the existing message pipeline
4. **Testability** — testing ControlHandler's reconnect behavior requires mocking the callback, not just observing a signal

### Proposed Architecture

All failures route through the existing message pipeline. ControlHandler is the **single reconnection authority**.

\`\`\`
socket_listener ---CONNECTION_DROPPED--->  Queue[0]  --->  ControlHandler  ---trigger()--->  ReconnectSignal  <---await---  Orchestrator
send_keepalives ---CONNECTION_DROPPED--->  Queue[0]  --->  ControlHandler  ---trigger()--->
server messages ----naturally---->    Queue[0]  --->  ControlHandler  ---trigger()--->
\`\`\`

No callbacks. No bypass. One signal path through the existing pipeline. ControlHandler decides all reconnections.`

        content: `**File:** \`src/tastytrade/connections/signals.py\` (new)

Extract the reconnection event + reason into a standalone, injectable object.

\`\`\`python
import asyncio
import logging
from typing import Optional

from tastytrade.config.enumerations import ReconnectReason

logger = logging.getLogger(__name__)


class ReconnectSignal:
    """Stable reconnection mailbox that outlives ControlHandler across
    reconnection cycles.

    ControlHandler is torn down and recreated every time the pipeline
    reconnects. A direct subscription to ControlHandler would be lost
    on each rebuild. This signal is created once by the Orchestrator,
    passed down through the pipeline, and each new ControlHandler
    instance publishes to the same object.

    Replaces the callback pattern where ControlHandler called back
    into DXLinkManager.trigger_reconnect().
    """

    def __init__(self) -> None:
        self.event: asyncio.Event = asyncio.Event()
        self.reason: Optional[ReconnectReason] = None

    def trigger(self, reason: ReconnectReason) -> None:
        """Signal that reconnection is needed."""
        self.reason = reason
        self.event.set()
        logger.warning("Reconnect signal: %s", reason.value)

    async def wait(self) -> ReconnectReason:
        """Wait for a reconnection signal, return the reason."""
        await self.event.wait()
        self.event.clear()
        return self.reason or ReconnectReason.MANUAL_TRIGGER

    def simulate(self, reason: ReconnectReason) -> None:
        """Trigger a simulated failure for testing."""
        logger.warning("Simulating failure: %s", reason.value)
        self.trigger(reason)
\`\`\`

### Key Decisions

- **Standalone class, not a Protocol** — this is a concrete coordination primitive, not an abstraction boundary
- **No connection state tracking** — \`ConnectionState\` stays on DXLinkManager where it belongs (it tracks WS lifecycle, not reconnection signaling)
- **Logging moves here** — the "Reconnect signal" log line lives on the signal itself, so all trigger sources get consistent logging`

Replace \`reconnect_callback\` parameter with \`reconnect_signal\` parameter.

### Before

\`\`\`python
class ControlHandler(EventHandler):
    def __init__(
        self, reconnect_callback: Optional[Callable[[ReconnectReason], None]] = None
    ) -> None:
        super().__init__(channel=Channels.Control)
        self.reconnect_callback = reconnect_callback
        ...

    async def handle_auth_state(self, message: Message) -> None:
        ...
        if self.reconnect_callback:
            self.reconnect_callback(ReconnectReason.AUTH_EXPIRED)
\`\`\`

### After

\`\`\`python
from tastytrade.connections.signals import ReconnectSignal

class ControlHandler(EventHandler):
    def __init__(
        self, reconnect_signal: Optional[ReconnectSignal] = None
    ) -> None:
        super().__init__(channel=Channels.Control)
        self.reconnect_signal = reconnect_signal
        ...

    async def handle_auth_state(self, message: Message) -> None:
        ...
        if self.reconnect_signal:
            self.reconnect_signal.trigger(ReconnectReason.AUTH_EXPIRED)
\`\`\`

### Changes

- All \`self.reconnect_callback(reason)\` calls become \`self.reconnect_signal.trigger(reason)\`

\`\`\`python

#   wait_for_reconnect_signal()

# After:  await self.queues[0].put({"type": "CONTROL", "channel": 0, "state": "CONNECTION_DROPPED"})

# The queues are in-memory asyncio.Queue — they survive the WebSocket dying.

# Replace simulate_failure:
# Before: self.trigger_reconnect(reason)
# After:  self.reconnect_signal.simulate(reason)
\`\`\`

3. **Update \`start_router\`** to pass signal instead of callback:

| \`reconnect_event: asyncio.Event\` | \`ReconnectSignal.event\` |

The orchestrator creates the signal and passes it into DXLinkManager. Then it awaits the signal directly.

### Changes

\`\`\`python
from tastytrade.connections.signals import ReconnectSignal

async def _run_subscription_once(...) -> None:
    ...
    # Create shared signal
    reconnect_signal = ReconnectSignal()

    # Pass to DXLinkManager
    dxlink = DXLinkManager(
        subscription_store=RedisSubscriptionStore(),
        reconnect_signal=reconnect_signal,
    )
    await dxlink.open(credentials=credentials)
    ...

    # Monitor loop — await signal directly
    async def reconnection_monitor() -> ReconnectReason:
        reason = await reconnect_signal.wait()  # was: dxlink.wait_for_reconnect_signal()
        return reason
    ...
\`\`\`

### Also update \`failure_trigger_listener\`

\`\`\`python
async def failure_trigger_listener(
    redis_store: RedisSubscriptionStore,
    reconnect_signal: ReconnectSignal,  # was: dxlink: DXLinkManager
) -> None:
    ...
    reconnect_signal.simulate(reason)  # was: dxlink.simulate_failure(reason)
\`\`\`

### Signal Ownership

The orchestrator **creates** the signal and **passes it down**. ControlHandler is the **sole authority** that triggers it.

\`\`\`
Orchestrator (creates ReconnectSignal)
    |
    +---> DXLinkManager (receives queues reference)
    |        |
    |        +---> socket_listener / send_keepalives
    |                 (on failure: place CONNECTION_DROPPED into Queue[0])
    |
    +---> MessageRouter (passes signal through)
    |        |
    |        +---> ControlHandler (sole authority — calls signal.trigger())
    |                 processes: server msgs + failure events
    |
    +---> awaits signal.wait()
\`\`\`

No circular references. All failures flow through the message pipeline. One signal path.`

### Changes

1. Accept \`ReconnectSignal\` in \`__init__\`, default to new instance
2. Replace internal \`reconnect_event\` / \`reconnect_reason\` with \`self.reconnect_signal\`
3. Replace \`trigger_reconnect()\` and \`wait_for_reconnect_signal()\` with delegation

\`\`\`python
from tastytrade.connections.signals import ReconnectSignal

@singleton
class AccountStreamer:
    def __init__(
        self,
        credentials: Optional[Credentials] = None,
        reconnect_signal: Optional[ReconnectSignal] = None,
    ) -> None:
        if not hasattr(self, "initialized"):
            ...
            self.reconnect_signal = reconnect_signal or ReconnectSignal()
            ...

    def trigger_reconnect(self, reason: ReconnectReason) -> None:
        self.reconnect_signal.trigger(reason)

    async def wait_for_reconnect_signal(self) -> ReconnectReason:
        return await self.reconnect_signal.wait()
\`\`\`

### Decision: Keep wrapper methods or remove?

**CHOSEN: Keep thin wrappers for now** — AccountStreamer's external callers (account orchestrator) already use \`streamer.wait_for_reconnect_signal()\`. Removing them would widen the blast radius. We can deprecate in a follow-up.

    const priorApprovals = {};

    const PLAN_NAME = "TT-64 Reconnect Signal Refactor";

    // Persistence — save/restore review state across sessions
    const STORAGE_KEY = 'review-state:' + PLAN_NAME;
    const LAYOUT_KEY = 'review-layout:' + PLAN_NAME;

    function saveToStorage() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          sections: state.sections.map(s => ({ id: s.id, status: s.status, comment: s.comment })),
          activeSection: state.activeSection,
          activeFilter: state.activeFilter
        }));
      } catch (e) { }
    }

    function loadFromStorage() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        (data.sections || []).forEach(saved => {
          const s = state.sections.find(s => s.id === saved.id);
          if (s) { s.status = saved.status || 'pending'; s.comment = saved.comment || ''; }
        });
        if (data.activeSection) state.activeSection = data.activeSection;
        if (data.activeFilter) state.activeFilter = data.activeFilter;
      } catch (e) { }
    }

    // State
    const state = {
      sections: docSections.map(s => ({
        ...s,
        status: priorApprovals[s.id] || 'pending',
        comment: ''
      })),
      activeSection: docSections[0]?.id || '',
      activeFilter: 'all'
    };

    // Render markdown-like content to HTML
    function renderMarkdown(text) {
      let html = '';
      const lines = text.split('\n');
      let inCode = false;
      let codeLines = [];
      let inList = false;
      let inTable = false;
      let tableRows = [];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.trim().startsWith('```')) {
          if (inCode) {
            html += '<pre><code>' + codeLines.join('\n').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
            codeLines = [];
            inCode = false;
          } else {
            if (inList) { html += '</ul>'; inList = false; }
            if (inTable) { html += renderTable(tableRows); inTable = false; tableRows = []; }
            inCode = true;
          }
          continue;
        }
        if (inCode) { codeLines.push(line); continue; }

        if (line.trim().startsWith('|')) {
          if (inList) { html += '</ul>'; inList = false; }
          if (!inTable) inTable = true;
          if (!line.trim().match(/^\|[\s-|]+\|$/)) {
            tableRows.push(line);
          }
          continue;
        } else if (inTable) {
          html += renderTable(tableRows);
          inTable = false;
          tableRows = [];
        }

        if (line.trim() === '') {
          if (inList) { html += '</ul>'; inList = false; }
          continue;
        }

        if (line.startsWith('### ')) {
          if (inList) { html += '</ul>'; inList = false; }
          html += '<h4 style="font-size:14px;font-weight:600;color:var(--text);margin:16px 0 8px">' + inlineFormat(line.slice(4)) + '</h4>';
          continue;
        }

        if (line.trim().startsWith('- ') || line.trim().startsWith('* ')) {
          if (!inList) { html += '<ul>'; inList = true; }
          html += '<li>' + inlineFormat(line.trim().slice(2)) + '</li>';
          continue;
        }
        if (line.trim().match(/^\d+\.\s/)) {
          if (!inList) { html += '<ol>'; inList = true; }
          html += '<li>' + inlineFormat(line.trim().replace(/^\d+\.\s/, '')) + '</li>';
          continue;
        }

        if (inList) { html += '</ul>'; inList = false; }
        html += '<p>' + inlineFormat(line) + '</p>';
      }

      if (inCode) html += '<pre><code>' + codeLines.join('\n').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
      if (inList) html += '</ul>';
      if (inTable) html += renderTable(tableRows);

      return html;
    }

    function renderTable(rows) {
      if (rows.length === 0) return '';
      let html = '<table>';
      rows.forEach((row, idx) => {
        const cells = row.split('|').filter(c => c.trim() !== '');
        const tag = idx === 0 ? 'th' : 'td';
        html += '<tr>' + cells.map(c => `<${tag}>${inlineFormat(c.trim())}</${tag}>`).join('') + '</tr>';
      });
      html += '</table>';
      return html;
    }

    function inlineFormat(text) {
      return text
        .replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--blue);text-decoration:underline">$1</a>')
        .replace(/\\`/g, '`');
    }

    // Render navigation

      ${s.revised ? '<span style="font-size:9px;color:var(--accent);font-weight:700">REV</span>' : ''}
    </div>`;

        prompt += '\n';
      }

      if (revision.length > 0) {
        prompt += `## Needs Revision (${revision.length})\n`;
        revision.forEach(s => {
          prompt += `- **${s.title}**`;
          if (s.comment) prompt += `: ${s.comment}`;
          else prompt += ': (no specific feedback provided)';
          prompt += '\n';
        });
        prompt += '\n';
      }

      if (questions.length > 0) {
        prompt += `## Questions (${questions.length})\n`;
        questions.forEach(s => {
          prompt += `- **${s.title}**`;
          if (s.comment) prompt += `: ${s.comment}`;
          else prompt += ': (question not specified)';
          prompt += '\n';
        });
        prompt += '\n';
      }

      const remaining = state.sections.filter(s => s.status === 'pending');
      if (remaining.length > 0) {
        prompt += `## Not Yet Reviewed (${remaining.length})\n`;
        remaining.forEach(s => prompt += `- ${s.title}\n`);
      }

      return prompt;
    }

    function copyPrompt() {
      const prompt = generatePrompt();
      if (!prompt) return;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(prompt).then(() => {
          showCopiedConfirmation();
        }).catch(() => {
          showCopyModal(prompt);
        });
      } else {
        showCopyModal(prompt);
      }
    }

    function showCopiedConfirmation() {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy Feedback as Prompt'; btn.classList.remove('copied'); }, 2000);
    }

    function showCopyModal(text) {
      const modal = document.getElementById('copyModal');
      const textarea = document.getElementById('copyModalText');
      textarea.value = text;
      modal.classList.add('visible');
      setTimeout(() => {
        textarea.focus();
        textarea.select();
      }, 100);
    }

    function closeCopyModal() {
      document.getElementById('copyModal').classList.remove('visible');
    }

    function selectAllInModal() {
      const textarea = document.getElementById('copyModalText');
      textarea.focus();
      textarea.select();
    }

    // Filter tabs
    document.getElementById('filterTabs').addEventListener('click', e => {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;
      state.activeFilter = tab.dataset.filter;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderFeedback();
      saveToStorage();
    });

    function renderAll() {
      renderNav();
      renderDoc();
      renderStats();
      renderFeedback();
    }

    // Resizable & collapsible panels (mouse + touch)
    (function () {
      const nav = document.getElementById('nav');
      const rightPanel = document.getElementById('rightPanel');
      const leftHandle = document.getElementById('leftHandle');
      const rightHandle = document.getElementById('rightHandle');
      const leftToggle = document.getElementById('leftToggle');
      const rightToggle = document.getElementById('rightToggle');

      let dragging = null;
      let navWidth = 240;
      let rightWidth = 360;

      // Restore saved layout
      const savedLayout = (() => { try { return JSON.parse(localStorage.getItem(LAYOUT_KEY) || '{}'); } catch (e) { return {}; } })();
      if (savedLayout.navWidth) navWidth = savedLayout.navWidth;
      if (savedLayout.rightWidth) rightWidth = savedLayout.rightWidth;
      if (savedLayout.navCollapsed) nav.classList.add('collapsed');
      else nav.style.width = navWidth + 'px';
      if (savedLayout.rightCollapsed) rightPanel.classList.add('collapsed');
      else rightPanel.style.width = rightWidth + 'px';

      function saveLayout() {
        try {
          localStorage.setItem(LAYOUT_KEY, JSON.stringify({
            navWidth, rightWidth,
            navCollapsed: nav.classList.contains('collapsed'),
            rightCollapsed: rightPanel.classList.contains('collapsed')
          }));
        } catch (e) { }
      }

      function updateToggles() {
        const navCollapsed = nav.classList.contains('collapsed');
        const rightCollapsed = rightPanel.classList.contains('collapsed');
        leftToggle.title = navCollapsed ? 'Show sections' : 'Hide sections';
        leftToggle.classList.toggle('panel-collapsed', navCollapsed);
        rightToggle.title = rightCollapsed ? 'Show feedback' : 'Hide feedback';
        rightToggle.classList.toggle('panel-collapsed', rightCollapsed);
      }

      function toggleNav(e) {
        e.preventDefault();
        e.stopPropagation();
        if (nav.classList.contains('collapsed')) {
          nav.classList.remove('collapsed');
          nav.style.width = navWidth + 'px';
        } else {
          navWidth = nav.offsetWidth;
          nav.classList.add('collapsed');
        }
        updateToggles();
        saveLayout();
      }

      function toggleRight(e) {
        e.preventDefault();
        e.stopPropagation();
        if (rightPanel.classList.contains('collapsed')) {
          rightPanel.classList.remove('collapsed');
          rightPanel.style.width = rightWidth + 'px';
        } else {
          rightWidth = rightPanel.offsetWidth;
          rightPanel.classList.add('collapsed');
        }
        updateToggles();
        saveLayout();
      }

      let touchFiredLeft = false, touchFiredRight = false;

      leftToggle.addEventListener('touchend', e => { touchFiredLeft = true; toggleNav(e); }, { passive: false });
      leftToggle.addEventListener('click', e => { if (touchFiredLeft) { touchFiredLeft = false; return; } toggleNav(e); });

      rightToggle.addEventListener('touchend', e => { touchFiredRight = true; toggleRight(e); }, { passive: false });
      rightToggle.addEventListener('click', e => { if (touchFiredRight) { touchFiredRight = false; return; } toggleRight(e); });

      updateToggles();

      // Drag resize (mouse)
      function onDragStart(e, side) {
        e.preventDefault();
        dragging = side;
        document.body.classList.add('resizing');
        (side === 'left' ? leftHandle : rightHandle).classList.add('dragging');
      }

      leftHandle.addEventListener('mousedown', e => onDragStart(e, 'left'));
      rightHandle.addEventListener('mousedown', e => onDragStart(e, 'right'));

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        applyDrag(e.clientX);
      });

      document.addEventListener('mouseup', endDrag);

      // Drag resize (touch)
      leftHandle.addEventListener('touchstart', e => { e.preventDefault(); onDragStart(e, 'left'); }, { passive: false });
      rightHandle.addEventListener('touchstart', e => { e.preventDefault(); onDragStart(e, 'right'); }, { passive: false });

      document.addEventListener('touchmove', e => {
        if (!dragging) return;
        e.preventDefault();
        applyDrag(e.touches[0].clientX);
      }, { passive: false });

      document.addEventListener('touchend', endDrag);

      function applyDrag(clientX) {
        if (dragging === 'left') {
          const w = Math.max(140, Math.min(400, clientX));
          nav.classList.remove('collapsed');
          nav.style.width = w + 'px';
          navWidth = w;
        } else {
          const w = Math.max(200, Math.min(600, window.innerWidth - clientX));
          rightPanel.classList.remove('collapsed');
          rightPanel.style.width = w + 'px';
          rightWidth = w;
        }
        updateToggles();
      }

      function endDrag() {
        if (!dragging) return;
        document.body.classList.remove('resizing');
        leftHandle.classList.remove('dragging');
        rightHandle.classList.remove('dragging');
        dragging = null;
        saveLayout();
      }
    })();

    // Init
    loadFromStorage();
    document.querySelectorAll('.filter-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.filter === state.activeFilter);
    });
    renderAll();
  </script>
</body>

</html>
