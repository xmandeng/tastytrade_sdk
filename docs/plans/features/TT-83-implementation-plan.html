### Problem

Account events flow through the AccountStreamer WebSocket to Redis (HSET + pub/sub) but have **no time-series persistence**. When Redis keys are overwritten, historical data is permanently lost.

Market data (quotes, greeks, candles) already flows to both Redis and InfluxDB via \`TelegrafHTTPEventProcessor\`. Account events do not.

### Goal

Route 5 account event types through the existing \`TelegrafHTTPEventProcessor\` to InfluxDB, alongside the existing Redis path. No new components — reuse existing infrastructure.

### Event Types (5 of 6)

| Event Type | eventSymbol | Nested Fields (JSON) |
|---|---|---|
| PlacedOrder | underlying_symbol | legs |
| PlacedComplexOrder | underlying (from child orders) | orders, trigger_order |
| TradeChain | underlying_symbol | computed_data, lite_nodes |
| CurrentPosition | derivative symbol | none (fully native) |
| EntryCredit | derivative symbol | none (fully native) |

**Excluded:** AccountBalance — account-level snapshot, no instrument correlation, high-volume tick data (changes on every mark). Not useful for time-series analysis.`

        content: `### 1. TelegrafHTTPEventProcessor unchanged — models own their representation

The existing InfluxDB writer stays **completely untouched**. Account models inherit \`InfluxMixin\` which provides \`for_influx()\` — a method that returns a flat SimpleNamespace. The processor sees only scalars and JSON strings in \`__dict__\` — identical to DXLink events. Any unexpected nested field (from \`extra="allow"\`) defaults to JSON serialization. No helper files, no preparation functions.

**What does NOT change:** The processor — constructor, process_event, write_api, bucket, connection, close logic. Zero modifications.

### 2. Account models expose \`eventSymbol\` as a @property

DXLink events have \`eventSymbol\` as a native field from the brokerage. We keep that. Account models add a \`@property eventSymbol\` that returns their natural symbol:

| Model | eventSymbol returns |
|---|---|
| Position | \`symbol\` (derivative — e.g., the option contract) |
| EntryCredit | \`symbol\` (derivative) |
| PlacedOrder | \`underlying_symbol\` (multi-leg, no single derivative) |
| PlacedComplexOrder | underlying from child orders |
| TradeChain | \`underlying_symbol\` |

**Why derivative symbol?** DXLink market data is tagged by derivative symbol in InfluxDB. Using the same key enables direct correlation ("what were the Greeks when this position opened?").

**Why not a fallback chain?** Each model knows exactly what its symbol is. No \`getattr\` chain, no branching, no fallback — just a property.

### 3. Model owns its InfluxDB representation

\`for_influx()\` iterates \`__dict__\` once and produces a flat SimpleNamespace. No \`model_dump()\` on the top-level event. Pydantic serialization is only invoked on fields declared in \`INFLUX_JSON_FIELDS\`. The processor then iterates the namespace's \`__dict__\` — all scalars, no surprises. No helper files, no standalone functions — the model knows how to present itself.

### 4. No AccountBalance in InfluxDB

- Account-level, not instrument-level — no correlation with market data
- Changes on every market tick (net liq recomputation) — high volume, low signal
- Brokerage already provides historical balance curves
- The 5 remaining event types all tie to specific instruments or trades

### 5. Parallel dual-output in consume_* tasks

The orchestrator's \`consume_*\` coroutines already drain typed queues and call the Redis publisher. We add a second call to \`TelegrafHTTPEventProcessor.process_event()\` — same pattern, no new queues, no new tasks.`

No separate helper file. No preparation function. The model owns its InfluxDB representation via \`InfluxMixin\`. \`TelegrafHTTPEventProcessor\` stays **completely unchanged**.

### InfluxMixin

\`\`\`python
import json
from types import SimpleNamespace
from typing import Any, ClassVar

from pydantic import BaseModel


class InfluxMixin:
    """Makes account models compatible with TelegrafHTTPEventProcessor."""

    INFLUX_JSON_FIELDS: ClassVar[set[str]] = set()
    INFLUX_EXCLUDE: ClassVar[set[str]] = set()

    def for_influx(self) -> SimpleNamespace:
        """Return a flat representation for InfluxDB.

        Declared JSON fields and any unexpected non-scalar fields
        (from extra='allow') are serialized to JSON strings.
        Returns a SimpleNamespace that process_event() can iterate
        via __dict__ with no surprises.
        """
        fields: dict[str, Any] = {}
        for attr, value in self.__dict__.items():
            if attr in self.INFLUX_EXCLUDE:
                continue
            if attr in self.INFLUX_JSON_FIELDS or not isinstance(
                value, (str, int, float, bool, type(None))
            ):
                if isinstance(value, BaseModel):
                    fields[attr] = value.model_dump_json(by_alias=True)
                elif isinstance(value, (list, dict)):
                    fields[attr] = json.dumps(value, default=str)
                else:
                    fields[attr] = value
            else:
                fields[attr] = value

        ns = SimpleNamespace(**fields, eventSymbol=self.eventSymbol)
        ns.__class__ = type(self.__class__.__name__, (), {})
        return ns
\`\`\`

### How it flows

\`\`\`
queue.get() → event.for_influx() → influx.process_event(namespace)
                 ↓                        ↓
          Model serializes itself   Unchanged processor sees

          eventSymbol attached      in __dict__

### Key design choices

- **Model owns its representation** — \`for_influx()\` lives on the model via mixin, not in a separate helper. The model declares \`INFLUX_JSON_FIELDS\` and provides the conversion — single responsibility.
- **Default to JSON for unknowns** — any field that isn't a scalar (str, int, float, bool, None) is automatically JSON-serialized. Handles unexpected nested fields from \`extra="allow"\` defensively.
- **SimpleNamespace** — lightweight, no Pydantic overhead. Has \`__dict__\` and attributes, which is all \`process_event()\` reads.
- **Class name preserved** — \`ns.__class__\` is set to a dynamic type with the original class name so \`Point(event.__class__.__name__)\` produces the correct measurement name.
- **No new files** — \`InfluxMixin\` lives in \`models.py\` alongside the models that use it.`

### Current pattern (example: consume_orders)

\`\`\`python
async def consume_orders(
    queue: asyncio.Queue,
    publisher: AccountStreamPublisher,
) -> None:
    while True:
        order = await queue.get()

\`\`\`

### Updated pattern — no while True

\`\`\`python
async def consume_orders(
    queue: asyncio.Queue,
    publisher: AccountStreamPublisher,
    influx: TelegrafHTTPEventProcessor,
    stop: asyncio.Event,
) -> None:
    """Drain order events. Exits when stop is set."""
    while not stop.is_set():
        try:
            order = await asyncio.wait_for(queue.get(), timeout=1.0)
        except asyncio.TimeoutError:
            continue
        await publisher.publish_order(order)
        influx.process_event(order.for_influx())
\`\`\`

**Why \`stop.is_set()\` over \`while True\`?**
- \`while True\` loops never terminate cleanly — they rely on task cancellation which can leave resources in an inconsistent state
- \`asyncio.Event\` is the standard signal mechanism. The orchestrator sets the event on disconnect/shutdown and consumers exit their loops gracefully
- \`wait_for\` with timeout ensures the stop check runs periodically even when the queue is idle

### Tasks that get the influx parameter (5 of 6)

| Consumer | Gets influx? | Reason |
|---|---|---|
| consume_positions | Yes | Per-contract position changes |
| consume_orders | Yes | Order lifecycle events |
| consume_complex_orders | Yes | OCO/OTOCO lifecycle |
| consume_order_chains | Yes | Trade chain snapshots |
| monitor_fills_for_entry_credits | Yes | LIFO cost basis updates |
| consume_balances | **No** | Account-level, excluded from InfluxDB |

### Instantiation

\`TelegrafHTTPEventProcessor\` is instantiated once in \`run_account_stream_once()\` using the same env vars as the market data pipeline (\`INFLUX_DB_URL\`, \`INFLUX_DB_TOKEN\`, \`INFLUX_DB_ORG\`, \`INFLUX_DB_BUCKET\`). The same bucket stores both market and account data — InfluxDB measurements are separated by class name (\`PlacedOrder\`, \`Position\`, etc.).

\`\`\`python
influx = TelegrafHTTPEventProcessor()
stop = asyncio.Event()

# Pass to each consumer task
consumer_tasks.append(
    asyncio.create_task(
        consume_orders(order_queue, publisher, influx, stop),
        name="order_consumer",
    )
)
# ... repeat for positions, complex_orders, order_chains, entry_credits
\`\`\`

### Shutdown

\`\`\`python
# On disconnect / reconnect signal:
stop.set()                    # Consumers exit their loops
await asyncio.gather(*consumer_tasks)  # Wait for clean exit
influx.close()
\`\`\``

    function renderMarkdown(text) {
      let html = '';
      const lines = text.split('\n');
      let inCode = false;
      let codeLines = [];
      let inList = false;
      let inTable = false;
      let tableRows = [];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.trim().startsWith('```')) {
          if (inCode) {
            html += '<pre><code>' + codeLines.join('\n').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
            codeLines = [];
            inCode = false;
          } else {
            if (inList) { html += '</ul>'; inList = false; }
            if (inTable) { html += renderTable(tableRows); inTable = false; tableRows = []; }
            inCode = true;
          }
          continue;
        }
        if (inCode) { codeLines.push(line); continue; }

        if (line.trim().startsWith('|')) {
          if (inList) { html += '</ul>'; inList = false; }
          if (!inTable) inTable = true;
          if (!line.trim().match(/^\|[\s-|]+\|$/)) {
            tableRows.push(line);
          }
          continue;
        } else if (inTable) {
          html += renderTable(tableRows);
          inTable = false;
          tableRows = [];
        }

        if (line.trim() === '') {
          if (inList) { html += '</ul>'; inList = false; }
          continue;
        }

        if (line.startsWith('### ')) {
          if (inList) { html += '</ul>'; inList = false; }
          html += '<h4 style="font-size:14px;font-weight:600;color:var(--text);margin:16px 0 8px">' + inlineFormat(line.slice(4)) + '</h4>';
          continue;
        }

        if (line.trim().startsWith('- ') || line.trim().startsWith('* ')) {
          if (!inList) { html += '<ul>'; inList = true; }
          html += '<li>' + inlineFormat(line.trim().slice(2)) + '</li>';
          continue;
        }
        if (line.trim().match(/^\d+\.\s/)) {
          if (!inList) { html += '<ol>'; inList = true; }
          html += '<li>' + inlineFormat(line.trim().replace(/^\d+\.\s/, '')) + '</li>';
          continue;
        }

        if (inList) { html += '</ul>'; inList = false; }
        html += '<p>' + inlineFormat(line) + '</p>';
      }

      if (inCode) html += '<pre><code>' + codeLines.join('\n').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
      if (inList) html += '</ul>';
      if (inTable) html += renderTable(tableRows);

      return html;
    }

    function renderTable(rows) {
      if (rows.length === 0) return '';
      let html = '<table>';
      rows.forEach((row, idx) => {
        const cells = row.split('|').filter(c => c.trim() !== '');
        const tag = idx === 0 ? 'th' : 'td';
        html += '<tr>' + cells.map(c => `<${tag}>${inlineFormat(c.trim())}</${tag}>`).join('') + '</tr>';
      });
      html += '</table>';
      return html;
    }

    function inlineFormat(text) {
      return text
        .replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent);text-decoration:none">$1</a>')
        .replace(/\\`/g, '`');
    }

      renderFeedback();
      saveToStorage();
    });

    function renderAll() {
      renderNav();
      renderDoc();
      renderStats();
      renderFeedback();
    }

    (function () {
      const nav = document.getElementById('nav');
      const rightPanel = document.getElementById('rightPanel');
      const leftHandle = document.getElementById('leftHandle');
      const rightHandle = document.getElementById('rightHandle');
      const leftToggle = document.getElementById('leftToggle');
      const rightToggle = document.getElementById('rightToggle');

      let dragging = null;
      let navWidth = 240;
      let rightWidth = 360;

      const savedLayout = (() => { try { return JSON.parse(localStorage.getItem(LAYOUT_KEY) || '{}'); } catch (e) { return {}; } })();
      if (savedLayout.navWidth) navWidth = savedLayout.navWidth;
      if (savedLayout.rightWidth) rightWidth = savedLayout.rightWidth;
      if (savedLayout.navCollapsed) nav.classList.add('collapsed');
      else nav.style.width = navWidth + 'px';
      if (savedLayout.rightCollapsed) rightPanel.classList.add('collapsed');
      else rightPanel.style.width = rightWidth + 'px';

      function saveLayout() {
        try {
          localStorage.setItem(LAYOUT_KEY, JSON.stringify({
            navWidth, rightWidth,
            navCollapsed: nav.classList.contains('collapsed'),
            rightCollapsed: rightPanel.classList.contains('collapsed')
          }));
        } catch (e) { }
      }

      function updateToggles() {
        const navCollapsed = nav.classList.contains('collapsed');
        const rightCollapsed = rightPanel.classList.contains('collapsed');
        leftToggle.title = navCollapsed ? 'Show sections' : 'Hide sections';
        leftToggle.classList.toggle('panel-collapsed', navCollapsed);
        rightToggle.title = rightCollapsed ? 'Show feedback' : 'Hide feedback';
        rightToggle.classList.toggle('panel-collapsed', rightCollapsed);
      }

      function toggleNav(e) {
        e.preventDefault();
        e.stopPropagation();
        if (nav.classList.contains('collapsed')) {
          nav.classList.remove('collapsed');
          nav.style.width = navWidth + 'px';
        } else {
          navWidth = nav.offsetWidth;
          nav.classList.add('collapsed');
        }
        updateToggles();
        saveLayout();
      }

      function toggleRight(e) {
        e.preventDefault();
        e.stopPropagation();
        if (rightPanel.classList.contains('collapsed')) {
          rightPanel.classList.remove('collapsed');
          rightPanel.style.width = rightWidth + 'px';
        } else {
          rightWidth = rightPanel.offsetWidth;
          rightPanel.classList.add('collapsed');
        }
        updateToggles();
        saveLayout();
      }

      let touchFiredLeft = false, touchFiredRight = false;

      leftToggle.addEventListener('touchend', e => { touchFiredLeft = true; toggleNav(e); }, { passive: false });
      leftToggle.addEventListener('click', e => { if (touchFiredLeft) { touchFiredLeft = false; return; } toggleNav(e); });

      rightToggle.addEventListener('touchend', e => { touchFiredRight = true; toggleRight(e); }, { passive: false });
      rightToggle.addEventListener('click', e => { if (touchFiredRight) { touchFiredRight = false; return; } toggleRight(e); });

      updateToggles();

      function onDragStart(e, side) {
        e.preventDefault();
        dragging = side;
        document.body.classList.add('resizing');
        (side === 'left' ? leftHandle : rightHandle).classList.add('dragging');
      }

      leftHandle.addEventListener('mousedown', e => onDragStart(e, 'left'));
      rightHandle.addEventListener('mousedown', e => onDragStart(e, 'right'));

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        applyDrag(e.clientX);
      });

      document.addEventListener('mouseup', endDrag);

      leftHandle.addEventListener('touchstart', e => { e.preventDefault(); onDragStart(e, 'left'); }, { passive: false });
      rightHandle.addEventListener('touchstart', e => { e.preventDefault(); onDragStart(e, 'right'); }, { passive: false });

      document.addEventListener('touchmove', e => {
        if (!dragging) return;
        e.preventDefault();
        applyDrag(e.touches[0].clientX);
      }, { passive: false });

      document.addEventListener('touchend', endDrag);

      function applyDrag(clientX) {
        if (dragging === 'left') {
          const w = Math.max(140, Math.min(400, clientX));
          nav.classList.remove('collapsed');
          nav.style.width = w + 'px';
          navWidth = w;
        } else {
          const w = Math.max(200, Math.min(600, window.innerWidth - clientX));
          rightPanel.classList.remove('collapsed');
          rightPanel.style.width = w + 'px';
          rightWidth = w;
        }
        updateToggles();
      }

      function endDrag() {
        if (!dragging) return;
        document.body.classList.remove('resizing');
        leftHandle.classList.remove('dragging');
        rightHandle.classList.remove('dragging');
        dragging = null;
        saveLayout();
      }
    })();

    loadFromStorage();
    document.querySelectorAll('.filter-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.filter === state.activeFilter);
    });
    renderAll();
  </script>
</body>

</html>
