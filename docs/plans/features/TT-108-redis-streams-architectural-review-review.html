        id: "proposal-summary",
        title: "Proposal Summary",
        content: `### What's Being Proposed

Use Redis Streams as a persistent, ordered log of fill events to model position construction as an event-sourced sequence.

- **Core idea:** A position is not a static object — it is the result of a sequence of fills over time
- **Only fills recorded** (not orders) — each fill is a state-changing event
- **Streams grouped by underlying** — all fills for a given underlying (stock, options, futures) in one stream
- **Complements existing architecture** — Pub/Sub stays for market data, Streams added for durable fill history

### Current Architecture (unchanged)

| Component | Role | Stays? |
|-----------|------|--------|
| Redis Pub/Sub | Real-time market data (quotes, candles) | Yes |
| InfluxDB | Time-series analysis | Yes |
| account-stream | Positions, balances, orders from brokerage | Yes |
| subscribe | Quotes, Greeks, candles from DXLink | Yes |

### What Streams Would Enable

1. Deterministic position reconstruction from fill replay
2. Accurate realized/unrealized P&L tracking
3. Strategy lifecycle visibility (entry → scaling → adjustment → exit)
4. Replay and debugging of complex multi-leg strategies
5. Decoupled consumption via consumer groups`

The fundamental insight — that positions are event-sourced constructs built from a sequence of fills — is architecturally sound and worth pursuing.

**Why this matters:**

- Today, position state is derived from brokerage snapshots. The *how we got here* is not explicitly modeled as a first-class construct
- Fills are the atomic unit of position change — modeling them explicitly enables deterministic reconstruction
- This aligns with how trading actually occurs: entry → scaling → adjustment → exit

**This is a genuine capability gap.** The current system handles "what is the position now" well, but "how did this position get built" requires manual investigation.

### Reviewer Decision Point

Does the team agree that event-sourcing positions from fills addresses a real gap in the current system?`

        content: `### Assessment: Strong

Redis Streams consumer groups solve a real limitation of Pub/Sub for fill processing.

**What Pub/Sub lacks:**

- Message acknowledgment — if a consumer is down, fills are lost
- Backpressure — slow consumers can't catch up
- Independent offsets — consumers can't rewind or replay

**What Streams provide:**

- Each consumer group tracks its own offset independently
- Messages are acknowledged after processing — no silent data loss
- Multiple consumers (P&L engine, risk analysis, analytics) can process the same fill stream at their own pace without interfering

This is the real unlock — not just durability, but **decoupled, reliable fan-out for state-changing events**.

### Reviewer Decision Point

Is the consumer-group model the right fit for the downstream consumers we envision (P&L, risk, analytics)?`

**Q1: Do we overwrite old streams if not previously flushed in a prior session? How does Redis handle that?**

Redis Streams are append-only. If a stream from a prior session still exists, new XADDs append to it — they don't overwrite. This means a stale stream could contain old fills followed by fresh hydration data, creating duplicates.

**Recommended approach:** On startup, **DEL the stream key before hydrating**. This gives us a clean slate each time. Since InfluxDB is the system of record, we lose nothing — we're just rebuilding the working set.

\`\`\`mermaid
graph LR
    subgraph startup["Startup Sequence"]
        A["DEL fills:*<br/><i>clean slate</i>"] --> B["Fetch open<br/>positions"]
        B --> C["Query InfluxDB<br/>for fills"]
        C --> D["XADD to<br/>streams"]
        D --> E["Begin live<br/>appending"]
    end

    style startup fill:transparent,stroke:#58a6ff
    style A fill:#1c2128,stroke:#f85149,color:#e6edf3
    style B fill:#1c2128,stroke:#3fb950,color:#e6edf3
    style C fill:#1c2128,stroke:#3fb950,color:#e6edf3
    style D fill:#1c2128,stroke:#58a6ff,color:#e6edf3
    style E fill:#1c2128,stroke:#58a6ff,color:#e6edf3
\`\`\`

**Q2: Is it idempotent?**

With the DEL-then-hydrate approach, yes — running startup twice produces the same result. The stream is always a fresh projection of InfluxDB + any live fills since hydration.

Without the DEL step, it would **not** be idempotent (duplicate fills would accumulate).

**Q3: Do we need a mechanism to flush on restart?**

Yes. The DEL-before-hydrate pattern handles this naturally — every restart is a clean rebuild. No separate flush mechanism needed. If we want to be explicit, account-stream's shutdown handler can also DEL known stream keys as a belt-and-suspenders measure.

### Reviewer Decision Point

Does the DEL-then-hydrate pattern (clean slate on every startup) satisfy the idempotency and flush concerns?`

    style BK fill:#1c2128,stroke:#30363d,color:#8b949e
    style AS fill:#1c2128,stroke:#d29922,color:#e6edf3
    style INF fill:#1c2128,stroke:#3fb950,color:#e6edf3
    style PS fill:#1c2128,stroke:#30363d,color:#8b949e
    style RS fill:#1c2128,stroke:#58a6ff,color:#e6edf3
\`\`\`

### Data Flow

\`\`\`mermaid
sequenceDiagram
    participant INF as InfluxDB
    participant AS as account-stream
    participant RS as Redis Streams

    Note over INF,RS: Startup / Hydration Phase
    INF->>RS: Query historical fills for open positions
    Note right of RS: Stream populated with ordered fills

    Note over INF,RS: Live Phase
    AS->>INF: Write fill (existing)
    AS->>RS: XADD fill (new)
    Note right of RS: Consumers process sequenced fills
\`\`\`

### Key Implications

- **InfluxDB is authoritative** — always. Streams are derived.
- **No consistency problem** — if a Stream write fails, the fill is still in InfluxDB. Rehydrate to recover.

        content: `### Assessment: Builds on Existing Processes

**Reviewer feedback:** We already have semi-successful processes. We should do a review of actual trades and available data to demonstrate typical use cases.

### What Already Exists

The codebase already does fill-based position reconstruction in two places:

1. **\`transactions.py\` — LIFO Entry Credit Computation**
   - Fetches fills from \`GET /accounts/{acct}/transactions\`
   - \`compute_entry_credit_lifo()\` walks transactions newest-to-oldest
   - Reconstructs which specific fills constitute the current position
   - Computes dollar-valued entry credits from those fills

2. **\`orchestrator.py\` — \`monitor_fills_for_entry_credits()\`**
   - Subscribes to the Order pub/sub channel
   - On \`FILLED\` status: extracts fills from \`order.legs[*].fills\`
   - Resolves multiplier, computes entry credits, publishes to Redis

**Redis Streams would improve this by:**
- Making the fill sequence a **persistent, queryable working set** instead of recomputing from the API each time
- Enabling **multiple consumers** (P&L, analytics, strategy tracking) to independently process the same fill history
- Replacing the per-request API fetch with a local ordered log

### Proposed Data Review

To determine backfill granularity, investigate actual trades for representative scenarios:

- **Single-leg option** — simple open/close lifecycle
- **Vertical spread** — multi-leg simultaneous entry
- **Rolling/adjusting** — position that transforms over time (e.g., vertical → iron condor)
- **Partial fills** — orders that fill across multiple executions

This review will show what data is available in InfluxDB vs. what needs to come from the Transactions API.

### Reviewer Decision Point

Should we create a follow-up ticket for the data review investigation?`

        content: `A consumer crashes after processing a fill but before acknowledging it. On restart, it replays the fill.

**Is the processing idempotent?**

With the approved DEL-then-hydrate startup pattern, this is largely resolved — streams are rebuilt fresh. For live fills during normal operation, consumer groups track acknowledgment via XACK. An unacknowledged fill will be redelivered.

**Suggested approach:** Consumers should be idempotent by design — applying the same fill twice should produce the same state. For position tabulation, this means "set quantity to X" rather than "add X to quantity."

### Reviewer Decision Point

Is idempotent consumer design sufficient, or do we need explicit dedup at the consumer level?`

        id: "replay-ordering",
        title: "Replay: Out-of-Order Fills",
        revised: true,
        content: `The brokerage sends a correction or a late fill that should have been sequenced earlier. Does the stream order match the actual execution order?

**Context:** Redis Streams enforce append order (the order of XADD calls). This matches the order fills arrive from the brokerage websocket, which is generally chronological.

**Edge cases:**

- Brokerage reconnection may replay fills from a prior session
- A fill correction (e.g., busted trade) has no standard representation

**Suggested approach:** Trust the brokerage delivery order for live fills. For hydration, InfluxDB fills are queried with \`ORDER BY filled_at\`, so chronological order is guaranteed. If a correction arrives, treat it as a new event (not an edit to an existing entry).

### Reviewer Decision Point

Is "trust brokerage delivery order + chronological hydration from InfluxDB" sufficient?`

        id: "replay-partial",
        title: "Replay: Partial Replay & Schema Evolution",
        revised: true,
        content: `**Partial replay:** A consumer wants to rebuild state from a point in time, not from the beginning. How does it know where to start?

Redis Streams support \`XRANGE key <start-id> +\` — consumers can read from any point. Combined with consumer group offsets, a consumer can resume exactly where it left off.

With the DEL-then-hydrate pattern, full replay from the beginning is the default. Partial replay is an optimization for consumers that maintain their own checkpoint.

**Schema evolution:** The fill event format may change over time (new fields, renamed fields). Can old events still be replayed?

Given that streams are ephemeral (rebuilt from InfluxDB on each startup), schema evolution is a non-issue for the stream layer. Old events are never retained across restarts — they're always re-projected from InfluxDB through current code.

### Reviewer Decision Point

Does the ephemeral nature of streams (rebuilt each startup) make partial replay and schema evolution non-concerns?

**Subtask:** [TT-112](https://mandeng.atlassian.net/browse/TT-112) — Revisit this assumption before merging the TT-108 PR.`

**Hydration scope:** On startup, pull **all fills** from InfluxDB for each underlying that has an open position. No time-window filtering — the full fill history for that underlying is loaded into the stream.

### Retention Model

\`\`\`mermaid
graph TD
    subgraph retained["Streams Retained During Session"]
        A["fills:{account}:SPY<br/><i>all SPY fills (open position)</i>"]
        B["fills:{account}:/ESM6<br/><i>all /ESM6 fills (open position)</i>"]
    end

    subgraph flushed["Flushed at Shutdown / No Open Position"]
        C["fills:{account}:AAPL<br/><i>position closed mid-session</i>"]

    INF[("InfluxDB")] -->|"all fills by underlying"| A
    INF -->|"all fills by underlying"| B

    style retained fill:transparent,stroke:#3fb950
    style flushed fill:transparent,stroke:#30363d
    style INF fill:#1c2128,stroke:#3fb950,color:#e6edf3

    style B fill:#1c2128,stroke:#58a6ff,color:#e6edf3
    style C fill:#1c2128,stroke:#30363d,color:#8b949e
\`\`\`

### Rules

- **Startup:** DEL existing streams, then hydrate all fills per underlying for open positions
- **During session:** Live fills appended via XADD as they arrive
- **Position closes:** Stream retained until shutdown (may be needed for final P&L)
- **Shutdown:** DEL all streams — rebuilt from InfluxDB on next startup
- **No MAXLEN/MINID needed** — streams are session-scoped, not persistent

### Open Area: Roll Behavior

TastyTrade may handle some roll mechanics automatically, but we haven't studied the mechanism well enough to make a final assessment. Key questions for [TT-110](https://mandeng.atlassian.net/browse/TT-110):

- How much roll tracking can we rely on from the broker?
- What needs to be reconstructed from fills?
- **Longer-term goal:** a broker-agnostic approach to fill tracking that could shift to other broker feeds. We're not there yet — TT-108 builds on TastyTrade's data, but the stream design should avoid baking in broker-specific assumptions where possible.

### Dependencies

- **[TT-110](https://mandeng.atlassian.net/browse/TT-110)** — Futures rollover, broker roll mechanics, contract key schema
- Backfill data review will confirm typical fill counts per underlying

### Reviewer Decision Point

Confirmed: all fills by underlying for open positions, session-scoped, DEL at shutdown?`

### Architecture

\`\`\`mermaid
graph TD
    BK["Brokerage WebSocket"] --> AS["account-stream<br/><i>existing service</i>"]
    AS -->|"write (existing)"| INF[("InfluxDB<br/><i>System of Record</i>")]
    AS -->|"publish (existing)"| PS["Pub/Sub"]
    AS -->|"XADD (new)"| RS["Redis Streams<br/><i>Compute Layer</i>"]
    INF -->|"hydrate"| RS

    RS --> CG{"Consumer Groups"}
    CG --> PL["P&L Chart<br/>over time"]
    CG --> PT["Position<br/>Tabulation"]
    CG --> SL["Strategy<br/>Lifecycle"]

    style BK fill:#1c2128,stroke:#30363d,color:#8b949e
    style AS fill:#1c2128,stroke:#d29922,color:#e6edf3
    style INF fill:#1c2128,stroke:#3fb950,color:#e6edf3
    style PS fill:#1c2128,stroke:#30363d,color:#8b949e
    style RS fill:#1c2128,stroke:#58a6ff,color:#e6edf3
    style CG fill:#1c2128,stroke:#58a6ff,color:#e6edf3
    style PL fill:#1c2128,stroke:#30363d,color:#8b949e
    style PT fill:#1c2128,stroke:#30363d,color:#8b949e
    style SL fill:#1c2128,stroke:#30363d,color:#8b949e
\`\`\`

### Key Design Decisions

- **InfluxDB = system of record** — all fills persist here, always authoritative
- **Redis Streams = compute layer** — sequenced working set for position tabulation and P&L charting
- **Hydration from InfluxDB** — stream is populated from historical fills on startup/demand
- **Live fills appended** — account-stream adds an XADD alongside existing InfluxDB + Pub/Sub writes
- **Streams are disposable** — can be rebuilt from InfluxDB at any time, no durability concern

### What Changes

| Component | Before | After |
|-----------|--------|-------|
| account-stream | Writes to InfluxDB + Pub/Sub | Adds XADD to Redis Stream |
| Redis | Pub/Sub + HSET for state | Adds Streams for sequenced fills |
| InfluxDB | Stores fills | Unchanged — also serves as hydration source |
| Consumers | React to Pub/Sub events | Can also read sequenced fill history from Streams |

### What Doesn't Change

- Pub/Sub for real-time market data and notifications
- InfluxDB as the durable store
- account-stream as the brokerage integration point
- Brokerage snapshots for current position state

### Reviewer Decision Point

Does this revised architecture accurately reflect the intended design?`

    // Render markdown-like content to HTML
    function renderMarkdown(text) {
      let html = '';
      const lines = text.split('\n');
      let inCode = false;
      let codeLang = '';
      let codeLines = [];
      let inList = false;
      let listTag = 'ul';
      let inTable = false;
      let tableRows = [];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.trim().startsWith('```')) {
          if (inCode) {
            if (codeLang === 'mermaid') {
              html += '<div class="mermaid-container"><pre class="mermaid">' + codeLines.join('\n') + '</pre></div>';
            } else {
              html += '<pre><code>' + codeLines.join('\n').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
            }
            codeLines = [];
            inCode = false;
            codeLang = '';
          } else {
            if (inList) { html += '</' + listTag + '>'; inList = false; }
            if (inTable) { html += renderTable(tableRows); inTable = false; tableRows = []; }
            codeLang = line.trim().slice(3).trim().toLowerCase();
            inCode = true;
          }
          continue;
        }
        if (inCode) { codeLines.push(line); continue; }

        if (line.trim().startsWith('|')) {
          if (inList) { html += '</' + listTag + '>'; inList = false; }
          if (!inTable) inTable = true;
          if (!line.trim().match(/^\|[\s-|]+\|$/)) {
            tableRows.push(line);
          }
          continue;
        } else if (inTable) {
          html += renderTable(tableRows);
          inTable = false;
          tableRows = [];
        }

        if (line.trim() === '') {
          if (inList) {
            // Look ahead: if next non-blank line continues the list, keep it open
            let keepList = false;
            for (let j = i + 1; j < lines.length; j++) {
              const next = lines[j].trim();
              if (next === '') continue;
              if (listTag === 'ol' && next.match(/^\d+\.\s/)) keepList = true;
              if (listTag === 'ul' && (next.startsWith('- ') || next.startsWith('* '))) keepList = true;
              break;
            }
            if (!keepList) { html += '</' + listTag + '>'; inList = false; }
          }
          continue;
        }

        if (line.startsWith('### ')) {
          if (inList) { html += '</' + listTag + '>'; inList = false; }
          html += '<h4 style="font-size:14px;font-weight:600;color:var(--text);margin:16px 0 8px">' + inlineFormat(line.slice(4)) + '</h4>';
          continue;
        }

        if (line.trim().startsWith('- ') || line.trim().startsWith('* ')) {
          if (inList && listTag !== 'ul') { html += '</' + listTag + '>'; inList = false; }
          if (!inList) { listTag = 'ul'; html += '<ul>'; inList = true; }
          html += '<li>' + inlineFormat(line.trim().slice(2)) + '</li>';
          continue;
        }
        if (line.trim().match(/^\d+\.\s/)) {
          if (inList && listTag !== 'ol') { html += '</' + listTag + '>'; inList = false; }
          if (!inList) { listTag = 'ol'; html += '<ol>'; inList = true; }
          html += '<li>' + inlineFormat(line.trim().replace(/^\d+\.\s/, '')) + '</li>';
          continue;
        }

        if (inList) { html += '</' + listTag + '>'; inList = false; }
        html += '<p>' + inlineFormat(line) + '</p>';
      }

      if (inCode) html += '<pre><code>' + codeLines.join('\n').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
      if (inList) html += '</' + listTag + '>';
      if (inTable) html += renderTable(tableRows);

      return html;
    }

    function renderTable(rows) {
      if (rows.length === 0) return '';
      let html = '<table>';
      rows.forEach((row, idx) => {
        const cells = row.split('|').filter(c => c.trim() !== '');
        const tag = idx === 0 ? 'th' : 'td';
        html += '<tr>' + cells.map(c => `<${tag}>${inlineFormat(c.trim())}</${tag}>`).join('') + '</tr>';
      });
      html += '</table>';
      return html;
    }

    function inlineFormat(text) {
      return text
        .replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent);text-decoration:none">$1</a>')
        .replace(/\\`/g, '`');
    }

        list.innerHTML = `<div class="prompt-placeholder">
      ${state.activeFilter === 'all'
            ? 'Review sections by clicking Approve, Needs Revision, or Question. Your feedback will appear here.'
            : 'No sections with this status yet.'}
    </div>`;
        return;
      }

      list.innerHTML = filtered.map(s => `
    <div class="feedback-item" onclick="navigateTo('${s.id}')" style="cursor:pointer">
      <div class="fb-section">
        <span class="fb-status ${s.status}">${s.status === 'approved' ? 'APPROVED' : s.status === 'revision' ? 'REVISION' : 'QUESTION'}</span>
        ${s.title}
      </div>
      ${s.comment ? `<div class="fb-comment">"${s.comment}"</div>` : ''}
    </div>
  `).join('');
    }

    // Actions
    function navigateTo(id) {
      state.activeSection = id;
      saveToStorage();
      renderNav();
      var el = document.getElementById('section-' + id);
      var panel = document.getElementById('docPanel');
      panel.scrollTo({ top: el.offsetTop - panel.offsetTop, behavior: 'smooth' });
    }

    function setStatus(id, status) {
      const section = state.sections.find(s => s.id === id);
      if (section.status === status) {
        section.status = 'pending';
      } else {
        section.status = status;
        if (status === 'revision' || status === 'question') {
          setTimeout(() => {
            const area = document.getElementById('comment-' + id);
            if (area) area.classList.add('visible');
          }, 50);
        }
      }
      renderAll();
      saveToStorage();
    }

    function toggleComment(id) {
      const area = document.getElementById('comment-' + id);
      area.classList.toggle('visible');
      if (area.classList.contains('visible')) {
        const ta = document.getElementById('textarea-' + id);
        if (ta) ta.focus();
      }
    }

    function saveComment(id, value) {
      const section = state.sections.find(s => s.id === id);
      section.comment = value.trim();
      renderAll();
      saveToStorage();
    }

    function editComment(id) {
      const section = state.sections.find(s => s.id === id);
      const area = document.getElementById('comment-' + id);
      area.innerHTML = `<textarea placeholder="Edit your feedback..."
    onblur="saveComment('${id}', this.value)"
    id="textarea-${id}">${section.comment}</textarea>`;
      area.classList.add('visible');
      document.getElementById('textarea-' + id).focus();
    }

    function generatePrompt() {
      const approved = state.sections.filter(s => s.status === 'approved');
      const revision = state.sections.filter(s => s.status === 'revision');
      const questions = state.sections.filter(s => s.status === 'question');

      if (approved.length === 0 && revision.length === 0 && questions.length === 0) {
        return '';
      }

      let prompt = `Here is my review of the ${PLAN_NAME} plan:\n\n`;

      if (approved.length > 0) {
        prompt += `## Approved Sections (${approved.length}/${state.sections.length})\n`;
        approved.forEach(s => {
          prompt += `- **${s.title}**: Approved`;
          if (s.comment) prompt += ` — ${s.comment}`;
          prompt += '\n';
        });
        prompt += '\n';
      }

      if (revision.length > 0) {
        prompt += `## Needs Revision (${revision.length})\n`;
        revision.forEach(s => {
          prompt += `- **${s.title}**`;
          if (s.comment) prompt += `: ${s.comment}`;
          else prompt += ': (no specific feedback provided)';
          prompt += '\n';
        });
        prompt += '\n';
      }

      if (questions.length > 0) {
        prompt += `## Questions (${questions.length})\n`;
        questions.forEach(s => {
          prompt += `- **${s.title}**`;
          if (s.comment) prompt += `: ${s.comment}`;
          else prompt += ': (question not specified)';
          prompt += '\n';
        });
        prompt += '\n';
      }

      const remaining = state.sections.filter(s => s.status === 'pending');
      if (remaining.length > 0) {
        prompt += `## Not Yet Reviewed (${remaining.length})\n`;
        remaining.forEach(s => prompt += `- ${s.title}\n`);
      }

      return prompt;
    }

    function copyPrompt() {
      const prompt = generatePrompt();
      if (!prompt) return;
      const btn = document.getElementById('copyBtn');
      function onSuccess() {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy Feedback as Prompt'; btn.classList.remove('copied'); }, 2000);
      }
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(prompt).then(onSuccess).catch(fallbackCopy);
      } else {
        fallbackCopy();
      }
      function fallbackCopy() {
        const ta = document.createElement('textarea');
        ta.value = prompt;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); onSuccess(); } catch (e) { btn.textContent = 'Copy failed'; }
        document.body.removeChild(ta);
      }
    }

    // Filter tabs
    document.getElementById('filterTabs').addEventListener('click', e => {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;
      state.activeFilter = tab.dataset.filter;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderFeedback();
      saveToStorage();
    });

    function renderAll() {
      renderNav();
      renderDoc();
      renderStats();
      renderFeedback();
      document.querySelectorAll('.mermaid[data-processed]').forEach(el => el.removeAttribute('data-processed'));
      if (typeof mermaid !== 'undefined') mermaid.run();
    }

    // Resizable & collapsible panels (mouse + touch)
    (function () {
      const nav = document.getElementById('nav');
      const rightPanel = document.getElementById('rightPanel');
      const leftHandle = document.getElementById('leftHandle');
      const rightHandle = document.getElementById('rightHandle');
      const leftToggle = document.getElementById('leftToggle');
      const rightToggle = document.getElementById('rightToggle');

      let dragging = null;
      let navWidth = 240;
      let rightWidth = 360;

      // Restore saved layout
      const savedLayout = (() => { try { return JSON.parse(localStorage.getItem(LAYOUT_KEY) || '{}'); } catch (e) { return {}; } })();
      if (savedLayout.navWidth) navWidth = savedLayout.navWidth;
      if (savedLayout.rightWidth) rightWidth = savedLayout.rightWidth;
      if (savedLayout.navCollapsed) nav.classList.add('collapsed');
      else nav.style.width = navWidth + 'px';
      if (savedLayout.rightCollapsed) rightPanel.classList.add('collapsed');
      else rightPanel.style.width = rightWidth + 'px';

      function saveLayout() {
        try {
          localStorage.setItem(LAYOUT_KEY, JSON.stringify({
            navWidth, rightWidth,
            navCollapsed: nav.classList.contains('collapsed'),
            rightCollapsed: rightPanel.classList.contains('collapsed')
          }));
        } catch (e) { }
      }

      function updateToggles() {
        const navCollapsed = nav.classList.contains('collapsed');
        const rightCollapsed = rightPanel.classList.contains('collapsed');
        leftToggle.title = navCollapsed ? 'Show sections' : 'Hide sections';
        leftToggle.classList.toggle('panel-collapsed', navCollapsed);
        rightToggle.title = rightCollapsed ? 'Show feedback' : 'Hide feedback';
        rightToggle.classList.toggle('panel-collapsed', rightCollapsed);
      }

      function toggleNav(e) {
        e.preventDefault();
        e.stopPropagation();
        if (nav.classList.contains('collapsed')) {
          nav.classList.remove('collapsed');
          nav.style.width = navWidth + 'px';
        } else {
          navWidth = nav.offsetWidth;
          nav.classList.add('collapsed');
        }
        updateToggles();
        saveLayout();
      }

      function toggleRight(e) {
        e.preventDefault();
        e.stopPropagation();
        if (rightPanel.classList.contains('collapsed')) {
          rightPanel.classList.remove('collapsed');
          rightPanel.style.width = rightWidth + 'px';
        } else {
          rightWidth = rightPanel.offsetWidth;
          rightPanel.classList.add('collapsed');
        }
        updateToggles();
        saveLayout();
      }

      let touchFiredLeft = false, touchFiredRight = false;

      leftToggle.addEventListener('touchend', e => { touchFiredLeft = true; toggleNav(e); }, { passive: false });
      leftToggle.addEventListener('click', e => { if (touchFiredLeft) { touchFiredLeft = false; return; } toggleNav(e); });

      rightToggle.addEventListener('touchend', e => { touchFiredRight = true; toggleRight(e); }, { passive: false });
      rightToggle.addEventListener('click', e => { if (touchFiredRight) { touchFiredRight = false; return; } toggleRight(e); });

      updateToggles();

      // Drag resize (mouse)
      function onDragStart(e, side) {
        e.preventDefault();
        dragging = side;
        document.body.classList.add('resizing');
        (side === 'left' ? leftHandle : rightHandle).classList.add('dragging');
      }

      leftHandle.addEventListener('mousedown', e => onDragStart(e, 'left'));
      rightHandle.addEventListener('mousedown', e => onDragStart(e, 'right'));

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        applyDrag(e.clientX);
      });

      document.addEventListener('mouseup', endDrag);

      // Drag resize (touch)
      leftHandle.addEventListener('touchstart', e => { e.preventDefault(); onDragStart(e, 'left'); }, { passive: false });
      rightHandle.addEventListener('touchstart', e => { e.preventDefault(); onDragStart(e, 'right'); }, { passive: false });

      document.addEventListener('touchmove', e => {
        if (!dragging) return;
        e.preventDefault();
        applyDrag(e.touches[0].clientX);
      }, { passive: false });

      document.addEventListener('touchend', endDrag);

      function applyDrag(clientX) {
        if (dragging === 'left') {
          const w = Math.max(140, Math.min(400, clientX));
          nav.classList.remove('collapsed');
          nav.style.width = w + 'px';
          navWidth = w;
        } else {
          const w = Math.max(200, Math.min(600, window.innerWidth - clientX));
          rightPanel.classList.remove('collapsed');
          rightPanel.style.width = w + 'px';
          rightWidth = w;
        }
        updateToggles();
      }

      function endDrag() {
        if (!dragging) return;
        document.body.classList.remove('resizing');
        leftHandle.classList.remove('dragging');
        rightHandle.classList.remove('dragging');
        dragging = null;
        saveLayout();
      }
    })();

    mermaid.initialize({ startOnLoad: false, theme: 'dark', themeVariables: {
      primaryColor: '#1c2128', primaryTextColor: '#e6edf3', primaryBorderColor: '#30363d',
      lineColor: '#58a6ff', secondaryColor: '#161b22', tertiaryColor: '#21262d',
      nodeTextColor: '#e6edf3', edgeLabelBackground: '#161b22'
    }});

    loadFromStorage();
    document.querySelectorAll('.filter-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.filter === state.activeFilter);
    });
    renderAll();
  </script>
</body>

</html>
