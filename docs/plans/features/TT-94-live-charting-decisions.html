        id: "context",
        title: "Context & Existing Infrastructure",
        content: `This plan proposes a **live charting module** for the tastytrade SDK — a ThinkorSwim-style interactive stock chart with Hull MA and MACD indicators, rendered in the browser with real-time updates from the existing Redis streaming infrastructure.

### What Exists Today

- **Chart playground notebook** — Plotly-based, 2-subplot candlestick + indicators (\`src/devtools/playground_charts.ipynb\`)
- **Indicator math** — Hull MA-20 and MACD (12/26/9) already implemented in \`src/tastytrade/analytics/indicators/momentum.py\`
- **Visualization layer** — Plot builder, annotation models, horizontal line models in \`src/tastytrade/analytics/visualizations/\`
- **Redis streaming** — Dual pub/sub + HSET for all market events (quotes, candles, greeks)
- **InfluxDB persistence** — All candle data written to time-series DB via Telegraf processor
- **RedisSubscription** — Typed event-driven consumer with callbacks (\`src/tastytrade/providers/subscriptions.py\`)

### Proposed Module Structure

\`\`\`
src/tastytrade/charting/
├── __init__.py
├── server.py           # WebSocket server + static file serving
├── feed.py             # Redis → WebSocket bridge
├── indicators.py       # Streaming-aware Hull/MACD wrappers
├── levels.py           # Prior day + opening range computation
└── static/
    ├── index.html      # Single-page chart app
    └── chart.js        # Charting lib setup + WS consumer
\`\`\`

### Data Flow

\`\`\`
DXLink → Redis pub/sub → Python WS Server → Browser

On connect:
  1. Fetch historical candles (InfluxDB or Redis)
  2. Compute indicators server-side (Hull, MACD)
  3. Compute horizontal levels (prior day, opening range)
  4. Send initial payload as JSON

On each CandleEvent:
  1. Update indicator state incrementally
  2. Send delta: {candle, hma_point, macd_point}
\`\`\`

**Key principle:** The browser only receives deltas — one candle update at a time. No full recomputation, no full redraws.`

        id: "data-source",
        title: "Decision 1: Historical Data Source",
        revised: true,
        content: `**Decision: InfluxDB for historical queries, Redis for live feeds.**

This establishes a clear architectural separation of duties across the system:

| Concern | Source | Pattern |
|---------|--------|---------|
| Live market data | Redis pub/sub | Event-driven, real-time deltas |
| Historical candles | InfluxDB | Query-based, on-demand lookback |

### Rationale

The question was raised whether querying InfluxDB directly breaks the Redis-as-bus pattern. After review, the conclusion is that **history and live data are fundamentally different access patterns** and should use the right tool for each:

- **Redis pub/sub** excels at real-time event delivery — this is what powers all live feeds today
- **InfluxDB** excels at time-range queries with arbitrary lookback windows — candle data is already persisted there via \`TelegrafHTTPEventProcessor\`
- Forcing Redis to store full candle history (sorted sets, etc.) would add complexity without benefit — it would duplicate what InfluxDB already does well

### Implementation

- Historical data accessed via existing \`MarketDataProvider.download()\` — proven query path, already handles multiple intervals
- Live updates via Redis \`async for message in pubsub.listen()\` — the pub/sub listen loop IS the event loop, no callbacks
- The charting module depends on both, but through **protocols** (\`MarketDataProvider\` protocol for history, \`RedisSubscription\` for live) — no direct DB coupling

### Architectural Rule

> **Live feeds → Redis pub/sub. Historical queries → InfluxDB.** This applies to the charting module and establishes the pattern for any future consumer that needs both real-time and historical data.`

        content: `**Question:** What does "standalone" mean for this module? How is it launched and consumed?

### Option A: CLI Entry Point Only

A \`tasty-chart\` command (registered in \`pyproject.toml\` scripts) that starts the WebSocket server and opens a browser tab. Single-purpose, simple.

\`\`\`bash
tasty-chart                    # Default: SPX 1-min
tasty-chart --symbol AAPL      # Override symbol
tasty-chart --port 8080        # Override port
\`\`\`

### Option B: Embeddable Library Only

A module other tools can \`import\` — \`from tastytrade.charting import ChartServer\`. No CLI, no scripts entry point. Consumers wire it into their own server or application.

### Option C: Both — Library + CLI Wrapper ⟵ Recommended

Core logic as importable classes (\`ChartFeed\`, \`ChartServer\`, \`StreamingIndicators\`), plus a thin CLI entry point that wires them together. Maximum flexibility:

\`\`\`python
# Library usage
from tastytrade.charting import ChartServer
server = ChartServer(symbol="SPX", interval="1m")
await server.start(port=8080)

# CLI usage (thin wrapper over the above)
# tasty-chart --symbol SPX --port 8080
\`\`\`

### Recommendation

**Option C (Both).** The library layer is where the real value lives. The CLI is just a convenience wrapper — maybe 20 lines of argparse + \`asyncio.run()\`. This avoids painting ourselves into a corner if we later want to embed the chart in a dashboard.`

Pass \`?symbol=SPX\` in the browser URL. No UI needed. Works with browser bookmarks. The server parses the query parameter and subscribes to the matching Redis channel.

### The Notebook's Level Set

The playground notebook renders these levels, matching TOS conventions:

| Level | Color | Style | Opacity | Source |
|-------|-------|-------|---------|--------|
| Prior Close | #FF66FE (magenta) | dotted | 0.45 | Previous day close |
| Prior High | #4CAF50 (green) | dotted | 0.45 | Previous day high |
| Prior Low | #F44336 (red) | dotted | 0.45 | Previous day low |
| 5m OR High | #4CAF50 | solid | 0.75 | 5-min opening range |
| 5m OR Low | #4CAF50 | solid | 0.75 | 5-min opening range |
| 15m OR High | #4CAF50 | solid | 0.45 | 15-min opening range |
| 15m OR Low | #4CAF50 | solid | 0.45 | 15-min opening range |
| 30m OR High | #4CAF50 | dotted | 0.45 | 30-min opening range |
| 30m OR Low | #4CAF50 | dotted | 0.45 | 30-min opening range |

### Option A: Fixed Set — Match Notebook ⟵ Recommended

Render all levels above. Each level has a visibility toggle (eye icon or checkbox) so the user can show/hide individual levels without losing them. No add/remove/edit capability.

- Matches the proven notebook layout
- Simple state: just a \`visible: boolean\` per level
- Computed server-side from prior day candle + opening range query

### Option B: Fully Configurable

### Option A: TradingView lightweight-charts ⟵ Recommended

**Why this is the right choice:**
- **Native \`update()\` method** — updates a single candle without redrawing the entire chart. This is the exact capability the user requested for resource efficiency.
- **Built-in candlestick series** with customizable colors (TOS-style cyan/magenta trivial)

    // Render markdown-like content to HTML
    function renderMarkdown(text) {
      let html = '';
      const lines = text.split('\n');
      let inCode = false;
      let codeLines = [];
      let inList = false;
      let listTag = 'ul';
      let inTable = false;
      let tableRows = [];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.trim().startsWith('```')) {
          if (inCode) {
            html += '<pre><code>' + codeLines.join('\n').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
            codeLines = [];
            inCode = false;
          } else {
            if (inList) { html += `</${listTag}>`; inList = false; }
            if (inTable) { html += renderTable(tableRows); inTable = false; tableRows = []; }
            inCode = true;
          }
          continue;
        }
        if (inCode) { codeLines.push(line); continue; }

        if (line.trim().startsWith('|')) {
          if (inList) { html += `</${listTag}>`; inList = false; }
          if (!inTable) inTable = true;
          if (!line.trim().match(/^\|[\s-|]+\|$/)) {
            tableRows.push(line);
          }
          continue;
        } else if (inTable) {
          html += renderTable(tableRows);
          inTable = false;
          tableRows = [];
        }

        if (line.trim() === '') {
          if (inList) { html += `</${listTag}>`; inList = false; }
          continue;
        }

        if (line.startsWith('### ')) {
          if (inList) { html += `</${listTag}>`; inList = false; }
          html += '<h4 style="font-size:14px;font-weight:600;color:var(--text);margin:16px 0 8px">' + inlineFormat(line.slice(4)) + '</h4>';

        if (line.trim().startsWith('- ') || line.trim().startsWith('* ')) {

          html += '<li>' + inlineFormat(line.trim().slice(2)) + '</li>';

        }
        if (line.trim().match(/^\d+\.\s/)) {
          if (!inList) { listTag = 'ol'; html += '<ol>'; inList = true; }
          html += '<li>' + inlineFormat(line.trim().replace(/^\d+\.\s/, '')) + '</li>';
          continue;

        if (inList) { html += `</${listTag}>`; inList = false; }

      if (inCode) html += '<pre><code>' + codeLines.join('\n').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
      if (inList) html += `</${listTag}>`;
      if (inTable) html += renderTable(tableRows);

    function renderTable(rows) {

        const tag = idx === 0 ? 'th' : 'td';
        html += '<tr>' + cells.map(c => `<${tag}>${inlineFormat(c.trim())}</${tag}>`).join('') + '</tr>';
      });
      html += '</table>';

        .replace(/`([^`]+)`/g, '<code>$1</code>')

        const navCollapsed = nav.classList.contains('collapsed');
        const rightCollapsed = rightPanel.classList.contains('collapsed');
        leftToggle.title = navCollapsed ? 'Show sections' : 'Hide sections';
        leftToggle.classList.toggle('panel-collapsed', navCollapsed);
        rightToggle.title = rightCollapsed ? 'Show feedback' : 'Hide feedback';
        rightToggle.classList.toggle('panel-collapsed', rightCollapsed);
      }

      function toggleNav(e) {
        e.preventDefault();
        e.stopPropagation();
        if (nav.classList.contains('collapsed')) {
          nav.classList.remove('collapsed');
          nav.style.width = navWidth + 'px';
        } else {
          navWidth = nav.offsetWidth;
          nav.classList.add('collapsed');
        }
        updateToggles();
        saveLayout();
      }

      function toggleRight(e) {
        e.preventDefault();
        e.stopPropagation();
        if (rightPanel.classList.contains('collapsed')) {
          rightPanel.classList.remove('collapsed');
          rightPanel.style.width = rightWidth + 'px';
        } else {
          rightWidth = rightPanel.offsetWidth;
          rightPanel.classList.add('collapsed');
        }
        updateToggles();
        saveLayout();
      }

      let touchFiredLeft = false, touchFiredRight = false;

      leftToggle.addEventListener('touchend', e => { touchFiredLeft = true; toggleNav(e); }, { passive: false });
      leftToggle.addEventListener('click', e => { if (touchFiredLeft) { touchFiredLeft = false; return; } toggleNav(e); });

      rightToggle.addEventListener('touchend', e => { touchFiredRight = true; toggleRight(e); }, { passive: false });
      rightToggle.addEventListener('click', e => { if (touchFiredRight) { touchFiredRight = false; return; } toggleRight(e); });

      updateToggles();

      function onDragStart(e, side) {
        e.preventDefault();
        dragging = side;
        document.body.classList.add('resizing');
        (side === 'left' ? leftHandle : rightHandle).classList.add('dragging');
      }

      leftHandle.addEventListener('mousedown', e => onDragStart(e, 'left'));
      rightHandle.addEventListener('mousedown', e => onDragStart(e, 'right'));

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        applyDrag(e.clientX);
      });

      document.addEventListener('mouseup', endDrag);

      leftHandle.addEventListener('touchstart', e => { e.preventDefault(); onDragStart(e, 'left'); }, { passive: false });
      rightHandle.addEventListener('touchstart', e => { e.preventDefault(); onDragStart(e, 'right'); }, { passive: false });

      document.addEventListener('touchmove', e => {
        if (!dragging) return;
        e.preventDefault();
        applyDrag(e.touches[0].clientX);
      }, { passive: false });

      document.addEventListener('touchend', endDrag);

      function applyDrag(clientX) {
        if (dragging === 'left') {
          const w = Math.max(140, Math.min(400, clientX));
          nav.classList.remove('collapsed');
          nav.style.width = w + 'px';
          navWidth = w;
        } else {
          const w = Math.max(200, Math.min(600, window.innerWidth - clientX));
          rightPanel.classList.remove('collapsed');
          rightPanel.style.width = w + 'px';
          rightWidth = w;
        }
        updateToggles();
      }

      function endDrag() {
        if (!dragging) return;
        document.body.classList.remove('resizing');
        leftHandle.classList.remove('dragging');
        rightHandle.classList.remove('dragging');
        dragging = null;
        saveLayout();
      }
    })();

    // Init
    loadFromStorage();
    document.querySelectorAll('.filter-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.filter === state.activeFilter);
    });
    renderAll();
  </script>
</body>

</html>
