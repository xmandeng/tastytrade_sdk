        title: "Context & Problem Statement",
        content: `The current subagent architecture was built for context scarcity (~200K tokens). Three agent definition files totaling **1,373 lines** wrap 21 bash scripts via Skills, with deny rules in \`settings.json\` forcing all Jira/GitHub operations through subagents.

### What's Changed

- **1M context window** — the main agent can hold far more state; delegation-to-save-context is no longer needed
- **Inline MCP in agent frontmatter** — Claude Code supports \`mcpServers:\` in \`.claude/agents/*.md\` files, scoped exclusively to that subagent. The main agent never sees the tools.
- **Tool deferred loading** — MCP tool definitions load on-demand, not upfront

### What We'll Do

Replace bash-script Skills with native MCP servers defined inline in agent frontmatter. The main context stays completely clean — \`allowedMcpServers: []\` remains empty. MCP tools are only available inside the subagent process.

### Current Architecture Cost

| Component | Lines | Purpose |
| jira-workflow.md | 751 | 70% bash script documentation |
| github-workflow.md | 443 | 60% bash script documentation |
| epic-manager.md | 179 | Specialized Epic creation |
| CLAUDE.md routing | ~40 | "CRITICAL: Mandatory Agent Usage" |
| settings.json deny rules | 5 | Force delegation |
| **Total overhead** | **~1,413** | **Routing + script docs** |`

        content: `### Why This Server

| Criteria | Official (atlassian/atlassian-mcp-server) | Community (sooperset/mcp-atlassian) |
| Transport | Remote HTTP + Node.js proxy | **Native stdio via uvx** |
| Auth | OAuth 2.1 or API token (admin required) | **API token (env vars)** |
| Tool count | Not publicly documented | **72 tools, full reference docs** |
| Filtering | None documented | **TOOLSETS + ENABLED_TOOLS** |
| Maintenance | Atlassian | 4.8k stars, 69 releases, active |
| Setup complexity | Node.js proxy + remote endpoint | **Zero — uvx fetches on demand** |

**CHOSEN: sooperset/mcp-atlassian** — native stdio plugs directly into agent frontmatter with zero intermediaries. Uses the same env vars we already have (\`ATLASSIAN_USER_EMAIL\`, \`ATLASSIAN_API_TOKEN\`).

### Inline MCP Config (in jira-workflow.md frontmatter)

\`\`\`yaml
mcpServers:
  mcp-atlassian:
    type: stdio
    command: uvx
    args: ["mcp-atlassian"]
    env:
      JIRA_URL: "\${ATLASSIAN_SITE_NAME}"
      JIRA_USERNAME: "\${ATLASSIAN_USER_EMAIL}"
      JIRA_API_TOKEN: "\${ATLASSIAN_API_TOKEN}"
\`\`\`

**Revision:** \`JIRA_URL\` now uses \`\${ATLASSIAN_SITE_NAME}\` env var instead of a hardcoded URL.

| get-issue.sh | \`jira_get_issue\` |
| search-issues.sh | \`jira_search\` |
| update-issue.sh | \`jira_update_issue\` |

| transition-issue.sh | \`jira_transition_issue\` |
| delete-issue.sh | \`jira_delete_issue\` |
| (new) | \`jira_link_to_epic\` |

**Bonus tools gained:** \`jira_link_to_epic\` (dedicated Epic linking), \`jira_search_fields\`, \`jira_get_field_options\`, \`jira_batch_create_issues\`.`

        content: `### Why This Server

**GitHub's official MCP server** — maintained by GitHub, comprehensive toolset covering repos, issues, PRs, and Actions workflows. Supports \`--toolsets\` flag to limit available tools.

### Installation: Add to docker-compose.yml

Add as a service to the existing \`docker-compose.yml\` alongside influxdb, redis, telegraf, grafana, and redisinsight:

\`\`\`yaml
  github-mcp:
    image: ghcr.io/github/github-mcp-server
    container_name: github-mcp
    labels:
      - "traefik.enable=false"
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=\${GITHUB_PERSONAL_ACCESS_TOKEN}
    stdin_open: true
    networks:
      - internal_net
\`\`\`

### Inline MCP Config (in github-workflow.md frontmatter)

The agent frontmatter references the container via \`docker compose exec\`:

\`\`\`yaml
mcpServers:
  github:
    type: stdio
    command: docker
    args: ["compose", "exec", "-T", "github-mcp", "/github-mcp-server", "stdio", "--toolsets", "repos,issues,pull_requests,actions"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "\${GITHUB_PERSONAL_ACCESS_TOKEN}"
\`\`\`

**Revision:** Added to docker-compose.yml as a managed service instead of ad-hoc \`docker run\`.

### Key MCP Tools Replacing Bash Scripts

| Bash Script | MCP Tool | Notes |
| create-pr.sh | \`create_pull_request\` | Direct replacement |
| list-prs.sh | \`list_pull_requests\` | Direct replacement |
| get-pr.sh | \`get_pull_request\` | Direct replacement |
| get-pr-files.sh | \`get_pull_request_files\` | Direct replacement |
| edit-pr.sh | \`update_pull_request\` | Direct replacement |
| add-pr-comment.sh | MCP comment tool | Direct replacement |
| create-branch.sh | \`create_branch\` + Bash | Two-step (see below) |
| list-branches.sh | \`list_branches\` | Direct replacement |
| list-workflow-runs.sh | \`list_workflow_runs\` | Direct replacement |
| get-workflow-run.sh | \`get_workflow_run\` | Direct replacement |
| rerun-workflow.sh | MCP \`rerun_workflow\` | Via \`actions\` toolset |

### Branch Creation: MCP + Bash Hybrid

The current \`create-branch.sh\` does three things: (1) creates branch via GitHub API (triggers Jira automation), (2) fetches locally, (3) creates worktree. With MCP:

1. **MCP** \`create_branch\` — creates remote branch via API (triggers Jira "In Progress")
2. **Bash** — \`git fetch origin <branch> && git worktree add /tmp/worktrees/TT-XXX origin/<branch>\`

This two-step pattern must be explicitly documented in the agent definition.`

    // Render markdown-like content to HTML
    function renderMarkdown(text) {
      let html = '';
      const lines = text.split('\n');
      let inCode = false;
      let codeLines = [];
      let inList = false;
      let inTable = false;
      let tableRows = [];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.trim().startsWith('```')) {
          if (inCode) {
            html += '<pre><code>' + codeLines.join('\n').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
            codeLines = [];
            inCode = false;
          } else {
            if (inList) { html += '</ul>'; inList = false; }
            if (inTable) { html += renderTable(tableRows); inTable = false; tableRows = []; }
            inCode = true;
          }
          continue;
        }
        if (inCode) { codeLines.push(line); continue; }

        if (line.trim().startsWith('|')) {
          if (inList) { html += '</ul>'; inList = false; }
          if (!inTable) inTable = true;
          if (!line.trim().match(/^\|[\s-|]+\|$/)) {
            tableRows.push(line);
          }
          continue;
        } else if (inTable) {
          html += renderTable(tableRows);
          inTable = false;
          tableRows = [];
        }

        if (line.trim() === '') {
          if (inList) { html += '</ul>'; inList = false; }
          continue;
        }

        if (line.startsWith('### ')) {
          if (inList) { html += '</ul>'; inList = false; }
          html += '<h4 style="font-size:14px;font-weight:600;color:var(--text);margin:16px 0 8px">' + inlineFormat(line.slice(4)) + '</h4>';
          continue;
        }

        if (line.trim().startsWith('- ') || line.trim().startsWith('* ')) {
          if (!inList) { html += '<ul>'; inList = true; }
          html += '<li>' + inlineFormat(line.trim().slice(2)) + '</li>';
          continue;
        }
        if (line.trim().match(/^\d+\.\s/)) {
          if (!inList) { html += '<ol>'; inList = true; }
          html += '<li>' + inlineFormat(line.trim().replace(/^\d+\.\s/, '')) + '</li>';
          continue;
        }

        if (inList) { html += '</ul>'; inList = false; }
        html += '<p>' + inlineFormat(line) + '</p>';
      }

      if (inCode) html += '<pre><code>' + codeLines.join('\n').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
      if (inList) html += '</ul>';
      if (inTable) html += renderTable(tableRows);

      return html;
    }

    function renderTable(rows) {
      if (rows.length === 0) return '';
      let html = '<table>';
      rows.forEach((row, idx) => {
        const cells = row.split('|').filter(c => c.trim() !== '');
        const tag = idx === 0 ? 'th' : 'td';
        html += '<tr>' + cells.map(c => `<${tag}>${inlineFormat(c.trim())}</${tag}>`).join('') + '</tr>';
      });
      html += '</table>';
      return html;
    }

    function inlineFormat(text) {
      return text
        .replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent);text-decoration:none">$1</a>')
        .replace(/\\`/g, '`');
    }

    function navigateTo(id) {

      const section = state.sections.find(s => s.id === id);
      if (section.status === status) {

    function generatePrompt() {
      const approved = state.sections.filter(s => s.status === 'approved');
      const revision = state.sections.filter(s => s.status === 'revision');
      const questions = state.sections.filter(s => s.status === 'question');

      if (approved.length === 0 && revision.length === 0 && questions.length === 0) {
        return '';
      }

      let prompt = `Here is my review of the ${PLAN_NAME} plan:\n\n`;

      if (approved.length > 0) {
        prompt += `## Approved Sections (${approved.length}/${state.sections.length})\n`;
        approved.forEach(s => {
          prompt += `- **${s.title}**: Approved`;
          if (s.comment) prompt += ` — ${s.comment}`;
          prompt += '\n';
        });
        prompt += '\n';
      }

      if (revision.length > 0) {
        prompt += `## Needs Revision (${revision.length})\n`;
        revision.forEach(s => {
          prompt += `- **${s.title}**`;
          if (s.comment) prompt += `: ${s.comment}`;
          else prompt += ': (no specific feedback provided)';
          prompt += '\n';
        });
        prompt += '\n';
      }

      if (questions.length > 0) {
        prompt += `## Questions (${questions.length})\n`;
        questions.forEach(s => {
          prompt += `- **${s.title}**`;
          if (s.comment) prompt += `: ${s.comment}`;
          else prompt += ': (question not specified)';
          prompt += '\n';
        });
        prompt += '\n';
      }

      const remaining = state.sections.filter(s => s.status === 'pending');
      if (remaining.length > 0) {
        prompt += `## Not Yet Reviewed (${remaining.length})\n`;
        remaining.forEach(s => prompt += `- ${s.title}\n`);
      }

      return prompt;
    }

    function copyPrompt() {
      const prompt = generatePrompt();
      if (!prompt) return;
      const btn = document.getElementById('copyBtn');
      // Try clipboard API first, fall back to textarea select
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(prompt).then(() => {
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'Copy Feedback as Prompt'; btn.classList.remove('copied'); }, 2000);
        }).catch(() => showCopyFallback(prompt));
      } else {
        showCopyFallback(prompt);
      }
    }

    function showCopyFallback(text) {
      // Fallback: create a temporary textarea for manual copy
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:80vw;height:60vh;z-index:9999;background:var(--bg-surface-2);color:var(--text);border:2px solid var(--accent);border-radius:8px;padding:16px;font-family:monospace;font-size:12px;resize:none;';
      document.body.appendChild(ta);
      ta.select();
      ta.setSelectionRange(0, ta.value.length);
      try { document.execCommand('copy'); } catch (e) { }
      // Add a close button overlay
      const close = document.createElement('button');
      close.textContent = 'Close (text is selected — Cmd+C to copy)';
      close.style.cssText = 'position:fixed;top:calc(50% - 30vh - 24px);left:50%;transform:translateX(-50%);z-index:10000;background:var(--accent);color:#0d1117;border:none;border-radius:6px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;';
      close.onclick = () => { ta.remove(); close.remove(); };

      const savedLayout = (() => { try { return JSON.parse(localStorage.getItem(LAYOUT_KEY) || '{}'); } catch (e) { return {}; } })();
      if (savedLayout.navWidth) navWidth = savedLayout.navWidth;
      if (savedLayout.rightWidth) rightWidth = savedLayout.rightWidth;
      if (savedLayout.navCollapsed) nav.classList.add('collapsed');
      else nav.style.width = navWidth + 'px';
      if (savedLayout.rightCollapsed) rightPanel.classList.add('collapsed');
      else rightPanel.style.width = rightWidth + 'px';

      function saveLayout() {
        try {
          localStorage.setItem(LAYOUT_KEY, JSON.stringify({
            navWidth, rightWidth,
            navCollapsed: nav.classList.contains('collapsed'),
            rightCollapsed: rightPanel.classList.contains('collapsed')
          }));
        } catch (e) { }
      }

      function updateToggles() {
        const navCollapsed = nav.classList.contains('collapsed');
        const rightCollapsed = rightPanel.classList.contains('collapsed');
        leftToggle.title = navCollapsed ? 'Show sections' : 'Hide sections';
        leftToggle.classList.toggle('panel-collapsed', navCollapsed);
        rightToggle.title = rightCollapsed ? 'Show feedback' : 'Hide feedback';
        rightToggle.classList.toggle('panel-collapsed', rightCollapsed);
      }

      function toggleNav(e) {
        e.preventDefault();
        e.stopPropagation();
        if (nav.classList.contains('collapsed')) {
          nav.classList.remove('collapsed');
          nav.style.width = navWidth + 'px';
        } else {
          navWidth = nav.offsetWidth;
          nav.classList.add('collapsed');
        }
        updateToggles();
        saveLayout();
      }

      function toggleRight(e) {
        e.preventDefault();
        e.stopPropagation();
        if (rightPanel.classList.contains('collapsed')) {
          rightPanel.classList.remove('collapsed');
          rightPanel.style.width = rightWidth + 'px';
        } else {
          rightWidth = rightPanel.offsetWidth;
          rightPanel.classList.add('collapsed');
        }
        updateToggles();
        saveLayout();
      }

      let touchFiredLeft = false, touchFiredRight = false;

      leftToggle.addEventListener('touchend', e => { touchFiredLeft = true; toggleNav(e); }, { passive: false });
      leftToggle.addEventListener('click', e => { if (touchFiredLeft) { touchFiredLeft = false; return; } toggleNav(e); });

      rightToggle.addEventListener('touchend', e => { touchFiredRight = true; toggleRight(e); }, { passive: false });
      rightToggle.addEventListener('click', e => { if (touchFiredRight) { touchFiredRight = false; return; } toggleRight(e); });

      updateToggles();

      // Drag resize (mouse)
      function onDragStart(e, side) {
        e.preventDefault();
        dragging = side;
        document.body.classList.add('resizing');
        (side === 'left' ? leftHandle : rightHandle).classList.add('dragging');
      }

      leftHandle.addEventListener('mousedown', e => onDragStart(e, 'left'));
      rightHandle.addEventListener('mousedown', e => onDragStart(e, 'right'));

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        applyDrag(e.clientX);
      });

      document.addEventListener('mouseup', endDrag);

      // Drag resize (touch)
      leftHandle.addEventListener('touchstart', e => { e.preventDefault(); onDragStart(e, 'left'); }, { passive: false });
      rightHandle.addEventListener('touchstart', e => { e.preventDefault(); onDragStart(e, 'right'); }, { passive: false });

      document.addEventListener('touchmove', e => {
        if (!dragging) return;
        e.preventDefault();
        applyDrag(e.touches[0].clientX);
      }, { passive: false });

      document.addEventListener('touchend', endDrag);

      function applyDrag(clientX) {
        if (dragging === 'left') {
          const w = Math.max(140, Math.min(400, clientX));
          nav.classList.remove('collapsed');
          nav.style.width = w + 'px';
          navWidth = w;
        } else {
          const w = Math.max(200, Math.min(600, window.innerWidth - clientX));
          rightPanel.classList.remove('collapsed');
          rightPanel.style.width = w + 'px';
          rightWidth = w;
        }
        updateToggles();
      }

      function endDrag() {
        if (!dragging) return;
        document.body.classList.remove('resizing');
        leftHandle.classList.remove('dragging');
        rightHandle.classList.remove('dragging');
        dragging = null;
        saveLayout();
      }
    })();

    // Init
    loadFromStorage();
    document.querySelectorAll('.filter-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.filter === state.activeFilter);
    });
    renderAll();
  </script>
</body>

</html>
