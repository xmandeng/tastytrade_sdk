<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plan Review: TT-127: Living Next Turn Planning Portal (rev 2)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0d1117;
      --bg-surface: #161b22;
      --bg-surface-2: #1c2128;
      --bg-hover: #21262d;
      --border: #30363d;
      --border-light: #484f58;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --text-dim: #6e7681;
      --accent: #58a6ff;
      --green: #3fb950;
      --green-bg: rgba(63, 185, 80, 0.10);
      --amber: #d29922;
      --amber-bg: rgba(210, 153, 34, 0.10);
      --red: #f85149;
      --red-bg: rgba(248, 81, 73, 0.08);
      --purple: #bc8cff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      height: 100vh;
      height: -webkit-fill-available;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      height: 52px;
    }

    .topbar h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .topbar .stats {
      display: flex;
      gap: 16px;
      font-size: 12px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .dot-pending {
      background: var(--amber);
    }

    .dot-approved {
      background: var(--green);
    }

    .dot-revision {
      background: var(--red);
    }

    .dot-question {
      background: var(--purple);
    }

    /* Main layout */
    .main {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* Resize handles */
    .resize-handle {
      width: 1px;
      cursor: col-resize;
      background: var(--border);
      position: relative;
      flex-shrink: 0;
      z-index: 10;
      overflow: visible;
    }

    .resize-handle::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: -10px;
      right: -10px;
    }

    .resize-handle:hover,
    .resize-handle.dragging {
      background: var(--accent);
      width: 3px;
    }

    body.resizing {
      cursor: col-resize;
      user-select: none;
    }

    /* Topbar collapse toggle buttons */
    .topbar-toggles {
      display: flex;
      gap: 6px;
    }

    .collapse-toggle {
      width: 36px;
      height: 32px;
      background: var(--bg-surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }

    @media (hover: hover) {
      .collapse-toggle:hover {
        background: var(--bg-hover);
        color: var(--text);
        border-color: var(--accent);
      }
    }

    .collapse-toggle.panel-collapsed {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    /* Collapsed panel states */
    .nav.collapsed {
      width: 0 !important;
      min-width: 0 !important;
      padding: 0 !important;
      overflow: hidden;
    }

    .right-panel.collapsed {
      width: 0 !important;
      min-width: 0 !important;
      overflow: hidden;
    }

    .right-panel.collapsed>* {
      display: none;
    }

    .nav.collapsed>* {
      display: none;
    }

    .nav,
    .right-panel {
      transition: width 0.2s ease, min-width 0.2s ease, padding 0.2s ease;
    }

    /* Section nav */
    .nav {
      width: 240px;
      min-width: 140px;
      background: var(--bg-surface);
      overflow-y: auto;
      padding: 12px 0;
    }

    .nav-item {
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-item:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    .nav-item.active {
      background: var(--bg-hover);
      border-left-color: var(--accent);
      color: var(--text);
    }

    .nav-item .status-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    .nav-item .label {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Document panel */
    .doc-panel {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      min-width: 0;
    }

    .doc-panel::-webkit-scrollbar {
      width: 8px;
    }

    .doc-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    .doc-panel::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    /* Section rendering */
    .section {
      margin-bottom: 16px;
      scroll-margin-top: 20px;
      padding: 16px 16px 10px;
      border-radius: 6px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .section-header h2 {
      font-size: 18px;
      font-weight: 600;
      flex: 1;
    }

    .section-header h3 {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
    }

    .section-content {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-muted);
    }

    .section-content p {
      margin-bottom: 12px;
    }

    .section-content strong {
      color: var(--text);
      font-weight: 600;
    }

    .section-content code {
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 12px;
      background: var(--bg-surface-2);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent);
    }

    .section-content pre {
      background: var(--bg-surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      margin: 12px 0;
      overflow-x: auto;
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.5;
      color: var(--text-muted);
    }

    .section-content pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    .section-content ul,
    .section-content ol {
      margin: 8px 0 12px 24px;
    }

    .section-content li {
      margin-bottom: 4px;
    }

    .section-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      font-size: 13px;
    }

    .section-content th,
    .section-content td {
      text-align: left;
      padding: 8px 12px;
      border: 1px solid var(--border);
    }

    .section-content th {
      background: var(--bg-surface-2);
      color: var(--text);
      font-weight: 600;
    }

    .section-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    /* Review actions */
    .review-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .review-btn {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      background: var(--bg-surface);
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .review-btn:hover {
      border-color: var(--border-light);
      color: var(--text);
    }

    .review-btn.active-approved {
      background: var(--green-bg);
      border-color: var(--green);
      color: var(--green);
    }

    .review-btn.active-revision {
      background: var(--red-bg);
      border-color: var(--red);
      color: var(--red);
    }

    .review-btn.active-question {
      background: rgba(188, 140, 255, 0.10);
      border-color: var(--purple);
      color: var(--purple);
    }

    .comment-area {
      margin-top: 10px;
      display: none;
    }

    .comment-area.visible {
      display: block;
    }

    .comment-area textarea {
      width: 100%;
      background: var(--bg-surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 10px;
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
      min-height: 60px;
      outline: none;
      margin-bottom: 0;
      display: block;
    }

    .comment-area textarea:focus {
      border-color: var(--accent);
    }

    .comment-area textarea::placeholder {
      color: var(--text-dim);
    }

    .existing-comment {
      background: var(--bg-surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 8px;
      position: relative;
    }

    .existing-comment .edit-btn {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 11px;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
    }

    /* Right panel: prompt output */
    .right-panel {
      width: 360px;
      min-width: 200px;
      background: var(--bg-surface);
      display: flex;
      flex-direction: column;
    }

    .right-panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .right-panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .right-panel-content::-webkit-scrollbar {
      width: 6px;
    }

    .right-panel-content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .prompt-output {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .prompt-placeholder {
      color: var(--text-dim);
      font-style: italic;
      font-size: 13px;
      text-align: center;
      padding: 40px 20px;
    }

    .copy-btn {
      padding: 8px 16px;
      margin: 12px 16px 16px;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .copy-btn:hover {
      opacity: 0.9;
    }

    .copy-btn.copied {
      background: var(--green);
    }

    /* Filter tabs in right panel */
    .filter-tabs {
      display: flex;
      gap: 2px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
    }

    .filter-tab {
      padding: 4px 10px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s;
    }

    .filter-tab:hover {
      background: var(--bg-hover);
    }

    .filter-tab.active {
      background: var(--bg-hover);
      color: var(--text);
    }

    /* Feedback summary items */
    .feedback-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .feedback-item:last-child {
      border-bottom: none;
    }

    .feedback-item .fb-section {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      font-size: 12px;
    }

    .feedback-item .fb-status {
      display: inline-block;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 600;
      margin-right: 6px;
    }

    .fb-status.approved {
      background: var(--green-bg);
      color: var(--green);
    }

    .fb-status.revision {
      background: var(--red-bg);
      color: var(--red);
    }

    .fb-status.question {
      background: rgba(188, 140, 255, 0.1);
      color: var(--purple);
    }

    .feedback-item .fb-comment {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 4px;
    }

    /* Revised section highlight */
    .section.revised {
      border-left: 3px solid var(--accent) !important;
      background: rgba(88, 166, 255, 0.04) !important;
    }

    .revised-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .mermaid-container {
      background: var(--bg-surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      margin: 12px 0;
      overflow-x: auto;
    }

    .mermaid-container svg {
      max-width: 100%;
      height: auto;
    }
    /* Terminal panel (TT-127) */
    .terminal-panel {
      width: 460px;
      min-width: 240px;
      background: var(--bg-surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.2s ease, min-width 0.2s ease;
    }

    .terminal-panel.collapsed {
      width: 0 !important;
      min-width: 0 !important;
      overflow: hidden;
    }

    .terminal-panel.collapsed > * {
      display: none;
    }

    .terminal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .terminal-header .term-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: var(--text);
    }

    .term-status {
      font-size: 10px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--bg-surface-2);
      color: var(--text-dim);
    }

    .term-status.connected {
      color: var(--green);
      background: var(--green-bg);
    }

    .term-status.error {
      color: var(--red);
      background: var(--red-bg);
    }

    .terminal-host {
      flex: 1;
      min-height: 0;
      padding: 6px 8px 8px 8px;
      overflow: hidden;
    }

    .terminal-host .xterm {
      height: 100%;
    }

    /* Send to Claude button (TT-127) */
    .send-claude-btn {
      margin: 12px 16px 16px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #0d1117;
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 6px;
      cursor: pointer;
      transition: filter 0.15s;
      font-family: inherit;
    }

    .send-claude-btn:hover {
      filter: brightness(1.1);
    }

    .send-claude-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .send-claude-btn.sent {
      background: var(--green);
      border-color: var(--green);
    }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
</head>

      <button class="collapse-toggle" id="leftToggle" title="Toggle sections">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <rect x="1" y="1" width="4" height="14" rx="1" opacity="0.9" />
          <rect x="7" y="1" width="8" height="14" rx="1" opacity="0.3" />
        </svg>
      </button>
    </div>
    <h1>TT-127: Living Next Turn Planning Portal (rev 2)</h1>
    <div class="stats" id="stats"></div>
    <div class="topbar-toggles">
      <button class="collapse-toggle" id="termToggle" title="Toggle terminal">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M2 3h12v10H2V3zm1 1v8h10V4H3z" opacity="0.6"/>
          <path d="M4 6l2 2-2 2M7 10h3" stroke="currentColor" stroke-width="1" fill="none" opacity="0.9"/>
        </svg>
      </button>
      <button class="collapse-toggle" id="rightToggle" title="Toggle feedback">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <rect x="1" y="1" width="8" height="14" rx="1" opacity="0.3" />
          <rect x="11" y="1" width="4" height="14" rx="1" opacity="0.9" />
        </svg>
      </button>
    </div>
  </div>

  <div class="main">
    <div class="nav" id="nav"></div>
    <div class="resize-handle" id="leftHandle"></div>
    <div class="doc-panel" id="docPanel"></div>
    <div class="resize-handle" id="termHandle"></div>

      <div class="terminal-header">
        <span class="term-title">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M2 3l3 3-3 3M6 9h4" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
          claude --continue
        </span>

    <div class="right-panel" id="rightPanel">
      <div class="right-panel-header">
        <span>Review Feedback</span>
        <span id="feedbackCount" style="font-size:11px;color:var(--text-dim)"></span>
      </div>
      <div class="filter-tabs" id="filterTabs">
        <div class="filter-tab active" data-filter="all">All</div>
        <div class="filter-tab" data-filter="approved">Approved</div>
        <div class="filter-tab" data-filter="revision">Needs Revision</div>
        <div class="filter-tab" data-filter="question">Questions</div>
      </div>
      <div class="right-panel-content" id="feedbackList"></div>
      <button class="send-claude-btn" id="sendClaudeBtn" onclick="sendToClaude()" disabled>Send to Claude</button>
    </div>
  </div>

  <script>
    // ============================================================
    // CONTENT: Replace this array with your plan sections.
    // Each section needs: id, title, content (markdown-like string).
    // Optional: revised (boolean) to highlight as updated.
    // ============================================================
    const docSections = [
      {
        id: "context",
        title: "Context — what we're removing",
        content: `Today's planning workflow is multi-surface and manual:

1. Author \`docs/plans/features/TT-XXX-<feature>.md\`
2. Generate an HTML review playground via \`/plan-review\`
3. Mark sections, add notes
4. Click "Copy Feedback as Prompt" — bundles marks into structured prompt text
5. **Paste the bundle into the running Claude Code session by hand** ← this step is the friction
6. Discuss, iterate, hand-edit the markdown, regenerate, repeat

The bundle is already structured exactly the way Claude needs it. The only thing missing is a wire from the playground into the running terminal session. **This plan removes step 5.**`
      },
      {
        id: "primary-constraint",
        title: "Primary design constraint — enrich, do not replace",
        revised: true,
        content: `**Enrich the existing review playground.** Do not replace it.

The current \`docs/plans/review-template.html\` workflow already does the hard work — section anchors, marks, notes, and the structured "Copy Feedback as Prompt" payload are all proven. The new portal is **the same template, with two additions**: an embedded terminal that hosts the user's Claude Code session, and a button on the feedback bundle that pipes the bundle directly into that terminal.

Anything that would require redesigning the existing template — new layouts, doc-toggle UI, per-section diff widgets, separate daemon processes — is out of scope.

**The existing system is the system.** This supersedes any aesthetic ideas pulled from the Claude Design prototype.`
      },
      {
        id: "goals",
        title: "Goals",
        revised: true,
        content: `- **Eliminate the manual paste step** from the review loop.
- **Preserve full prior session context** by hosting the user's actual Claude Code session in-browser via \`claude --continue\`.
- **Stay inside the existing review template** — additions only, no architectural rewrite.
- **Keep all artifacts as-is on disk** — markdown plan plus sibling \`-review.html\` files, exactly the layout we use today. No new folders, no new artifact types.`
      },
      {
        id: "non-goals",
        title: "Non-goals",
        revised: true,
        content: `- Multi-user collaboration.
- Auto-push to git. User runs \`git add/commit\` manually.
- **Direct Anthropic API integration.** The portal proxies to the user's local Claude Code session; it does not call the API.
- Materializing per-turn transcripts or diffs to disk. The Claude Code session and git history cover the audit trail.
- Persisting marks beyond what \`localStorage\` already handles in the existing template.
- Authentication. Loopback-only.
- Cloud hosting.`
      },
      {
        id: "architecture-additions",
        title: "Architecture — two concrete additions, no new processes",
        revised: true,
        content: `### 1. Extend \`docs/architecture-map/_devserver.py\`

Add a single websocket endpoint:

| Endpoint | Purpose |
|---|---|
| \`WS /api/claude\` | Spawns \`claude --continue\` in a PTY for the duration of the connection. Bidirectional bridge between the websocket and the PTY's stdin/stdout. |

    // Render markdown-like content to HTML
    function renderMarkdown(text) {
      let html = '';
      const lines = text.split('\n');
      let inCode = false;
      let codeLang = '';
      let codeLines = [];
      let inList = false;
      let listTag = 'ul';
      let inTable = false;
      let tableRows = [];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.trim().startsWith('```')) {
          if (inCode) {
            if (codeLang === 'mermaid') {
              html += '<div class="mermaid-container"><pre class="mermaid">' + codeLines.join('\n') + '</pre></div>';
            } else {
              html += '<pre><code>' + codeLines.join('\n').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
            }
            codeLines = [];
            inCode = false;
            codeLang = '';
          } else {
            if (inList) { html += '</' + listTag + '>'; inList = false; }
            if (inTable) { html += renderTable(tableRows); inTable = false; tableRows = []; }
            codeLang = line.trim().slice(3).trim().toLowerCase();
            inCode = true;
          }
          continue;
        }
        if (inCode) { codeLines.push(line); continue; }

        if (line.trim().startsWith('|')) {
          if (inList) { html += '</' + listTag + '>'; inList = false; }
          if (!inTable) inTable = true;
          if (!line.trim().match(/^\|[\s-|]+\|$/)) {
            tableRows.push(line);
          }
          continue;
        } else if (inTable) {
          html += renderTable(tableRows);
          inTable = false;
          tableRows = [];
        }

        if (line.trim() === '') {
          if (inList) {
            // Look ahead: if next non-blank line continues the list, keep it open
            let keepList = false;
            for (let j = i + 1; j < lines.length; j++) {
              const next = lines[j].trim();
              if (next === '') continue;
              if (listTag === 'ol' && next.match(/^\d+\.\s/)) keepList = true;
              if (listTag === 'ul' && (next.startsWith('- ') || next.startsWith('* '))) keepList = true;
              break;
            }
            if (!keepList) { html += '</' + listTag + '>'; inList = false; }
          }
          continue;
        }

        if (line.startsWith('### ')) {
          if (inList) { html += '</' + listTag + '>'; inList = false; }
          html += '<h4 style="font-size:14px;font-weight:600;color:var(--text);margin:16px 0 8px">' + inlineFormat(line.slice(4)) + '</h4>';
          continue;
        }

        if (line.trim().startsWith('- ') || line.trim().startsWith('* ')) {
          if (inList && listTag !== 'ul') { html += '</' + listTag + '>'; inList = false; }
          if (!inList) { listTag = 'ul'; html += '<ul>'; inList = true; }
          html += '<li>' + inlineFormat(line.trim().slice(2)) + '</li>';
          continue;
        }
        if (line.trim().match(/^\d+\.\s/)) {
          if (inList && listTag !== 'ol') { html += '</' + listTag + '>'; inList = false; }
          if (!inList) { listTag = 'ol'; html += '<ol>'; inList = true; }
          html += '<li>' + inlineFormat(line.trim().replace(/^\d+\.\s/, '')) + '</li>';
          continue;
        }

        if (inList) { html += '</' + listTag + '>'; inList = false; }
        html += '<p>' + inlineFormat(line) + '</p>';
      }

      if (inCode) html += '<pre><code>' + codeLines.join('\n').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
      if (inList) html += '</' + listTag + '>';
      if (inTable) html += renderTable(tableRows);

      return html;
    }

    function renderTable(rows) {
      if (rows.length === 0) return '';
      let html = '<table>';
      rows.forEach((row, idx) => {
        const cells = row.split('|').filter(c => c.trim() !== '');
        const tag = idx === 0 ? 'th' : 'td';
        html += '<tr>' + cells.map(c => `<${tag}>${inlineFormat(c.trim())}</${tag}>`).join('') + '</tr>';
      });
      html += '</table>';
      return html;
    }

    function inlineFormat(text) {
      return text
        .replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent);text-decoration:none">$1</a>')
        .replace(/\\`/g, '`');
    }

        const ta = document.createElement('textarea');
        ta.value = prompt;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); onSuccess(); } catch (e) { btn.textContent = 'Copy failed'; }
        document.body.removeChild(ta);

            navWidth, rightWidth, termWidth,
            navCollapsed: nav.classList.contains('collapsed'),
            rightCollapsed: rightPanel.classList.contains('collapsed'),
            termCollapsed: termPanel.classList.contains('collapsed')
          }));
        } catch (e) { }
      }

      function updateToggles() {
        const navCollapsed = nav.classList.contains('collapsed');
        const rightCollapsed = rightPanel.classList.contains('collapsed');
        const termCollapsed = termPanel.classList.contains('collapsed');
        leftToggle.title = navCollapsed ? 'Show sections' : 'Hide sections';
        leftToggle.classList.toggle('panel-collapsed', navCollapsed);
        rightToggle.title = rightCollapsed ? 'Show feedback' : 'Hide feedback';
        rightToggle.classList.toggle('panel-collapsed', rightCollapsed);
        termToggle.title = termCollapsed ? 'Show terminal' : 'Hide terminal';
        termToggle.classList.toggle('panel-collapsed', termCollapsed);
      }

      function toggleNav(e) {
        e.preventDefault();
        e.stopPropagation();
        if (nav.classList.contains('collapsed')) {
          nav.classList.remove('collapsed');
          nav.style.width = navWidth + 'px';
        } else {
          navWidth = nav.offsetWidth;
          nav.classList.add('collapsed');
        }
        updateToggles();
        saveLayout();
      }

      function toggleRight(e) {
        e.preventDefault();
        e.stopPropagation();
        if (rightPanel.classList.contains('collapsed')) {
          rightPanel.classList.remove('collapsed');
          rightPanel.style.width = rightWidth + 'px';
        } else {
          rightWidth = rightPanel.offsetWidth;
          rightPanel.classList.add('collapsed');
        }
        updateToggles();
        saveLayout();
      }

      function toggleTerm(e) {
        e.preventDefault();
        e.stopPropagation();
        if (termPanel.classList.contains('collapsed')) {
          termPanel.classList.remove('collapsed');
          termPanel.style.width = termWidth + 'px';
          setTimeout(__fitTerminal, 220);
        } else {
          termWidth = termPanel.offsetWidth;
          termPanel.classList.add('collapsed');
        }
        updateToggles();
        saveLayout();
      }

      let touchFiredLeft = false, touchFiredRight = false, touchFiredTerm = false;

      leftToggle.addEventListener('touchend', e => { touchFiredLeft = true; toggleNav(e); }, { passive: false });
      leftToggle.addEventListener('click', e => { if (touchFiredLeft) { touchFiredLeft = false; return; } toggleNav(e); });

      rightToggle.addEventListener('touchend', e => { touchFiredRight = true; toggleRight(e); }, { passive: false });
      rightToggle.addEventListener('click', e => { if (touchFiredRight) { touchFiredRight = false; return; } toggleRight(e); });

      termToggle.addEventListener('touchend', e => { touchFiredTerm = true; toggleTerm(e); }, { passive: false });
      termToggle.addEventListener('click', e => { if (touchFiredTerm) { touchFiredTerm = false; return; } toggleTerm(e); });

      updateToggles();

      // Drag resize (mouse)
      function onDragStart(e, side) {
        e.preventDefault();
        dragging = side;
        document.body.classList.add('resizing');
        const handle = side === 'left' ? leftHandle : (side === 'term' ? termHandle : rightHandle);
        handle.classList.add('dragging');
      }

      leftHandle.addEventListener('mousedown', e => onDragStart(e, 'left'));
      termHandle.addEventListener('mousedown', e => onDragStart(e, 'term'));
      rightHandle.addEventListener('mousedown', e => onDragStart(e, 'right'));

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        applyDrag(e.clientX);
      });

      document.addEventListener('mouseup', endDrag);

      // Drag resize (touch)
      leftHandle.addEventListener('touchstart', e => { e.preventDefault(); onDragStart(e, 'left'); }, { passive: false });
      termHandle.addEventListener('touchstart', e => { e.preventDefault(); onDragStart(e, 'term'); }, { passive: false });
      rightHandle.addEventListener('touchstart', e => { e.preventDefault(); onDragStart(e, 'right'); }, { passive: false });

      document.addEventListener('touchmove', e => {
        if (!dragging) return;
        e.preventDefault();
        applyDrag(e.touches[0].clientX);
      }, { passive: false });

      document.addEventListener('touchend', endDrag);

      function applyDrag(clientX) {
        if (dragging === 'left') {
          const w = Math.max(140, Math.min(400, clientX));
          nav.classList.remove('collapsed');
          nav.style.width = w + 'px';
          navWidth = w;
        } else if (dragging === 'right') {
          const w = Math.max(200, Math.min(600, window.innerWidth - clientX));
          rightPanel.classList.remove('collapsed');
          rightPanel.style.width = w + 'px';
          rightWidth = w;
        } else if (dragging === 'term') {
          // termHandle sits between doc and terminal; the terminal's width is
          // (everything to the right of clientX) minus the right-panel width
          // (when expanded) and the right resize handle (1px).
          const rightTaken = rightPanel.classList.contains('collapsed') ? 0 : rightPanel.offsetWidth + 1;
          const w = Math.max(240, Math.min(900, window.innerWidth - clientX - rightTaken));
          termPanel.classList.remove('collapsed');
          termPanel.style.width = w + 'px';
          termWidth = w;
          __fitTerminal();
        }
        updateToggles();
      }

      function endDrag() {
        if (!dragging) return;
        document.body.classList.remove('resizing');
        leftHandle.classList.remove('dragging');
        rightHandle.classList.remove('dragging');
        termHandle.classList.remove('dragging');
        dragging = null;
        saveLayout();
        __fitTerminal();
      }

      // Re-fit terminal on viewport changes
      window.addEventListener('resize', () => __fitTerminal());
    })();

    // ============================================================
    // TT-127: Terminal panel + Send to Claude
    // Mounts xterm.js in #termHost, opens a websocket to the
    // devserver's /api/claude endpoint (which spawns
    // `claude --continue` in a PTY), and exposes sendToClaude()
    // which writes the existing feedback bundle to that session.
    // ============================================================
    let __claudeWS = null;
    let __claudeReady = false;
    let __claudeTerm = null;
    let __claudeFitAddon = null;

    (function initClaudeTerminal() {
      const host = document.getElementById('termHost');
      const status = document.getElementById('termStatus');
      const sendBtn = document.getElementById('sendClaudeBtn');
      if (!host || typeof Terminal === 'undefined') return;

      const term = new Terminal({
        fontFamily: '"SF Mono", "Fira Code", "JetBrains Mono", monospace',
        fontSize: 12,
        lineHeight: 1.2,
        theme: {
          background: '#161b22',
          foreground: '#e6edf3',
          cursor: '#58a6ff',
          selectionBackground: 'rgba(88, 166, 255, 0.35)',
        },
        cursorBlink: true,
        scrollback: 5000,
        convertEol: false,
      });
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(host);
      try { fitAddon.fit(); } catch (e) { }

      __claudeTerm = term;
      __claudeFitAddon = fitAddon;
      __fitTerminal = () => {
        if (document.getElementById('termPanel').classList.contains('collapsed')) return;
        try { fitAddon.fit(); } catch (e) { }
        if (__claudeReady && __claudeWS && __claudeWS.readyState === WebSocket.OPEN) {
          try {
            __claudeWS.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
          } catch (e) { }
        }
      };

      function setStatus(text, kind) {
        status.textContent = text;
        status.classList.remove('connected', 'error');
        if (kind) status.classList.add(kind);
      }

      function connect() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const url = `${proto}//${location.host}/api/claude`;
        setStatus('connecting…');
        let ws;
        try {
          ws = new WebSocket(url);
        } catch (e) {
          setStatus('error', 'error');
          term.writeln(`\r\n[devserver] failed to open ${url}: ${e}\r\n`);
          return;
        }
        ws.binaryType = 'arraybuffer';
        __claudeWS = ws;

        ws.onopen = () => {
          __claudeReady = true;
          setStatus('connected', 'connected');
          sendBtn.disabled = false;
          // send initial size so PTY matches xterm
          try {
            ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
          } catch (e) { }
        };

        ws.onmessage = (ev) => {
          if (typeof ev.data === 'string') {
            // control message (e.g. error JSON); print to terminal for visibility
            term.writeln('\r\n[devserver] ' + ev.data);
            return;
          }
          term.write(new Uint8Array(ev.data));
        };

        ws.onerror = () => {
          setStatus('error', 'error');
        };

        ws.onclose = () => {
          __claudeReady = false;
          sendBtn.disabled = true;
          setStatus('disconnected');
          term.writeln('\r\n[devserver] session closed. refresh page to reconnect.\r\n');
        };

        const encoder = new TextEncoder();
        term.onData((data) => {
          if (ws.readyState !== WebSocket.OPEN) return;
          try { ws.send(encoder.encode(data)); } catch (e) { }
        });

        term.onResize(({ cols, rows }) => {
          if (ws.readyState !== WebSocket.OPEN) return;
          try { ws.send(JSON.stringify({ type: 'resize', cols, rows })); } catch (e) { }
        });
      }

      connect();
    })();

    function sendToClaude() {
      const btn = document.getElementById('sendClaudeBtn');
      const prompt = generatePrompt();
      if (!prompt) return;
      if (!__claudeWS || __claudeWS.readyState !== WebSocket.OPEN) {
        btn.textContent = 'Terminal disconnected';
        setTimeout(() => { btn.textContent = 'Send to Claude'; }, 2000);
        return;
      }
      // On send: open terminal panel, collapse feedback panel — single focused surface.
      const termPanel = document.getElementById('termPanel');
      const rightPanel = document.getElementById('rightPanel');
      if (termPanel.classList.contains('collapsed')) {
        document.getElementById('termToggle').click();
      }
      if (!rightPanel.classList.contains('collapsed')) {
        document.getElementById('rightToggle').click();
      }
      const encoder = new TextEncoder();
      // Newline at the end so Claude Code submits the bundle as one turn.
      __claudeWS.send(encoder.encode(prompt + '\n'));
      btn.textContent = 'Sent';
      btn.classList.add('sent');
      if (__claudeTerm) __claudeTerm.focus();
      setTimeout(() => {
        btn.textContent = 'Send to Claude';
        btn.classList.remove('sent');
      }, 2000);
    }

    mermaid.initialize({ startOnLoad: false, theme: 'dark', themeVariables: {
      primaryColor: '#1c2128', primaryTextColor: '#e6edf3', primaryBorderColor: '#30363d',
      lineColor: '#58a6ff', secondaryColor: '#161b22', tertiaryColor: '#21262d',
      nodeTextColor: '#e6edf3', edgeLabelBackground: '#161b22'
    }});

    loadFromStorage();
    document.querySelectorAll('.filter-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.filter === state.activeFilter);
    });
    renderAll();
  </script>
</body>

</html>
