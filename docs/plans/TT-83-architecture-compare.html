<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TT-83 — Account Events InfluxDB Pipeline: Before / After Architecture</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-2: #1c2128;
    --border: #30363d;
    --border-light: #484f58;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --text-faint: #6e7681;
    --accent-blue: #58a6ff;
    --accent-green: #3fb950;
    --accent-orange: #d29922;
    --accent-red: #f85149;
    --accent-purple: #bc8cff;
    --accent-cyan: #39d2c0;
    --accent-pink: #f778ba;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* Top bar */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 44px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 16px;
    z-index: 100;
    gap: 12px;
  }
  .topbar h1 { font-size: 12px; font-weight: 600; color: var(--accent-blue); white-space: nowrap; letter-spacing: 0.5px; }
  .topbar .spacer { flex: 1; }
  .topbar .view-pills { display: flex; gap: 4px; }
  .view-pill {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-dim);
    padding: 4px 14px;
    border-radius: 14px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .view-pill:hover { border-color: var(--text-dim); color: var(--text); }
  .view-pill.active { font-weight: 600; }
  .view-pill.active[data-view="before"] { border-color: var(--accent-orange); color: var(--accent-orange); background: rgba(210,153,34,0.1); }
  .view-pill.active[data-view="after"] { border-color: var(--accent-green); color: var(--accent-green); background: rgba(63,185,80,0.1); }
  .view-pill.active[data-view="split"] { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(88,166,255,0.1); }

  .topbar-btn {
    background: var(--border);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .topbar-btn:hover { background: #484f58; }
  .topbar-btn.active { background: var(--accent-blue); color: #0d1117; border-color: var(--accent-blue); }

  /* Main layout */
  .main-area {
    position: fixed;
    top: 44px; left: 0; right: 0; bottom: 0;
    display: flex;
  }

  /* Canvas pane */
  .canvas-pane {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: grab;
    -webkit-user-select: none;
    user-select: none;
  }
  .canvas-pane.dragging { cursor: grabbing; }
  .canvas-pane + .canvas-pane { border-left: 2px solid var(--border); }

  .pane-label {
    position: absolute;
    top: 12px; left: 12px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 6px;
    z-index: 10;
    pointer-events: none;
  }
  .pane-label.before { background: rgba(210,153,34,0.15); color: var(--accent-orange); }
  .pane-label.after { background: rgba(63,185,80,0.15); color: var(--accent-green); }

  /* Canvas */
  .canvas {
    position: absolute;
    top: 0; left: 0;
    width: 2000px;
    height: 1600px;
    transform-origin: 0 0;
  }

  /* Nodes */
  .node {
    position: absolute;
    border-radius: 8px;
    padding: 12px 16px;
    min-width: 140px;
    text-align: center;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--surface);
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .node:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
  .node.selected { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(88,166,255,0.3); }
  .node.highlighted { border-color: var(--accent-blue); opacity: 0.85; }

  .node-label { font-size: 13px; font-weight: 600; color: var(--text); }
  .node-type { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .node-badge {
    font-size: 9px;
    color: var(--text-dim);
    background: rgba(110,118,129,0.15);
    padding: 2px 6px;
    border-radius: 4px;
    margin-top: 4px;
    display: inline-block;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .node-file { font-size: 9px; color: var(--accent-blue); margin-top: 3px; opacity: 0.7; }

  .node-change-badge {
    position: absolute;
    top: -8px; right: -8px;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .node-change-badge.new { background: rgba(63,185,80,0.2); color: var(--accent-green); }
  .node-change-badge.modified { background: rgba(88,166,255,0.15); color: var(--accent-blue); }
  .node-change-badge.removed { background: rgba(248,81,73,0.15); color: var(--accent-red); }

  .new-node { border-color: var(--accent-green); background: rgba(63,185,80,0.06); }
  .removed-node { border-color: var(--accent-red); opacity: 0.5; border-style: dashed; }

  /* Layer colors */
  .layer-websocket { border-left: 3px solid var(--accent-blue); }
  .layer-websocket .node-label { color: var(--accent-blue); }
  .layer-websocket .node-badge { background: rgba(88,166,255,0.15); color: var(--accent-blue); }

  .layer-orchestration { border-left: 3px solid var(--accent-green); }
  .layer-orchestration .node-label { color: var(--accent-green); }
  .layer-orchestration .node-badge { background: rgba(63,185,80,0.15); color: var(--accent-green); }

  .layer-queue { border-left: 3px solid var(--accent-orange); }
  .layer-queue .node-label { color: var(--accent-orange); }
  .layer-queue .node-badge { background: rgba(210,153,34,0.15); color: var(--accent-orange); }

  .layer-routing { border-left: 3px solid var(--accent-purple); }
  .layer-routing .node-label { color: var(--accent-purple); }
  .layer-routing .node-badge { background: rgba(188,140,255,0.15); color: var(--accent-purple); }

  .layer-signal { border-left: 3px solid var(--accent-cyan); }
  .layer-signal .node-label { color: var(--accent-cyan); }
  .layer-signal .node-badge { background: rgba(57,210,192,0.15); color: var(--accent-cyan); }

  .layer-redis { border-left: 3px solid var(--accent-red); }
  .layer-redis .node-label { color: var(--accent-red); }
  .layer-redis .node-badge { background: rgba(248,81,73,0.15); color: var(--accent-red); }

  .layer-influxdb { border-left: 3px solid var(--accent-purple); }
  .layer-influxdb .node-label { color: var(--accent-purple); }
  .layer-influxdb .node-badge { background: rgba(188,140,255,0.15); color: var(--accent-purple); }

  .layer-downstream { border-left: 3px solid var(--accent-pink); }
  .layer-downstream .node-label { color: var(--accent-pink); }
  .layer-downstream .node-badge { background: rgba(247,120,186,0.15); color: var(--accent-pink); }

  /* SVG edges */
  .edge-svg {
    position: absolute;
    top: 0; left: 0;
    width: 2000px;
    height: 1600px;
    pointer-events: none;
    overflow: visible;
  }
  .edge {
    stroke: var(--border);
    stroke-width: 1.5;
    fill: none;
    transition: stroke 0.2s, stroke-width 0.2s;
  }
  .edge.highlighted {
    stroke: var(--accent-green);
    stroke-width: 2.5;
    filter: drop-shadow(0 0 4px rgba(63,185,80,0.4));
  }
  .edge.callback-edge {
    stroke: var(--accent-red);
    stroke-width: 1.5;
    stroke-dasharray: 6 3;
    opacity: 0.8;
  }
  .edge.callback-edge.highlighted {
    stroke: var(--accent-red);
    stroke-width: 2.5;
    filter: drop-shadow(0 0 4px rgba(248,81,73,0.4));
  }
  .edge.new-edge {
    stroke: var(--accent-green);
    stroke-width: 1.5;
    stroke-dasharray: none;
  }
  .edge.new-edge.highlighted {
    stroke: var(--accent-green);
    stroke-width: 2.5;
  }
  .edge.removed-edge {
    stroke: var(--accent-red);
    stroke-width: 1;
    stroke-dasharray: 4 4;
    opacity: 0.3;
  }
  .edge-label {
    font-size: 9px;
    fill: var(--text-dim);
    font-family: inherit;
  }
  .edge-label.highlighted { fill: var(--accent-green); }
  .edge-label.callback-label { fill: var(--accent-red); opacity: 0.8; }
  .edge-label.new-label { fill: var(--accent-green); }
  .edge-label.removed-label { fill: var(--accent-red); opacity: 0.3; }
  marker#arr path { fill: var(--border); }
  marker#arr-hl path { fill: var(--accent-green); }
  marker#arr-cb path { fill: var(--accent-red); }
  marker#arr-new path { fill: var(--accent-green); }

  /* Data flow animation */
  @keyframes flowPulse {
    0% { stroke-dashoffset: 20; }
    100% { stroke-dashoffset: 0; }
  }
  .edge.animated {
    stroke-dasharray: 8 4;
    animation: flowPulse 0.8s linear infinite;
  }

  /* Detail panel */
  .detail-panel {
    position: fixed;
    top: 44px; right: 0; bottom: 0;
    width: 360px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 90;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.25s ease;
    padding: 20px;
  }
  .detail-panel.open { transform: translateX(0); }

  @media (max-width: 768px) {
    .topbar { padding: 0 8px; gap: 6px; }
    .topbar h1 { font-size: 10px; letter-spacing: 0; }
    .view-pill { padding: 4px 10px; font-size: 10px; }
    .topbar-btn { padding: 4px 8px; font-size: 10px; }
    .view-pill[data-view="split"] { display: none; }
    .node { padding: 12px 16px; min-width: 120px; }
    .node-label { font-size: 13px; }
    .node-type { font-size: 10px; }
    .detail-panel {
      top: auto;
      left: 0; right: 0; bottom: 0;
      width: 100%;
      max-height: 55vh;
      border-left: none;
      border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      transform: translateY(100%);
      padding: 16px;
    }
    .detail-panel.open { transform: translateY(0); }
    .detail-panel::before {
      content: '';
      display: block;
      width: 36px; height: 4px;
      background: var(--border-light);
      border-radius: 2px;
      margin: 0 auto 12px;
    }
    .legend { bottom: auto; top: 50px; left: 8px; padding: 6px 10px; font-size: 9px; }
    .zoom-controls { bottom: 8px; right: 8px; }
    .pane-label { font-size: 9px; padding: 3px 8px; top: 8px; left: 8px; }
  }
  .detail-panel h2 { font-size: 15px; margin-bottom: 4px; }
  .detail-panel .detail-type { font-size: 10px; color: var(--text-dim); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-panel .detail-file {
    font-size: 10px;
    color: var(--accent-blue);
    background: rgba(88,166,255,0.1);
    padding: 3px 8px;
    border-radius: 6px;
    display: inline-block;
    margin-bottom: 10px;
  }
  .detail-section { margin-bottom: 14px; }
  .detail-section h3 {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .detail-section p { font-size: 12px; line-height: 1.6; }
  .detail-section code {
    background: rgba(110,118,129,0.15);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--accent-orange);
  }
  .detail-section pre {
    background: var(--bg);
    padding: 10px;
    border-radius: 8px;
    font-size: 10px;
    line-height: 1.5;
    overflow-x: auto;
    border: 1px solid var(--border);
    margin-top: 6px;
    color: var(--text-dim);
  }
  .detail-section .connections-list {
    list-style: none; padding: 0;
  }
  .detail-section .connections-list li {
    font-size: 11px;
    padding: 3px 0;
    display: flex; align-items: center; gap: 6px;
  }
  .detail-section .connections-list li .arrow { color: var(--accent-green); font-weight: bold; }
  .close-btn {
    position: absolute;
    top: 14px; right: 14px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .close-btn:hover { color: var(--text); }
  @media (max-width: 768px) {
    .close-btn {
      top: 18px; right: 16px;
      width: 36px; height: 36px;
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
    }
  }

  /* Legend */
  .legend {
    position: fixed;
    bottom: 16px; left: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    z-index: 80;
    font-size: 10px;
  }
  .legend-title {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }
  .legend-row { display: flex; align-items: center; gap: 8px; padding: 2px 0; }
  .legend-line {
    width: 28px; height: 0;
    border-top: 2px solid;
    flex-shrink: 0;
  }
  .legend-line.solid { border-top-style: solid; }
  .legend-line.dashed { border-top-style: dashed; }

  /* Zoom controls */
  .zoom-controls {
    position: fixed;
    bottom: 16px; right: 16px;
    padding: 6px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 80;
  }
  .zoom-controls button {
    background: var(--border);
    border: 1px solid transparent;
    color: var(--text);
    width: 24px; height: 24px;
    border-radius: 5px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .zoom-controls button:hover { background: #484f58; }
  .zoom-pct {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 36px;
    text-align: center;
    cursor: pointer;
  }
  .zoom-pct:hover { color: var(--text); }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 10px;
    color: var(--text);
    pointer-events: none;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 280px;
    line-height: 1.5;
  }
  .tooltip.visible { opacity: 1; }

  /* Group selection */
  .node.group-selected {
    border-color: var(--accent-cyan);
    box-shadow: 0 0 20px rgba(57,210,192,0.3);
  }
  .node.group-selected .node-label { color: var(--accent-cyan) !important; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-family: inherit;
    z-index: 400;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.visible { opacity: 1; }

  /* Dirty dot for layout trigger */
  .dirty-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-orange);
    flex-shrink: 0;
  }

  /* Save modal */
  .save-modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 300;
    display: flex; align-items: center; justify-content: center;
  }
  .save-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    width: 320px;
    max-height: 400px;
    display: flex; flex-direction: column; gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .save-modal h3 { font-size: 13px; font-weight: 600; color: var(--text); margin: 0; }
  .save-modal input[type="text"] {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border); color: var(--text);
    padding: 7px 10px; border-radius: 6px;
    font-size: 12px; font-family: inherit; outline: none;
  }
  .save-modal input[type="text"]:focus { border-color: var(--accent-blue); }
  .save-modal-list {
    max-height: 160px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 2px;
  }
  .save-modal-list:empty { display: none; }
  .save-modal-row {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 6px; border-radius: 5px;
    cursor: pointer; transition: background 0.12s;
  }
  .save-modal-row:hover { background: rgba(255,255,255,0.05); }
  .save-modal-row-name {
    flex: 1; font-size: 11px; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .save-modal-row-del {
    background: none; border: none; color: var(--text-dim);
    font-size: 13px; cursor: pointer; padding: 0 2px;
    line-height: 1; border-radius: 3px; transition: color 0.12s;
  }
  .save-modal-row-del:hover { color: var(--accent-red); }
  .save-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .save-modal-actions button {
    padding: 5px 14px; border-radius: 6px;
    font-size: 11px; font-family: inherit;
    cursor: pointer; border: 1px solid var(--border); transition: all 0.12s;
  }
  .save-modal-cancel { background: var(--border); color: var(--text); }
  .save-modal-cancel:hover { background: #484f58; }
  .save-modal-confirm {
    background: var(--accent-blue); color: #0d1117;
    border-color: var(--accent-blue); font-weight: 600;
  }
  .save-modal-confirm:hover { filter: brightness(1.1); }

  /* Layout dropdown */
  .layout-dropdown-wrap { position: relative; }
  .layout-dropdown-trigger {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface-2);
    font-size: 11px; color: var(--text-dim); cursor: pointer;
    min-width: 100px; transition: border-color 0.15s;
  }
  .layout-dropdown-trigger:hover { border-color: var(--text-dim); }
  .layout-dropdown-trigger .dd-arrow { font-size: 8px; margin-left: auto; }
  .layout-dropdown-menu {
    display: none; position: absolute; top: 100%; left: 0; right: 0;
    margin-top: 4px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 6px;
    z-index: 150; max-height: 200px; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .layout-dropdown-menu.open { display: block; }
  .layout-dropdown-trigger.open { border-color: var(--accent-blue); }
  .layout-dd-item {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 8px; cursor: pointer; transition: background 0.1s;
  }
  .layout-dd-item:hover { background: rgba(255,255,255,0.05); }
  .layout-dd-item.active { background: rgba(88,166,255,0.1); }
  .layout-dd-item-name {
    flex: 1; font-size: 11px; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .layout-dd-item-del {
    background: none; border: none; color: var(--text-dim);
    font-size: 12px; cursor: pointer; padding: 0 2px;
    line-height: 1; border-radius: 3px; transition: color 0.12s;
  }
  .layout-dd-item-del:hover { color: var(--accent-red); }
  .layout-dropdown-empty { padding: 8px; font-size: 10px; color: var(--text-dim); text-align: center; }
</style>
</head>
<body>

<div class="topbar">
  <h1>TT-83 ACCOUNT EVENTS INFLUXDB PIPELINE</h1>
  <div class="view-pills">
    <button class="view-pill active" data-view="split" onclick="setView('split')">Split</button>
    <button class="view-pill" data-view="before" onclick="setView('before')">Before</button>
    <button class="view-pill" data-view="after" onclick="setView('after')">After</button>
  </div>
  <span id="group-count" style="display:none; font-size:10px; background:var(--accent-cyan); color:#0d1117; padding:1px 6px; border-radius:8px; font-weight:600;" title="Shift+Click to select multiple"></span>
  <div class="spacer"></div>
  <div class="layout-dropdown-wrap" id="layout-dropdown-wrap">
    <div class="layout-dropdown-trigger" id="layout-dropdown-trigger" onclick="toggleLayoutDropdown()">
      <span id="layout-dd-label">No layouts</span>
      <span class="dd-arrow">&#9662;</span>
    </div>
    <div class="layout-dropdown-menu" id="layout-dropdown-menu"></div>
  </div>
  <button class="topbar-btn" onclick="saveLayout()">Save</button>

const AFTER_EDGES = [
  { from: 'acct-streamer', to: 'queues', label: 'WebSocket events\n(6 types)' },

  { from: 'orchestrator', to: 'publisher', label: 'publish to Redis' },
  { from: 'orchestrator', to: 'telegraf', label: 'write to InfluxDB', style: 'new' },

  { from: 'publisher', to: 'redis-ord', label: 'Order' },
  { from: 'publisher', to: 'redis-complex', label: 'ComplexOrder' },
  { from: 'publisher', to: 'redis-chains', label: 'TradeChain' },

// ================================================================
// RENDERING ENGINE
// ================================================================

let currentView = 'split';
let flowAnimated = false;
let selectedNode = null;

const paneState = {
  before: { panX: 0, panY: 0, scale: 1, dragging: false, dragStartX: 0, dragStartY: 0, panStartX: 0, panStartY: 0 },
  after:  { panX: 0, panY: 0, scale: 1, dragging: false, dragStartX: 0, dragStartY: 0, panStartX: 0, panStartY: 0 },
};

let draggingNodeInfo = null;

function setView(view) {
  currentView = view;
  document.querySelectorAll('.view-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.view === view);
  });
  buildPanes();
}

function buildPanes() {
  const main = document.getElementById('mainArea');
  main.innerHTML = '';

  const panes = currentView === 'split' ? ['before', 'after']
    : currentView === 'before' ? ['before']
    : ['after'];

  panes.forEach(paneId => {
    const pane = document.createElement('div');
    pane.className = 'canvas-pane';
    pane.id = `pane-${paneId}`;
    pane.dataset.pane = paneId;

    const label = document.createElement('div');
    label.className = `pane-label ${paneId}`;
    label.textContent = paneId === 'before' ? 'Before (Redis Only)' : 'After (Redis + InfluxDB)';
    pane.appendChild(label);

    const canvas = document.createElement('div');
    canvas.className = 'canvas';
    canvas.id = `canvas-${paneId}`;
    pane.appendChild(canvas);

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', 'edge-svg');
    svg.id = `edges-${paneId}`;
    svg.innerHTML = `<defs>
      <marker id="arr-${paneId}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,2 L10,5 L0,8Z" fill="var(--border)"/></marker>
      <marker id="arr-hl-${paneId}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,2 L10,5 L0,8Z" fill="var(--accent-green)"/></marker>
      <marker id="arr-cb-${paneId}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,2 L10,5 L0,8Z" fill="var(--accent-red)"/></marker>
      <marker id="arr-new-${paneId}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,2 L10,5 L0,8Z" fill="var(--accent-green)"/></marker>
    </defs>`;
    canvas.appendChild(svg);

    main.appendChild(pane);

    const nodes = paneId === 'before' ? BEFORE_NODES : AFTER_NODES;
    const edges = paneId === 'before' ? BEFORE_EDGES : AFTER_EDGES;
    renderNodesForPane(canvas, nodes, paneId);
    renderEdgesForPane(svg, nodes, edges, paneId);
    applyTransform(paneId);

    pane.addEventListener('mousedown', (e) => {
      if (e.target.closest('.node')) return;
      const st = paneState[paneId];
      st.dragging = true;
      st.dragStartX = e.clientX;
      st.dragStartY = e.clientY;
      st.panStartX = st.panX;
      st.panStartY = st.panY;
      pane.classList.add('dragging');
    });

    pane.addEventListener('click', (e) => {
      if (!e.target.closest('.node')) {
        if (!e.shiftKey) clearGroupSelection();
        closeDetail();
      }
    });

    pane.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.08 : 0.08;
      const st = paneState[paneId];
      const rect = pane.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const oldScale = st.scale;
      st.scale = Math.max(0.3, Math.min(2.5, st.scale + delta));
      const ratio = st.scale / oldScale;
      st.panX = mx - (mx - st.panX) * ratio;
      st.panY = my - (my - st.panY) * ratio;
      applyTransform(paneId);
      updateZoomDisplay();
    }, { passive: false });

    let touchStart = null;
    let panMoved = false;
    pane.addEventListener('touchstart', (e) => {
      if (e.target.closest('.node')) return;
      if (e.touches.length === 1) {
        panMoved = false;
        const st = paneState[paneId];
        touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, panX: st.panX, panY: st.panY };
      }
    }, { passive: false });
    pane.addEventListener('touchmove', (e) => {
      if (touchStart && e.touches.length === 1) {
        e.preventDefault();
        panMoved = true;
        const st = paneState[paneId];
        st.panX = touchStart.panX + (e.touches[0].clientX - touchStart.x);
        st.panY = touchStart.panY + (e.touches[0].clientY - touchStart.y);
        applyTransform(paneId);
      }
    }, { passive: false });
    pane.addEventListener('touchend', () => {
      if (touchStart && !panMoved) {
        closeDetail();
        clearGroupSelection();
      }
      touchStart = null;
      panMoved = false;
    });
  });

  updateLegend();
}

window.addEventListener('mousemove', (e) => {
  if (draggingNodeInfo) {
    const di = draggingNodeInfo;
    const st = paneState[di.paneId];
    const dx = (e.clientX - di.startX) / st.scale;
    const dy = (e.clientY - di.startY) / st.scale;
    if (!di.moved && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) di.moved = true;
    if (di.moved) {
      const nodes = di.paneId === 'before' ? BEFORE_NODES : AFTER_NODES;
      const node = nodes.find(n => n.id === di.nodeId);
      if (node) {
        node.x = di.origX + dx;
        node.y = di.origY + dy;
        const el = document.getElementById(`node-${di.paneId}-${di.nodeId}`);
        if (el) { el.style.left = node.x + 'px'; el.style.top = node.y + 'px'; }
        if (di.groupOrigins) {
          groupSelected.forEach(id => {
            if (id === di.nodeId) return;
            const n = nodes.find(nd => nd.id === id);
            const orig = di.groupOrigins[id];
            if (!n || !orig) return;
            n.x = orig.x + dx;
            n.y = orig.y + dy;
            const nel = document.getElementById(`node-${di.paneId}-${id}`);
            if (nel) { nel.style.left = n.x + 'px'; nel.style.top = n.y + 'px'; }
          });
        }
        const svg = document.getElementById(`edges-${di.paneId}`);
        const edges = di.paneId === 'before' ? BEFORE_EDGES : AFTER_EDGES;
        renderEdgesForPane(svg, nodes, edges, di.paneId);
      }
    }
    return;
  }
  for (const paneId of ['before', 'after']) {
    const st = paneState[paneId];
    if (st.dragging) {
      st.panX = st.panStartX + (e.clientX - st.dragStartX);
      st.panY = st.panStartY + (e.clientY - st.dragStartY);
      applyTransform(paneId);
    }
  }
});

window.addEventListener('mouseup', (e) => {
  if (draggingNodeInfo) {
    if (!draggingNodeInfo.moved) {
      if (e.shiftKey) {
        closeDetail();
        toggleGroupSelect(draggingNodeInfo.nodeId, draggingNodeInfo.paneId);
      } else {
        clearGroupSelection();
        const nodes = draggingNodeInfo.paneId === 'before' ? BEFORE_NODES : AFTER_NODES;
        const edges = draggingNodeInfo.paneId === 'before' ? BEFORE_EDGES : AFTER_EDGES;
        const node = nodes.find(n => n.id === draggingNodeInfo.nodeId);
        if (node) selectNodeDetail(node, edges, draggingNodeInfo.paneId);
      }
    } else {
      debouncedAutosave();
    }
    draggingNodeInfo = null;
  }
  for (const paneId of ['before', 'after']) {
    const st = paneState[paneId];
    if (st.dragging) {
      st.dragging = false;
      const pane = document.getElementById(`pane-${paneId}`);
      if (pane) pane.classList.remove('dragging');
    }
  }
});

const NODE_TAP_THRESHOLD = 8;

window.addEventListener('touchmove', (e) => {
  if (!draggingNodeInfo) return;
  if (e.touches.length !== 1) return;
  e.preventDefault();
  const t = e.touches[0];
  const di = draggingNodeInfo;
  const st = paneState[di.paneId];
  const dx = (t.clientX - di.startX) / st.scale;
  const dy = (t.clientY - di.startY) / st.scale;
  if (!di.moved && (Math.abs(dx) > NODE_TAP_THRESHOLD || Math.abs(dy) > NODE_TAP_THRESHOLD)) di.moved = true;
  if (di.moved) {
    const nodeList = di.paneId === 'before' ? BEFORE_NODES : AFTER_NODES;
    const node = nodeList.find(n => n.id === di.nodeId);
    if (node) {
      node.x = di.origX + dx;
      node.y = di.origY + dy;
      const el = document.getElementById(`node-${di.paneId}-${di.nodeId}`);
      if (el) { el.style.left = node.x + 'px'; el.style.top = node.y + 'px'; }
      if (di.groupOrigins) {
        groupSelected.forEach(id => {
          if (id === di.nodeId) return;
          const n = nodeList.find(nd => nd.id === id);
          const orig = di.groupOrigins[id];
          if (!n || !orig) return;
          n.x = orig.x + dx;
          n.y = orig.y + dy;
          const nel = document.getElementById(`node-${di.paneId}-${id}`);
          if (nel) { nel.style.left = n.x + 'px'; nel.style.top = n.y + 'px'; }
        });
      }
      const svg = document.getElementById(`edges-${di.paneId}`);
      const edgeList = di.paneId === 'before' ? BEFORE_EDGES : AFTER_EDGES;
      renderEdgesForPane(svg, nodeList, edgeList, di.paneId);
    }
  }
}, { passive: false });

window.addEventListener('touchend', (e) => {
  if (draggingNodeInfo) {
    if (!draggingNodeInfo.moved) {
      clearGroupSelection();
      const nodeList = draggingNodeInfo.paneId === 'before' ? BEFORE_NODES : AFTER_NODES;
      const edgeList = draggingNodeInfo.paneId === 'before' ? BEFORE_EDGES : AFTER_EDGES;
      const node = nodeList.find(n => n.id === draggingNodeInfo.nodeId);
      if (node) selectNodeDetail(node, edgeList, draggingNodeInfo.paneId);
    } else {
      debouncedAutosave();
    }
    draggingNodeInfo = null;
  }
});

function applyTransform(paneId) {
  const canvas = document.getElementById(`canvas-${paneId}`);
  if (!canvas) return;
  const st = paneState[paneId];
  canvas.style.transform = `translate(${st.panX}px, ${st.panY}px) scale(${st.scale})`;
}

function renderNodesForPane(canvas, nodes, paneId) {
  nodes.forEach(node => {
    const el = document.createElement('div');
    el.className = `node layer-${node.layer}`;
    if (node.change === 'new') el.classList.add('new-node');
    if (node.change === 'removed') el.classList.add('removed-node');
    el.id = `node-${paneId}-${node.id}`;
    el.style.left = node.x + 'px';
    el.style.top = node.y + 'px';
    el.dataset.id = node.id;
    el.dataset.pane = paneId;

    let html = '';
    if (node.change) {
      html += `<div class="node-change-badge ${node.change}">${node.change}</div>`;
    }
    html += `<div class="node-label">${node.label}</div>`;
    html += `<div class="node-type">${node.type}</div>`;
    if (node.badge) html += `<div class="node-badge">${node.badge}</div>`;
    if (node.file) html += `<div class="node-file">${node.file}</div>`;
    el.innerHTML = html;

    el.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      e.preventDefault();
      const nodeList = paneId === 'before' ? BEFORE_NODES : AFTER_NODES;
      let groupOrigins = null;
      if (groupSelected.has(node.id) && groupSelected.size > 1 && groupPane === paneId) {
        groupOrigins = {};
        groupSelected.forEach(id => {
          const n = nodeList.find(nd => nd.id === id);
          if (n) groupOrigins[id] = { x: n.x, y: n.y };
        });
      }
      draggingNodeInfo = {
        paneId, nodeId: node.id,
        startX: e.clientX, startY: e.clientY,
        origX: node.x, origY: node.y,
        moved: false, groupOrigins,
      };
    });

    el.addEventListener('mouseenter', (e) => {
      if (!draggingNodeInfo) showTooltip(e, node);
    });
    el.addEventListener('mouseleave', hideTooltip);

    el.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) return;
      e.stopPropagation();
      e.preventDefault();
      const t = e.touches[0];
      const nodeList = paneId === 'before' ? BEFORE_NODES : AFTER_NODES;
      let groupOrigins = null;
      if (groupSelected.has(node.id) && groupSelected.size > 1 && groupPane === paneId) {
        groupOrigins = {};
        groupSelected.forEach(id => {
          const n = nodeList.find(nd => nd.id === id);
          if (n) groupOrigins[id] = { x: n.x, y: n.y };
        });
      }
      draggingNodeInfo = {
        paneId, nodeId: node.id,
        startX: t.clientX, startY: t.clientY,
        origX: node.x, origY: node.y,
        moved: false, groupOrigins,
        nodeRef: node,
      };
    }, { passive: false });

    canvas.appendChild(el);
  });
}

function getNodeRect(paneId, nodeId) {
  const el = document.getElementById(`node-${paneId}-${nodeId}`);
  const nodes = paneId === 'before' ? BEFORE_NODES : AFTER_NODES;
  const node = nodes.find(n => n.id === nodeId);
  if (!el || !node) return null;
  return {
    x: node.x + el.offsetWidth / 2,
    y: node.y + el.offsetHeight / 2,
    w: el.offsetWidth,
    h: el.offsetHeight,
    top: node.y,
    bottom: node.y + el.offsetHeight,
    left: node.x,
    right: node.x + el.offsetWidth,
  };
}

function renderEdgesForPane(svg, nodes, edges, paneId) {
  const defs = svg.querySelector('defs');
  svg.innerHTML = '';
  svg.appendChild(defs);

  requestAnimationFrame(() => {
    edges.forEach((edge, i) => {
      const from = getNodeRect(paneId, edge.from);
      const to = getNodeRect(paneId, edge.to);
      if (!from || !to) return;

      let x1, y1, x2, y2;
      const dx = to.x - from.x;
      const dy = to.y - from.y;

      if (Math.abs(dy) > Math.abs(dx) * 0.4) {
        if (dy > 0) { x1 = from.x; y1 = from.bottom; x2 = to.x; y2 = to.top; }
        else { x1 = from.x; y1 = from.top; x2 = to.x; y2 = to.bottom; }
      } else {
        if (dx > 0) { x1 = from.right; y1 = from.y; x2 = to.left; y2 = to.y; }
        else { x1 = from.left; y1 = from.y; x2 = to.right; y2 = to.y; }
      }

      const midY = (y1 + y2) / 2;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const d = Math.abs(y2 - y1) > 20
        ? `M${x1},${y1} C${x1},${midY} ${x2},${midY} ${x2},${y2}`
        : `M${x1},${y1} L${x2},${y2}`;
      path.setAttribute('d', d);

      let edgeClass = 'edge';
      let markerEnd = `url(#arr-${paneId})`;

      if (edge.style === 'callback') {
        edgeClass += ' callback-edge';
        markerEnd = `url(#arr-cb-${paneId})`;
      } else if (edge.style === 'new') {
        edgeClass += ' new-edge';
        markerEnd = `url(#arr-new-${paneId})`;
      } else if (edge.style === 'removed') {
        edgeClass += ' removed-edge';
      }

      if (flowAnimated && edge.style !== 'removed') edgeClass += ' animated';

      path.setAttribute('class', edgeClass);
      path.setAttribute('marker-end', markerEnd);
      path.dataset.from = edge.from;
      path.dataset.to = edge.to;
      svg.appendChild(path);

      if (edge.label) {
        const lines = edge.label.split('\n');
        lines.forEach((line, li) => {
          const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          text.setAttribute('x', (x1 + x2) / 2);
          text.setAttribute('y', (y1 + y2) / 2 - 8 + (li * 12) - ((lines.length - 1) * 6));
          text.setAttribute('text-anchor', 'middle');
          let labelClass = 'edge-label';
          if (edge.style === 'callback') labelClass += ' callback-label';
          if (edge.style === 'new') labelClass += ' new-label';
          if (edge.style === 'removed') labelClass += ' removed-label';
          text.setAttribute('class', labelClass);
          text.textContent = line;
          svg.appendChild(text);
        });
      }
    });
  });
}

function selectNodeDetail(node, edges, paneId) {

function zoomBy(delta) {
  for (const paneId of ['before', 'after']) {
    const st = paneState[paneId];
    const pane = document.getElementById(`pane-${paneId}`);
    if (!pane) continue;
    const rect = pane.getBoundingClientRect();
    const cx = rect.width / 2;
    const cy = rect.height / 2;
    const oldScale = st.scale;
    st.scale = Math.max(0.3, Math.min(2.5, st.scale + delta));
    const ratio = st.scale / oldScale;
    st.panX = cx - (cx - st.panX) * ratio;
    st.panY = cy - (cy - st.panY) * ratio;
    applyTransform(paneId);
  }
  updateZoomDisplay();
}

function resetZoom() {
  for (const paneId of ['before', 'after']) {
    paneState[paneId].scale = 1;
    paneState[paneId].panX = 20;
    paneState[paneId].panY = 20;
    applyTransform(paneId);
  }
  updateZoomDisplay();
}

function updateZoomDisplay() {
  const st = paneState[currentView === 'after' ? 'after' : 'before'];
  document.getElementById('zoomPct').textContent = Math.round(st.scale * 100) + '%';
}

function getNodeMetadata(nodeId) {
  const pId = groupPane || 'before';
  const nodeList = pId === 'before' ? BEFORE_NODES : AFTER_NODES;
  const edgeList = pId === 'before' ? BEFORE_EDGES : AFTER_EDGES;
  const node = nodeList.find(n => n.id === nodeId);
  if (!node) return null;
  const meta = { id: node.id, label: node.label, type: node.type };
  if (node.file) meta.file = node.file;
  if (node.layer) meta.layer = node.layer;
  if (node.badge) meta.badge = node.badge;
  if (node.desc) meta.description = node.desc;
  if (node.details) meta.details = node.details;
  if (node.code) meta.code = node.code;
  if (node.change) meta.change = node.change;
  const incoming = edgeList.filter(e => e.to === nodeId).map(e => {
    const src = nodeList.find(n => n.id === e.from);
    return { from: src?.label || e.from, label: e.label || null };
  });
  const outgoing = edgeList.filter(e => e.from === nodeId).map(e => {
    const tgt = nodeList.find(n => n.id === e.to);
    return { to: tgt?.label || e.to, label: e.label || null };
  });
  if (incoming.length) meta.incoming = incoming;
  if (outgoing.length) meta.outgoing = outgoing;
  return meta;
}

async function copySelectedMetadata() {
  let metadata;
  if (groupSelected.size > 0) {
    metadata = [...groupSelected].map(id => getNodeMetadata(id)).filter(Boolean);
  } else if (selectedNode) {
    metadata = getNodeMetadata(selectedNode);
  } else {
    return false;
  }
  await navigator.clipboard.writeText(JSON.stringify(metadata, null, 2));
  const count = groupSelected.size || 1;
  showToast(`Copied ${count} node${count > 1 ? 's' : ''} metadata`);
  return true;
}

const LAYOUTS_FILE = 'TT-83-architecture-compare-layouts.json';
const STORAGE_KEY = 'tt83-arch-compare-layouts';
let savedLayouts = {};
let canWriteToFile = false;
let activeLayoutName = null;
let savedLayoutSnapshot = null;

function snapshotAllPositions() {
  const snap = { before: {}, after: {} };
  BEFORE_NODES.forEach(n => { snap.before[n.id] = { x: n.x, y: n.y }; });
  AFTER_NODES.forEach(n => { snap.after[n.id] = { x: n.x, y: n.y }; });
  return snap;
}

function applyAllPositions(snap) {
  if (snap.before) {
    BEFORE_NODES.forEach(n => {
      if (snap.before[n.id]) { n.x = snap.before[n.id].x; n.y = snap.before[n.id].y; }
    });
  }
  if (snap.after) {
    AFTER_NODES.forEach(n => {
      if (snap.after[n.id]) { n.x = snap.after[n.id].x; n.y = snap.after[n.id].y; }
    });
  }
  buildPanes();
}

async function initLayouts() {
  try {
    const resp = await fetch(LAYOUTS_FILE);
    if (resp.ok) {
      savedLayouts = await resp.json();
    }
  } catch { /* file not available */ }

  try {
    const testResp = await fetch(LAYOUTS_FILE, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(savedLayouts, null, 2),
    });
    canWriteToFile = testResp.ok;
  } catch {
    canWriteToFile = false;
  }

  try {
    const local = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    Object.keys(local).forEach(k => {
      if (!savedLayouts[k]) savedLayouts[k] = local[k];
    });
  } catch { /* ignore */ }
  refreshLayoutSelect();
}

async function persistLayouts() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(savedLayouts));
  if (canWriteToFile) {
    try {
      const resp = await fetch(LAYOUTS_FILE, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(savedLayouts, null, 2),
      });
      if (!resp.ok) canWriteToFile = false;
    } catch {
      canWriteToFile = false;
    }
  }
}

function saveLayout() { openSaveModal(); }

function openSaveModal() {
  closeSaveModal();
  const backdrop = document.createElement('div');
  backdrop.className = 'save-modal-backdrop';
  backdrop.id = 'save-modal-backdrop';
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeSaveModal(); });

  const names = Object.keys(savedLayouts);
  let listHtml = '';
  names.forEach(name => {
    listHtml += `<div class="save-modal-row" data-name="${escHtml(name)}">
      <span class="save-modal-row-name" title="${escHtml(name)}">${escHtml(name)}</span>
      <button class="save-modal-row-del" title="Delete" data-del="${escHtml(name)}">&times;</button>
    </div>`;
  });

  backdrop.innerHTML = `<div class="save-modal">
    <h3>Save Layout</h3>
    <input type="text" id="save-modal-input" placeholder="Layout name..." value="${escHtml(activeLayoutName || '')}">
    <div class="save-modal-list" id="save-modal-list">${listHtml}</div>
    <div class="save-modal-actions">
      <button class="save-modal-cancel" onclick="closeSaveModal()">Cancel</button>
      <button class="save-modal-confirm" id="save-modal-btn" onclick="confirmSave()">Save</button>
    </div>
  </div>`;
  document.body.appendChild(backdrop);

  const inp = document.getElementById('save-modal-input');
  inp.focus();
  inp.select();
  inp.addEventListener('input', updateSaveButtonText);
  inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); confirmSave(); } });
  updateSaveButtonText();

  backdrop.querySelectorAll('.save-modal-row').forEach(row => {
    row.addEventListener('click', (e) => {
      if (e.target.closest('.save-modal-row-del')) return;
      inp.value = row.dataset.name;
      inp.focus();
      updateSaveButtonText();
    });
  });
  backdrop.querySelectorAll('.save-modal-row-del').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteLayoutFromModal(btn.dataset.del);
    });
  });
}

function closeSaveModal() {
  const el = document.getElementById('save-modal-backdrop');
  if (el) el.remove();
}

function updateSaveButtonText() {
  const inp = document.getElementById('save-modal-input');
  const btn = document.getElementById('save-modal-btn');
  if (!inp || !btn) return;
  const name = inp.value.trim();
  btn.textContent = (name && savedLayouts[name]) ? `Overwrite "${name}"` : 'Save';
}

function confirmSave() {
  const inp = document.getElementById('save-modal-input');
  if (!inp) return;
  const name = inp.value.trim();
  if (!name) return;
  savedLayouts[name] = snapshotAllPositions();
  activeLayoutName = name;
  savedLayoutSnapshot = JSON.stringify(savedLayouts[name]);
  persistLayouts();
  refreshLayoutSelect();
  closeSaveModal();
  showToast(`Saved "${name}"`);
  if (!canWriteToFile) downloadLayoutsFile();
}

function deleteLayoutFromModal(name) {
  delete savedLayouts[name];
  if (activeLayoutName === name) { activeLayoutName = null; savedLayoutSnapshot = null; }
  persistLayouts();
  refreshLayoutSelect();
  const list = document.getElementById('save-modal-list');
  if (list) {
    const row = list.querySelector(`[data-name="${CSS.escape(name)}"]`);
    if (row) row.remove();
  }
  updateSaveButtonText();
}

function downloadLayoutsFile() {
  const blob = new Blob([JSON.stringify(savedLayouts, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = LAYOUTS_FILE;
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadLayout(name) {
  if (!name || !savedLayouts[name]) return;
  applyAllPositions(savedLayouts[name]);
  activeLayoutName = name;
  savedLayoutSnapshot = JSON.stringify(savedLayouts[name]);
  refreshLayoutSelect();
  autosave();
}

function refreshLayoutSelect() {
  const menu = document.getElementById('layout-dropdown-menu');
  const label = document.getElementById('layout-dd-label');
  const names = Object.keys(savedLayouts);

  if (!activeLayoutName) {
    label.innerHTML = names.length ? 'Select layout...' : 'No layouts';
    label.style.color = '';
  } else {
    const dirty = savedLayoutSnapshot && JSON.stringify(snapshotAllPositions()) !== savedLayoutSnapshot;
    label.innerHTML = (dirty ? '<span class="dirty-dot"></span> ' : '') + escHtml(activeLayoutName);
    label.style.color = 'var(--accent-blue)';
  }

  if (!names.length) {
    menu.innerHTML = '<div class="layout-dropdown-empty">No saved layouts</div>';
    return;
  }
  menu.innerHTML = '';
  names.forEach(name => {
    const item = document.createElement('div');
    item.className = 'layout-dd-item' + (name === activeLayoutName ? ' active' : '');
    item.innerHTML = `<span class="layout-dd-item-name" title="${escHtml(name)}">${escHtml(name)}</span>
      <button class="layout-dd-item-del" title="Delete">&times;</button>`;
    item.querySelector('.layout-dd-item-name').addEventListener('click', () => {
      loadLayout(name);
      closeLayoutDropdown();
    });
    item.querySelector('.layout-dd-item-del').addEventListener('click', (e) => {
      e.stopPropagation();
      delete savedLayouts[name];
      if (activeLayoutName === name) { activeLayoutName = null; savedLayoutSnapshot = null; }
      persistLayouts();
      refreshLayoutSelect();
    });
    menu.appendChild(item);
  });
}

function toggleLayoutDropdown() {
  const trigger = document.getElementById('layout-dropdown-trigger');
  const menu = document.getElementById('layout-dropdown-menu');
  if (menu.classList.contains('open')) {
    closeLayoutDropdown();
  } else {
    refreshLayoutSelect();
    trigger.classList.add('open');
    menu.classList.add('open');
  }
}

function closeLayoutDropdown() {
  document.getElementById('layout-dropdown-trigger').classList.remove('open');
  document.getElementById('layout-dropdown-menu').classList.remove('open');
}

// Autosave
const AUTOSAVE_KEY = 'tt83-arch-compare-autosave';
let autosaveTimer = null;
function debouncedAutosave() {
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => autosave(), 500);
}
function autosave() {
  localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({
    positions: snapshotAllPositions(),
    activeLayoutName: activeLayoutName,
  }));
}
function loadAutosave() {
  try {
    const data = JSON.parse(localStorage.getItem(AUTOSAVE_KEY));
    if (data?.positions) {
      applyAllPositions(data.positions);
      if (data.activeLayoutName && savedLayouts[data.activeLayoutName]) {
        activeLayoutName = data.activeLayoutName;
        savedLayoutSnapshot = JSON.stringify(savedLayouts[activeLayoutName]);
      }
      refreshLayoutSelect();
      return true;
    }
  } catch { /* ignore */ }
  return false;
}

// KEYBOARD SHORTCUTS
// ================================================================

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
    if (groupSelected.size > 0 || selectedNode) {
      e.preventDefault();
      copySelectedMetadata();
      return;
    }
  }

  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (activeLayoutName) {
      savedLayouts[activeLayoutName] = snapshotAllPositions();
      savedLayoutSnapshot = JSON.stringify(savedLayouts[activeLayoutName]);
      persistLayouts();
      refreshLayoutSelect();
      showToast(`Saved "${activeLayoutName}"`);
    } else {
      saveLayout();
    }
    return;
  }

  if (e.key === '1') setView('before');
  else if (e.key === '2') setView('after');
  else if (e.key === '3') setView('split');
  else if (e.key === 'f') toggleFlow();
  else if (e.key === 'Escape') { closeDetail(); clearGroupSelection(); closeSaveModal(); closeLayoutDropdown(); }
  else if (e.key === '=' || e.key === '+') zoomBy(0.1);
  else if (e.key === '-') zoomBy(-0.1);
  else if (e.key === '0') resetZoom();
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.layout-dropdown-wrap')) closeLayoutDropdown();
});

// ================================================================
// INIT
// ================================================================

const isMobile = window.matchMedia('(max-width: 768px)').matches;
if (isMobile) {
  currentView = 'before';
  document.querySelectorAll('.view-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.view === 'before');
  });
}

initLayouts().then(() => {
  if (!loadAutosave()) {
    buildPanes();
  }
  resetZoom();
});
</script>
</body>
</html>
