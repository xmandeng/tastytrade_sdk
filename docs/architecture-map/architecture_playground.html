<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TastyTrade SDK — Architecture Concept Map</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent-blue: #58a6ff;
    --accent-green: #3fb950;
    --accent-orange: #d29922;
    --accent-red: #f85149;
    --accent-purple: #bc8cff;
    --accent-cyan: #39d2c0;
    --accent-pink: #f778ba;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── TOP BAR (slim: title + focus pills + view actions) ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 44px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 16px;
    z-index: 100;
    gap: 12px;
  }
  .topbar h1 { font-size: 12px; font-weight: 600; color: var(--accent-blue); white-space: nowrap; letter-spacing: 0.5px; }
  .topbar .spacer { flex: 1; }
  .topbar button {
    background: var(--border);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .topbar button:hover { background: #484f58; }
  .topbar button.active { background: var(--accent-blue); color: #0d1117; border-color: var(--accent-blue); }

  /* Focus view pills — primary navigation */
  .focus-pills { display: flex; gap: 4px; margin-left: 8px; }
  .focus-pill {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-dim);
    padding: 4px 14px;
    border-radius: 14px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .focus-pill:hover { border-color: var(--text-dim); color: var(--text); }
  .focus-pill.on {
    font-weight: 600;
  }

  /* ── LEFT RAIL ── */
  .left-rail {
    position: fixed;
    top: 44px; left: 0; bottom: 0;
    width: 160px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    z-index: 95;
    display: flex;
    flex-direction: column;
    padding: 8px 0;
    transition: width 0.2s;
    overflow: hidden;
  }
  .left-rail.collapsed { width: 52px; }
  .left-rail .rail-toggle {
    align-self: flex-end;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 8px;
    margin: 0 6px 6px;
    border-radius: 4px;
    font-family: inherit;
    transition: color 0.15s;
  }
  .left-rail .rail-toggle:hover { color: var(--text); }
  .left-rail .rail-section {
    padding: 6px 10px;
    border-top: 1px solid var(--border);
  }
  .left-rail .rail-section:first-of-type { border-top: none; }
  .left-rail .rail-section-label {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
  }

  /* Layer checkboxes in rail */
  .layer-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 2px;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .layer-row:hover { background: rgba(255,255,255,0.04); }
  .layer-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .layer-dot.off { opacity: 0.2; }
  .layer-row-label {
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    transition: opacity 0.15s;
  }
  .layer-row.off .layer-row-label { color: var(--text-dim); opacity: 0.4; }

  /* Rail buttons */
  .rail-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 4px 2px;
    background: none;
    border: none;
    color: var(--text);
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s;
    white-space: nowrap;
    overflow: hidden;
  }
  .rail-btn:hover { background: rgba(255,255,255,0.04); }
  .rail-btn:disabled { opacity: 0.3; cursor: default; }
  .rail-btn:disabled:hover { background: none; }
  .rail-btn .rail-icon {
    width: 20px;
    text-align: center;
    flex-shrink: 0;
    font-size: 13px;
  }
  .rail-select {
    width: 100%;
    background: var(--border);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 3px 4px;
    border-radius: 4px;
    font-size: 10px;
    font-family: inherit;
    cursor: pointer;
    margin-top: 4px;
  }
  .rail-select:hover { background: #484f58; }

  /* Custom layout dropdown */
  .layout-dropdown-wrap { position: relative; margin-top: 4px; }
  .layout-dropdown-trigger {
    width: 100%;
    background: var(--border);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 5px;
    font-size: 10px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.12s, border-color 0.12s;
  }
  .layout-dropdown-trigger:hover { background: #484f58; }
  .layout-dropdown-trigger.open { border-color: var(--accent-blue); }
  .layout-dropdown-trigger .dd-arrow {
    font-size: 8px;
    color: var(--text-dim);
    transition: transform 0.15s;
  }
  .layout-dropdown-trigger.open .dd-arrow { transform: rotate(180deg); }
  .layout-dropdown-menu {
    position: absolute;
    left: 0; right: 0;
    top: calc(100% + 3px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px;
    z-index: 120;
    max-height: 180px;
    overflow-y: auto;
    box-shadow: 0 6px 20px rgba(0,0,0,0.45);
    display: none;
  }
  .layout-dropdown-menu.open { display: block; }
  .layout-dropdown-empty {
    font-size: 10px;
    color: var(--text-dim);
    padding: 6px 8px;
    text-align: center;
    font-style: italic;
  }
  .layout-dd-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 6px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.1s;
    font-size: 11px;
    color: var(--text);
  }
  .layout-dd-item:hover { background: rgba(255,255,255,0.06); }
  .layout-dd-item.active {
    color: var(--accent-blue);
    background: rgba(88,166,255,0.08);
  }
  .layout-dd-item-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .layout-dd-item-del {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    border-radius: 3px;
    opacity: 0;
    transition: opacity 0.12s, color 0.12s;
  }
  .layout-dd-item:hover .layout-dd-item-del { opacity: 1; }
  .layout-dd-item-del:hover { color: var(--accent-red); }

  /* Canvas area */
  #canvas-wrap {
    position: fixed;
    top: 44px; left: 160px; right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
    -webkit-user-select: none;
    user-select: none;
  }
  #canvas-wrap.dragging { cursor: grabbing; }
  #canvas {
    position: absolute;
    transform-origin: 0 0;
    width: 3000px;
    height: 2400px;
  }

  /* Nodes */
  .node {
    position: absolute;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    padding: 12px 16px;
    cursor: grab;
    transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
    min-width: 160px;
    user-select: none;
  }
  .node:hover {
    border-color: var(--accent-blue);
    box-shadow: 0 0 20px rgba(88,166,255,0.15);
    transform: translateY(-1px);
    cursor: grab;
  }
  .node:active { cursor: grabbing; }
  .node.selected {
    border-color: var(--accent-blue);
    box-shadow: 0 0 30px rgba(88,166,255,0.25);
  }
  .node.group-selected {
    border-color: var(--accent-cyan);
    box-shadow: 0 0 20px rgba(57,210,192,0.3);
  }
  .node.group-selected .node-label { color: var(--accent-cyan) !important; }
  .node.highlighted {
    border-color: var(--accent-green);
    box-shadow: 0 0 24px rgba(63,185,80,0.3);
  }

  /* Lasso selection rectangle */
  #lasso {
    position: absolute;
    border: 1.5px dashed var(--accent-cyan);
    background: rgba(57,210,192,0.06);
    pointer-events: none;
    display: none;
    z-index: 60;
  }
  .node-label {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
    white-space: nowrap;
  }
  .node-type {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .node-badge {
    display: inline-block;
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 8px;
    margin-top: 4px;
    font-weight: 500;
  }

  /* Layer colors */
  .layer-websocket { border-left: 3px solid var(--accent-blue); }
  .layer-websocket .node-label { color: var(--accent-blue); }
  .layer-websocket .node-badge { background: rgba(88,166,255,0.15); color: var(--accent-blue); }

  .layer-queue { border-left: 3px solid var(--accent-orange); }
  .layer-queue .node-label { color: var(--accent-orange); }
  .layer-queue .node-badge { background: rgba(210,153,34,0.15); color: var(--accent-orange); }

  .layer-routing { border-left: 3px solid var(--accent-purple); }
  .layer-routing .node-label { color: var(--accent-purple); }
  .layer-routing .node-badge { background: rgba(188,140,255,0.15); color: var(--accent-purple); }

  .layer-processor { border-left: 3px solid var(--accent-green); }
  .layer-processor .node-label { color: var(--accent-green); }
  .layer-processor .node-badge { background: rgba(63,185,80,0.15); color: var(--accent-green); }

  .layer-persistence { border-left: 3px solid var(--accent-red); }
  .layer-persistence .node-label { color: var(--accent-red); }
  .layer-persistence .node-badge { background: rgba(248,81,73,0.15); color: var(--accent-red); }

  .layer-signal { border-left: 3px solid var(--accent-cyan); }
  .layer-signal .node-label { color: var(--accent-cyan); }
  .layer-signal .node-badge { background: rgba(57,210,192,0.15); color: var(--accent-cyan); }

  .layer-config { border-left: 3px solid var(--accent-pink); }
  .layer-config .node-label { color: var(--accent-pink); }
  .layer-config .node-badge { background: rgba(247,120,186,0.15); color: var(--accent-pink); }

  /* Zone labels */
  .zone {
    position: absolute;
    border: 1px dashed;
    border-radius: 14px;
    padding: 12px 16px;
    opacity: 0.5;
    pointer-events: none;
  }
  .zone-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    position: absolute;
    top: -10px;
    left: 16px;
    padding: 0 6px;
    background: var(--bg);
  }

  /* SVG edges */
  #edges {
    position: absolute;
    top: 0; left: 0;
    width: 3000px;
    height: 2400px;
    pointer-events: none;
    overflow: visible;
  }
  .edge {
    stroke: var(--border);
    stroke-width: 1.5;
    fill: none;
    transition: stroke 0.2s, stroke-width 0.2s;
  }
  .edge.highlighted {
    stroke: var(--accent-green);
    stroke-width: 2.5;
    filter: drop-shadow(0 0 4px rgba(63,185,80,0.4));
  }
  .edge-label {
    font-size: 10px;
    fill: var(--text-dim);
    font-family: inherit;
  }
  .edge-label.highlighted { fill: var(--accent-green); }
  marker#arrowhead path { fill: var(--border); }
  marker#arrowhead-hl path { fill: var(--accent-green); }

  /* Detail panel */
  .detail-panel {
    position: fixed;
    top: 44px; right: 0; bottom: 0;
    width: 380px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 90;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.25s ease;
    padding: 20px;
  }
  .detail-panel.open { transform: translateX(0); }
  .detail-panel h2 { font-size: 16px; margin-bottom: 4px; }
  .detail-panel .detail-type { font-size: 11px; color: var(--text-dim); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-panel .detail-file {
    font-size: 11px;
    color: var(--accent-blue);
    background: rgba(88,166,255,0.1);
    padding: 4px 8px;
    border-radius: 6px;
    display: inline-block;
    margin-bottom: 12px;
    word-break: break-all;
  }
  .detail-panel .detail-section { margin-bottom: 16px; }
  .detail-panel .detail-section h3 {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .detail-panel .detail-section p { font-size: 13px; line-height: 1.6; }
  .detail-panel .detail-section code {
    background: rgba(110,118,129,0.15);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--accent-orange);
  }
  .detail-panel pre {
    background: var(--bg);
    padding: 10px;
    border-radius: 8px;
    font-size: 11px;
    line-height: 1.5;
    overflow-x: auto;
    border: 1px solid var(--border);
    margin-top: 6px;
  }
  .detail-panel .connections-list {
    list-style: none;
    padding: 0;
  }
  .detail-panel .connections-list li {
    font-size: 12px;
    padding: 4px 0;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .detail-panel .connections-list li .arrow { color: var(--accent-green); font-weight: bold; }
  .detail-panel .insight {
    border-left: 2px solid var(--accent-cyan);
    padding: 8px 12px;
    margin-bottom: 8px;
    background: rgba(57,210,192,0.05);
    border-radius: 0 6px 6px 0;
    font-size: 12px;
    line-height: 1.5;
  }
  .detail-panel .insight.author-xmandeng { border-left-color: #4aafd7; background: rgba(74,175,215,0.05); }
  .detail-panel .insight.author-claude { border-left-color: #da7756; background: rgba(218,119,86,0.05); }
  .detail-panel .insight-author {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .insight-avatar {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    vertical-align: middle;
  }
  svg.insight-avatar { color: #da7756; }
  .insight.author-xmandeng .insight-author { color: #4aafd7; }
  .insight.author-claude .insight-author { color: #da7756; }
  .detail-panel .insight-text { color: var(--text); }
  .node-insight-dot {
    position: absolute;
    top: 6px; right: 6px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-cyan);
  }
  .detail-panel .close-btn {
    position: absolute;
    top: 16px; right: 16px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    font-family: inherit;
  }

  /* Floating panels (nav) */
  .floating-panel {
    position: fixed;
    z-index: 80;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: grab;
  }
  .floating-panel.fp-dragging { cursor: grabbing; box-shadow: 0 0 16px rgba(88,166,255,0.2); }

  /* Nav panel (minimap + zoom grouped) */
  .nav-panel {
    bottom: 16px; right: 16px;
    border: none;
    background: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* Minimap */
  .minimap {
    width: 200px; height: 160px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }
  .minimap canvas { width: 100%; height: 100%; }
  .minimap-viewport {
    position: absolute;
    border: 1px solid var(--accent-blue);
    background: rgba(88,166,255,0.08);
    pointer-events: none;
  }

  /* Zoom controls */
  .zoom-controls {
    padding: 6px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .zoom-controls button {
    background: var(--border);
    border: 1px solid transparent;
    color: var(--text);
    width: 24px; height: 24px;
    border-radius: 5px;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .zoom-controls button:hover { background: #484f58; }
  .zoom-controls .zoom-pct {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 36px;
    text-align: center;
    cursor: pointer;
  }
  .zoom-controls .zoom-pct:hover { color: var(--text); }
  .zoom-controls input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .zoom-controls input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent-blue);
    cursor: pointer;
  }
  .zoom-controls input[type="range"]::-moz-range-thumb {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent-blue);
    border: none;
    cursor: pointer;
  }

  /* Data flow animation */
  @keyframes flowPulse {
    0% { stroke-dashoffset: 20; }
    100% { stroke-dashoffset: 0; }
  }
  .edge.animated {
    stroke-dasharray: 8 4;
    animation: flowPulse 0.8s linear infinite;
  }

  /* Functional view dimming */
  .node.view-dimmed {
    opacity: 0.12;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .edge.view-dimmed, .edge-label.view-dimmed {
    opacity: 0.06;
    transition: opacity 0.3s;
  }
  .node:not(.view-dimmed) { transition: opacity 0.3s; }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 11px;
    color: var(--text);
    pointer-events: none;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 300px;
  }
  .tooltip.visible { opacity: 1; }

  /* Dirty dot for layout trigger */
  .dirty-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-orange);
    flex-shrink: 0;
  }

  /* Save modal */
  .save-modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .save-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    width: 320px;
    max-height: 400px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .save-modal h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin: 0;
  }
  .save-modal input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
  }
  .save-modal input[type="text"]:focus {
    border-color: var(--accent-blue);
  }
  .save-modal-list {
    max-height: 160px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .save-modal-list:empty { display: none; }
  .save-modal-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 6px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .save-modal-row:hover { background: rgba(255,255,255,0.05); }
  .save-modal-row-name {
    flex: 1;
    font-size: 11px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .save-modal-row-del {
    background: none;
    border: none;
    color: var(--text-dim);

    code: `class EngineRunner:\n  def __init__(self, name, subscription, channels,\n               event_type, on_event, publisher=None):\n    self.subscription = subscription  # dedicated!\n    self.on_event = on_event\n    self.publisher = publisher  # optional\n    ...\n\n  async def start(self):\n    await self.subscription.connect()\n    for channel in self.channels:\n      await self.subscription.subscribe(\n        channel,\n        event_type=self.event_type,\n        on_update=self.on_event\n        # ↑ events fire DIRECTLY into callback\n        # No queue. No polling. Event-driven.\n      )\n    await asyncio.Event().wait()`,

// ── UNDO / REDO ─────────────────────────────────────────────────────
const undoStack = [];
const redoStack = [];
const MAX_UNDO = 50;

function snapshotPositions() {
  const snap = {};
  nodes.forEach(n => { snap[n.id] = { x: n.x, y: n.y }; });
  return snap;
}

function pushUndo(snapshot) {
  undoStack.push(snapshot);
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack.length = 0; // clear redo on new action
  updateUndoRedoButtons();
}

function applySnapshot(snap) {
  nodes.forEach(n => {
    if (snap[n.id]) {
      n.x = snap[n.id].x;
      n.y = snap[n.id].y;
      const el = document.getElementById(`node-${n.id}`);
      if (el) {
        el.style.left = n.x + 'px';
        el.style.top = n.y + 'px';
      }
    }
  });
  renderEdges();
  updateMinimap();
}

function undo() {
  if (undoStack.length === 0) return;
  redoStack.push(snapshotPositions());
  applySnapshot(undoStack.pop());
  updateUndoRedoButtons();
  autosave();
}

function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(snapshotPositions());
  applySnapshot(redoStack.pop());
  updateUndoRedoButtons();
  autosave();
}

function updateUndoRedoButtons() {
  document.getElementById('undo-btn').disabled = undoStack.length === 0;
  document.getElementById('redo-btn').disabled = redoStack.length === 0;
}

function updateGroupVisuals() {

  });

}

function getNodeMetadata(nodeId) {
  const node = nodes.find(n => n.id === nodeId);
  if (!node) return null;
  const meta = { id: node.id, label: node.label, type: node.type };
  if (node.file) meta.file = node.file;
  if (node.layer) meta.layer = node.layer;
  if (node.badge) meta.badge = node.badge;
  if (node.desc) meta.description = node.desc;
  if (node.details) meta.details = node.details;
  if (node.code) meta.code = node.code;
  if (node.insights?.length) meta.insights = node.insights;
  const incoming = edges.filter(e => e.to === nodeId).map(e => {
    const src = nodes.find(n => n.id === e.from);
    return { from: src?.label || e.from, label: e.label || null };
  });
  const outgoing = edges.filter(e => e.from === nodeId).map(e => {
    const tgt = nodes.find(n => n.id === e.to);
    return { to: tgt?.label || e.to, label: e.label || null };
  });
  if (incoming.length) meta.incoming = incoming;
  if (outgoing.length) meta.outgoing = outgoing;
  return meta;
}

async function copySelectedMetadata() {
  let metadata;
  if (groupSelected.size > 0) {
    metadata = [...groupSelected].map(getNodeMetadata).filter(Boolean);
  } else if (selectedNode) {
    metadata = getNodeMetadata(selectedNode);
  } else {
    return false;
  }
  await navigator.clipboard.writeText(JSON.stringify(metadata, null, 2));
  const count = groupSelected.size || 1;
  showToast(`Copied ${count} node${count > 1 ? 's' : ''} metadata`);
  return true;
}

// ── LAYOUT PERSISTENCE ───────────────────────────────────────────────
// Saved layouts live in architecture_layouts.json (version-controlled).
// When served via devserver, saves write to the file via a tiny PUT endpoint.
// Falls back to localStorage when opened directly (file:// or no server).
const LAYOUTS_FILE = 'architecture_layouts.json';
const STORAGE_KEY = 'tastytrade-arch-layouts';
let savedLayouts = {};
let canWriteToFile = false;
let activeLayoutName = null;
let savedLayoutSnapshot = null;

async function initLayouts() {
  // Try loading from the JSON file first (served alongside the HTML)
  try {
    const resp = await fetch(LAYOUTS_FILE);
    if (resp.ok) {
      savedLayouts = await resp.json();
      canWriteToFile = true;
    }
  } catch { /* file not available */ }

  // Merge any localStorage entries (migration / offline edits)
  try {
    const local = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    Object.keys(local).forEach(k => {
      if (!savedLayouts[k]) savedLayouts[k] = local[k];
    });
  } catch { /* ignore */ }

  refreshLayoutSelect();
}

function getSavedLayouts() {
  return savedLayouts;
}

async function persistLayouts() {
  // Always sync to localStorage as backup
  localStorage.setItem(STORAGE_KEY, JSON.stringify(savedLayouts));

  // Try writing to the JSON file via devserver
  if (canWriteToFile) {
    try {
      await fetch(LAYOUTS_FILE, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(savedLayouts, null, 2),
      });
    } catch {
      // PUT not supported (plain http.server) — export instead
      canWriteToFile = false;
    }
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showToast(msg) {

  t.textContent = msg;
  t.classList.add('visible');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('visible'), 2000);
}

function isDirty() {
  if (!savedLayoutSnapshot) return false;
  return JSON.stringify(snapshotPositions()) !== savedLayoutSnapshot;
}

function updateActiveLayoutDisplay() {
  const label = document.getElementById('layout-dd-label');
  if (!label) return;
  if (!activeLayoutName) {
    const count = Object.keys(savedLayouts).length;
    label.innerHTML = count ? 'Select layout...' : 'No layouts';
    label.style.color = '';
    return;
  }
  const dirty = isDirty();
  label.innerHTML = (dirty ? '<span class="dirty-dot"></span> ' : '') + escHtml(activeLayoutName);
  label.style.color = 'var(--accent-blue)';
}

function saveLayout() {

function openSaveModal() {
  // Remove any existing modal
  closeSaveModal();
  const backdrop = document.createElement('div');
  backdrop.className = 'save-modal-backdrop';
  backdrop.id = 'save-modal-backdrop';
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeSaveModal(); });

  const names = Object.keys(savedLayouts);
  let listHtml = '';
  names.forEach(name => {
    listHtml += `<div class="save-modal-row" data-name="${escHtml(name)}">
      <span class="save-modal-row-name" title="${escHtml(name)}">${escHtml(name)}</span>
      <button class="save-modal-row-del" title="Delete" data-del="${escHtml(name)}">&times;</button>
    </div>`;
  });

  backdrop.innerHTML = `<div class="save-modal">
    <h3>Save Layout</h3>
    <input type="text" id="save-modal-input" placeholder="Layout name..." value="${escHtml(activeLayoutName || '')}">
    <div class="save-modal-list" id="save-modal-list">${listHtml}</div>
    <div class="save-modal-actions">
      <button class="save-modal-cancel" onclick="closeSaveModal()">Cancel</button>
      <button class="save-modal-confirm" id="save-modal-btn" onclick="confirmSave()">Save</button>
    </div>
  </div>`;

  document.body.appendChild(backdrop);

  const inp = document.getElementById('save-modal-input');
  inp.focus();
  inp.select();
  inp.addEventListener('input', updateSaveButtonText);
  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); confirmSave(); }
  });
  updateSaveButtonText();

  // Click row to fill input, click delete to remove
  backdrop.querySelectorAll('.save-modal-row').forEach(row => {
    row.addEventListener('click', (e) => {
      if (e.target.closest('.save-modal-row-del')) return;
      inp.value = row.dataset.name;
      inp.focus();
      updateSaveButtonText();
    });
  });
  backdrop.querySelectorAll('.save-modal-row-del').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteLayoutFromModal(btn.dataset.del);
    });
  });
}

function closeSaveModal() {
  const el = document.getElementById('save-modal-backdrop');
  if (el) el.remove();
}

function updateSaveButtonText() {
  const inp = document.getElementById('save-modal-input');
  const btn = document.getElementById('save-modal-btn');
  if (!inp || !btn) return;
  const name = inp.value.trim();
  if (name && savedLayouts[name]) {
    btn.textContent = `Overwrite "${name}"`;
  } else {
    btn.textContent = 'Save';
  }
}

function confirmSave() {
  const inp = document.getElementById('save-modal-input');
  if (!inp) return;
  const name = inp.value.trim();
  if (!name) return;
  savedLayouts[name] = snapshotPositions();
  activeLayoutName = name;
  savedLayoutSnapshot = JSON.stringify(savedLayouts[name]);
  persistLayouts();
  refreshLayoutSelect();
  updateActiveLayoutDisplay();
  closeSaveModal();
  showToast(`Saved "${name}"`);
  autosave();

  if (!canWriteToFile) {
    downloadLayoutsFile();
  }
}

function deleteLayoutFromModal(name) {
  delete savedLayouts[name];
  if (activeLayoutName === name) {
    activeLayoutName = null;
    savedLayoutSnapshot = null;
    updateActiveLayoutDisplay();
  }
  persistLayouts();
  refreshLayoutSelect();
  // Refresh the modal list
  const list = document.getElementById('save-modal-list');
  if (list) {
    const row = list.querySelector(`[data-name="${CSS.escape(name)}"]`);
    if (row) row.remove();
  }
  updateSaveButtonText();
}

function downloadLayoutsFile() {
  const blob = new Blob([JSON.stringify(savedLayouts, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = LAYOUTS_FILE;
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadLayout(name) {
  if (!name) return;
  if (!savedLayouts[name]) return;
  pushUndo(snapshotPositions());
  applySnapshot(savedLayouts[name]);
  refreshLayoutSelect();
  activeLayoutName = name;
  savedLayoutSnapshot = JSON.stringify(savedLayouts[name]);
  updateActiveLayoutDisplay();
  autosave();
}

function deleteLayout(name) {
  delete savedLayouts[name];
  persistLayouts();
  refreshLayoutSelect();
}

function resetLayout() {
  pushUndo(snapshotPositions());
  applySnapshot(DEFAULT_POSITIONS);
  activeLayoutName = null;
  savedLayoutSnapshot = null;
  updateActiveLayoutDisplay();
  autosave();

function refreshLayoutSelect() {
  const menu = document.getElementById('layout-dropdown-menu');
  const names = Object.keys(savedLayouts);
  updateActiveLayoutDisplay();
  if (!names.length) {
    menu.innerHTML = '<div class="layout-dropdown-empty">No saved layouts</div>';

  menu.innerHTML = '';
  names.forEach(name => {
    const item = document.createElement('div');
    item.className = 'layout-dd-item' + (name === activeLayoutName ? ' active' : '');
    item.innerHTML = `<span class="layout-dd-item-name" title="${escHtml(name)}">${escHtml(name)}</span>

let autosaveTimer = null;
function debouncedAutosave() {
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => { autosave(); updateActiveLayoutDisplay(); }, 500);
}

function autosave() {
  localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({
    positions: snapshotPositions(),
    pan: { x: panX, y: panY },
    scale: scale,
    activeLayoutName: activeLayoutName,
  }));
}

function restoreAutosave() {
  try {
    const saved = JSON.parse(localStorage.getItem(AUTOSAVE_KEY));
    if (!saved) return false;
    if (saved.positions) applySnapshot(saved.positions);
    if (saved.pan) { panX = saved.pan.x; panY = saved.pan.y; }
    if (saved.scale) scale = saved.scale;
    if (saved.activeLayoutName && savedLayouts[saved.activeLayoutName]) {
      activeLayoutName = saved.activeLayoutName;
      savedLayoutSnapshot = JSON.stringify(savedLayouts[activeLayoutName]);
    }
    updateTransform();
    updateActiveLayoutDisplay();
    return true;
  } catch { return false; }
}

async function init() {
  renderFocusPills();
  renderLayerRows();
  renderNodes();
  await initLayouts();
  restoreAutosave();
  renderEdges();

  updateMinimap();
}

function renderLayerRows() {
  const container = document.getElementById('layer-rows');
  container.innerHTML = '';
  Object.entries(LAYERS).forEach(([key, layer]) => {
    const row = document.createElement('div');
    const isOn = layerVisibility[key];
    row.className = `layer-row${isOn ? '' : ' off'}`;
    row.innerHTML = `<div class="layer-dot${isOn ? '' : ' off'}" style="background:${layer.color}"></div><span class="layer-row-label">${layer.label}</span>`;
    row.onclick = () => {
      layerVisibility[key] = !layerVisibility[key];
      renderLayerRows();
      updateVisibility();
    };
    container.appendChild(row);
  });
}

function renderFocusPills() {
  const container = document.getElementById('focus-pills');
  container.innerHTML = '';
  // "All" pill
  const allBtn = document.createElement('button');
  allBtn.className = `focus-pill${activeView === null ? ' on' : ''}`;
  allBtn.textContent = 'All';
  if (activeView === null) {
    allBtn.style.borderColor = 'var(--accent-blue)';
    allBtn.style.color = 'var(--accent-blue)';
    allBtn.style.background = 'rgba(88,166,255,0.1)';
  }
  allBtn.onclick = () => {
    activeView = null;
    renderFocusPills();
    applyFunctionalView();
  };
  container.appendChild(allBtn);

  Object.entries(FUNCTIONAL_VIEWS).forEach(([name, view]) => {
    const btn = document.createElement('button');
    const isActive = activeView === name;
    btn.className = `focus-pill${isActive ? ' on' : ''}`;
    btn.textContent = name;
    if (isActive) {
      btn.style.borderColor = view.color;
      btn.style.color = view.color;
      btn.style.background = `${view.color}15`;
    } else {
      btn.style.borderColor = '';
      btn.style.color = '';
      btn.style.background = '';
    }
    btn.onclick = () => {
      activeView = isActive ? null : name;
      renderFocusPills();
      applyFunctionalView();
    };
    container.appendChild(btn);
  });
}

function toggleRail() {
  const rail = document.getElementById('left-rail');
  const wrap = document.getElementById('canvas-wrap');
  const collapsed = rail.classList.toggle('collapsed');
  wrap.style.left = collapsed ? '52px' : '160px';
  updateMinimap();
}

function applyFunctionalView() {
  if (!activeView) {
    // Clear all dimming
    nodes.forEach(n => {
      const el = document.getElementById(`node-${n.id}`);
      if (el) el.classList.remove('view-dimmed');
    });
    document.querySelectorAll('.edge.view-dimmed, .edge-label.view-dimmed').forEach(el => {
      el.classList.remove('view-dimmed');
    });
    return;
  }

  const viewNodes = FUNCTIONAL_VIEWS[activeView].nodes;

  // Dim/undim nodes
  nodes.forEach(n => {
    const el = document.getElementById(`node-${n.id}`);
    if (el) el.classList.toggle('view-dimmed', !viewNodes.has(n.id));
  });

  // Dim/undim edges — visible only if both endpoints are in the view
  document.querySelectorAll('.edge, .edge-label').forEach(el => {
    const fromIn = viewNodes.has(el.dataset.from);
    const toIn = viewNodes.has(el.dataset.to);
    el.classList.toggle('view-dimmed', !(fromIn && toIn));
  });
}

function renderNodes() {
  nodes.forEach(node => {
    const el = document.createElement('div');
    el.className = `node layer-${node.layer}`;
    el.id = `node-${node.id}`;
    el.style.left = node.x + 'px';
    el.style.top = node.y + 'px';
    el.dataset.id = node.id;

    let html = '';
    if (node.insights && node.insights.length > 0) {
      html += `<div class="node-insight-dot" title="${node.insights.length} insight(s)"></div>`;
    }
    html += `<div class="node-label">${node.label}</div>`;
    html += `<div class="node-type">${node.type}</div>`;
    if (node.badge) {
      html += `<div class="node-badge">${node.badge}</div>`;
    }
    el.innerHTML = html;

    // Mousedown starts potential drag (or Shift+Click for group toggle)
    el.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      e.preventDefault(); // prevent Safari Shift+Click text selection
      draggingNode = node;
      nodeDragMoved = false;
      nodeDragStartX = e.clientX;
      nodeDragStartY = e.clientY;
      nodeOrigX = node.x;
      nodeOrigY = node.y;
      preDragSnapshot = snapshotPositions(); // capture before any move

      // If this node is part of group, record all group members' origins
      if (groupSelected.has(node.id) && groupSelected.size > 1) {
        groupDragOrigins = {};
        groupSelected.forEach(id => {
          const n = nodes.find(nd => nd.id === id);
          if (n) groupDragOrigins[id] = { x: n.x, y: n.y };
        });
      } else {
        groupDragOrigins = null;
      }

      el.style.zIndex = 50;
      el.style.transition = 'box-shadow 0.2s, border-color 0.2s'; // disable transform transition while dragging
      hideTooltip();
    });

    el.addEventListener('mouseenter', (e) => { if (!draggingNode) showTooltip(e, node); });
    el.addEventListener('mouseleave', hideTooltip);

    canvas.appendChild(el);
  });
}

// Global mousemove for node dragging
window.addEventListener('mousemove', (e) => {
  // Lasso selection
  if (isLassoing) {
    const curX = e.clientX;
    const curY = e.clientY;
    const rect = canvasWrap.getBoundingClientRect();
    const l = Math.min(lassoStartX, curX) - rect.left;
    const t = Math.min(lassoStartY, curY) - rect.top;
    const w = Math.abs(curX - lassoStartX);
    const h = Math.abs(curY - lassoStartY);
    lassoEl.style.left = l + 'px';
    lassoEl.style.top = t + 'px';
    lassoEl.style.width = w + 'px';
    lassoEl.style.height = h + 'px';
    lassoEl.style.display = 'block';
    return;
  }

  if (!draggingNode) return;

  const dx = (e.clientX - nodeDragStartX) / scale;
  const dy = (e.clientY - nodeDragStartY) / scale;

  if (!nodeDragMoved && (Math.abs(dx) > NODE_DRAG_THRESHOLD || Math.abs(dy) > NODE_DRAG_THRESHOLD)) {
    nodeDragMoved = true;
    canvasWrap.classList.add('dragging');
  }

  if (nodeDragMoved) {
    // Move the primary dragged node
    draggingNode.x = nodeOrigX + dx;
    draggingNode.y = nodeOrigY + dy;
    const el = document.getElementById(`node-${draggingNode.id}`);
    if (el) {
      el.style.left = draggingNode.x + 'px';
      el.style.top = draggingNode.y + 'px';
    }

    // Move all other group members by the same delta
    if (groupDragOrigins) {
      groupSelected.forEach(id => {
        if (id === draggingNode.id) return;
        const n = nodes.find(nd => nd.id === id);
        const orig = groupDragOrigins[id];
        if (!n || !orig) return;
        n.x = orig.x + dx;
        n.y = orig.y + dy;
        const nel = document.getElementById(`node-${id}`);
        if (nel) {
          nel.style.left = n.x + 'px';
          nel.style.top = n.y + 'px';
        }
      });
    }

    renderEdges();
    updateMinimap();
  }
});

// Snapshot taken on drag start (before move)
let preDragSnapshot = null;

// Global mouseup for node dragging + lasso + group
window.addEventListener('mouseup', (e) => {
  // Finalize lasso selection
  if (isLassoing) {
    isLassoing = false;
    lassoEl.style.display = 'none';
    canvasWrap.classList.remove('dragging');

    // Determine which nodes are inside the lasso rect (in screen coords)
    const rect = canvasWrap.getBoundingClientRect();
    const lx1 = (Math.min(lassoStartX, e.clientX) - rect.left - panX) / scale;
    const ly1 = (Math.min(lassoStartY, e.clientY) - rect.top - panY) / scale;
    const lx2 = (Math.max(lassoStartX, e.clientX) - rect.left - panX) / scale;
    const ly2 = (Math.max(lassoStartY, e.clientY) - rect.top - panY) / scale;

    nodes.forEach(n => {
      if (!layerVisibility[n.layer]) return;
      const el = document.getElementById(`node-${n.id}`);
      if (!el) return;
      const cx = n.x + el.offsetWidth / 2;
      const cy = n.y + el.offsetHeight / 2;
      if (cx >= lx1 && cx <= lx2 && cy >= ly1 && cy <= ly2) {
        groupSelected.add(n.id);
      }
    });
    updateGroupVisuals();
    return;
  }

  if (draggingNode) {
    const el = document.getElementById(`node-${draggingNode.id}`);
    if (el) {
      el.style.zIndex = '';
      el.style.transition = '';
    }

    // If we actually dragged, push the pre-drag snapshot to undo stack
    if (nodeDragMoved && preDragSnapshot) {
      pushUndo(preDragSnapshot);
      autosave();
    }

    // If we didn't drag past threshold, treat as click
    if (!nodeDragMoved) {
      if (e.shiftKey) {
        // Shift+Click: toggle group membership, close detail panel
        closeDetail();
        toggleGroupSelect(draggingNode.id);
      } else {
        // Normal click: open detail, clear group
        clearGroupSelection();
        selectNode(draggingNode);
      }
    }

    draggingNode = null;
    nodeDragMoved = false;
    preDragSnapshot = null;
    groupDragOrigins = null;
    canvasWrap.classList.remove('dragging');
    return;
  }
});

function getNodeCenter(id) {
  const el = document.getElementById(`node-${id}`);
  if (!el) return null;
  const r = el.getBoundingClientRect();
  // Use the actual position from the node data
  const node = nodes.find(n => n.id === id);
  if (!node) return null;
  return {
    x: node.x + el.offsetWidth / 2,
    y: node.y + el.offsetHeight / 2,
    w: el.offsetWidth,
    h: el.offsetHeight,
    top: node.y,
    bottom: node.y + el.offsetHeight,
    left: node.x,
    right: node.x + el.offsetWidth
  };
}

function renderEdges() {
  // Clear existing edges (preserve defs)
  const defs = edgeSvg.querySelector('defs');
  edgeSvg.innerHTML = '';
  edgeSvg.appendChild(defs);

  // Wait a tick for DOM to layout
  requestAnimationFrame(() => {
    edges.forEach((edge, i) => {
      const from = getNodeCenter(edge.from);
      const to = getNodeCenter(edge.to);
      if (!from || !to) return;

      // Calculate connection points
      let x1, y1, x2, y2;

      // Determine best exit/entry sides
      const dx = to.x - from.x;
      const dy = to.y - from.y;

      if (Math.abs(dy) > Math.abs(dx) * 0.5) {
        // More vertical
        if (dy > 0) {
          x1 = from.x; y1 = from.bottom;
          x2 = to.x; y2 = to.top;
        } else {
          x1 = from.x; y1 = from.top;
          x2 = to.x; y2 = to.bottom;
        }
      } else {
        // More horizontal
        if (dx > 0) {
          x1 = from.right; y1 = from.y;
          x2 = to.left; y2 = to.y;
        } else {
          x1 = from.left; y1 = from.y;
          x2 = to.right; y2 = to.y;
        }
      }

      const midY = (y1 + y2) / 2;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const d = Math.abs(y2 - y1) > 30
        ? `M${x1},${y1} C${x1},${midY} ${x2},${midY} ${x2},${y2}`
        : `M${x1},${y1} L${x2},${y2}`;
      path.setAttribute('d', d);
      path.setAttribute('class', 'edge');
      path.setAttribute('marker-end', 'url(#arrowhead)');
      path.dataset.from = edge.from;
      path.dataset.to = edge.to;
      path.dataset.index = i;
      if (edge.style === 'dashed') {
        path.setAttribute('stroke-dasharray', '6 3');
      }
      edgeSvg.appendChild(path);

      // Label
      if (edge.label) {
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', (x1 + x2) / 2);
        text.setAttribute('y', (y1 + y2) / 2 - 6);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('class', 'edge-label');
        text.dataset.from = edge.from;
        text.dataset.to = edge.to;
        text.textContent = edge.label;
        edgeSvg.appendChild(text);
      }
    });
  });
}

function selectNode(node) {
  // Deselect previous
  document.querySelectorAll('.node.selected, .node.highlighted').forEach(el => {
    el.classList.remove('selected', 'highlighted');
  });
  document.querySelectorAll('.edge.highlighted, .edge.animated').forEach(el => {
    el.classList.remove('highlighted', 'animated');
    el.setAttribute('marker-end', 'url(#arrowhead)');
  });
  document.querySelectorAll('.edge-label.highlighted').forEach(el => {
    el.classList.remove('highlighted');
  });

  if (selectedNode === node.id) {
    selectedNode = null;
    closeDetail();
    return;
  }

  selectedNode = node.id;

  // Highlight selected
  const el = document.getElementById(`node-${node.id}`);
  if (el) el.classList.add('selected');

  // Highlight connected nodes and edges
  const connectedNodes = new Set();
  edges.forEach((edge, i) => {
    if (edge.from === node.id || edge.to === node.id) {
      const otherId = edge.from === node.id ? edge.to : edge.from;
      connectedNodes.add(otherId);

      // Highlight edges
      document.querySelectorAll(`.edge[data-from="${edge.from}"][data-to="${edge.to}"]`).forEach(path => {
        path.classList.add('highlighted');
        if (flowAnimated) path.classList.add('animated');
        path.setAttribute('marker-end', 'url(#arrowhead-hl)');
      });
      document.querySelectorAll(`.edge-label[data-from="${edge.from}"][data-to="${edge.to}"]`).forEach(lbl => {
        lbl.classList.add('highlighted');
      });
    }
  });

  connectedNodes.forEach(id => {
    const connEl = document.getElementById(`node-${id}`);
    if (connEl) connEl.classList.add('highlighted');
  });

  // Show detail panel
  showDetail(node, connectedNodes);
}

function showDetail(node, connectedNodes) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');

  const incoming = edges.filter(e => e.to === node.id).map(e => {
    const src = nodes.find(n => n.id === e.from);
    return `<li><span class="arrow">&larr;</span> ${src ? src.label : e.from} <code>${e.label || ''}</code></li>`;
  }).join('');

  const outgoing = edges.filter(e => e.from === node.id).map(e => {
    const tgt = nodes.find(n => n.id === e.to);
    return `<li><span class="arrow">&rarr;</span> ${tgt ? tgt.label : e.to} <code>${e.label || ''}</code></li>`;
  }).join('');

  const insightsHtml = (node.insights && node.insights.length > 0)
    ? `<div class="detail-section"><h3>Insights</h3>${
        node.insights.map(i =>
          `<div class="insight author-${i.author}"><div class="insight-author">${{xmandeng: '<img class="insight-avatar" src="https://avatars.githubusercontent.com/u/44256405?v=4&s=32" alt="">Mandeng', claude: '<svg class="insight-avatar" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M5 2H19V7H21V16H17V21H14V16H10V21H7V16H3V7H5Z M8 9H11V12H8Z M13 9H16V12H13Z"/></svg>Claude'}[i.author] || i.author}</div><div class="insight-text">${i.text}</div></div>`
        ).join('')
      }</div>`
    : '';

  content.innerHTML = `
    <h2>${node.label}</h2>
    <div class="detail-type">${node.type}</div>
    ${node.file ? `<div class="detail-file">${node.file}</div>` : ''}
    <div class="detail-section">
      <h3>Description</h3>
      <p>${node.desc}</p>
    </div>
    ${insightsHtml}
    ${node.details ? `<div class="detail-section"><h3>Implementation Details</h3><pre>${node.details}</pre></div>` : ''}
    ${node.code ? `<div class="detail-section"><h3>Code Pattern</h3><pre>${node.code}</pre></div>` : ''}
    ${incoming ? `<div class="detail-section"><h3>Incoming</h3><ul class="connections-list">${incoming}</ul></div>` : ''}
    ${outgoing ? `<div class="detail-section"><h3>Outgoing</h3><ul class="connections-list">${outgoing}</ul></div>` : ''}
  `;

  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.querySelectorAll('.node.selected, .node.highlighted').forEach(el => {
    el.classList.remove('selected', 'highlighted');
  });
  document.querySelectorAll('.edge.highlighted, .edge.animated').forEach(el => {
    el.classList.remove('highlighted', 'animated');
    el.setAttribute('marker-end', 'url(#arrowhead)');
  });
  document.querySelectorAll('.edge-label.highlighted').forEach(el => {
    el.classList.remove('highlighted');
  });
  selectedNode = null;
}

function showTooltip(e, node) {
  if (selectedNode) return;
  tooltip.textContent = node.desc.substring(0, 120) + (node.desc.length > 120 ? '...' : '');
  tooltip.style.left = (e.clientX + 12) + 'px';
  tooltip.style.top = (e.clientY + 12) + 'px';
  tooltip.classList.add('visible');
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

function updateVisibility() {
  nodes.forEach(node => {
    const el = document.getElementById(`node-${node.id}`);
    if (el) {
      el.style.display = layerVisibility[node.layer] ? '' : 'none';
    }
  });
  // Re-render edges to reflect visibility
  document.querySelectorAll('.edge, .edge-label').forEach(el => {
    const fromNode = nodes.find(n => n.id === el.dataset.from);
    const toNode = nodes.find(n => n.id === el.dataset.to);
    if (fromNode && toNode) {
      const visible = layerVisibility[fromNode.layer] && layerVisibility[toNode.layer];
      el.style.display = visible ? '' : 'none';
    }
  });
  // Reapply functional view dimming on top of layer visibility
  applyFunctionalView();
}

function toggleFlow() {
  flowAnimated = !flowAnimated;
  const btn = document.getElementById('flow-btn');
  btn.classList.toggle('active', flowAnimated);

  if (flowAnimated) {
    document.querySelectorAll('.edge').forEach(el => {
      if (!el.getAttribute('stroke-dasharray')) {
        el.classList.add('animated');
      }
    });
  } else {
    document.querySelectorAll('.edge.animated').forEach(el => {
      el.classList.remove('animated');
    });
  }
}

// ── PAN & ZOOM ──────────────────────────────────────────────────────
function updateTransform() {
  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  document.getElementById('zoom-ind').textContent = Math.round(scale * 100) + '%';
  document.getElementById('zoom-slider').value = Math.round(scale * 100);
  updateMinimap();
  debouncedAutosave();
}

function zoomTo(newScale) {
  // Zoom toward center of viewport
  const rect = canvasWrap.getBoundingClientRect();
  const cx = rect.width / 2;
  const cy = rect.height / 2;
  const prev = scale;
  scale = Math.max(0.2, Math.min(2, newScale));
  panX = cx - (cx - panX) * (scale / prev);
  panY = cy - (cy - panY) * (scale / prev);
  updateTransform();
}

function zoomStep(dir) {
  // 10% increments, snap to nearest 10
  const current = Math.round(scale * 100);
  const target = dir > 0
    ? Math.min(200, Math.ceil((current + 1) / 10) * 10)
    : Math.max(20, Math.floor((current - 1) / 10) * 10);
  zoomTo(target / 100);
}

canvasWrap.addEventListener('mousedown', (e) => {
  if (e.target.closest('.node')) return; // node drag handles this

  // Shift+drag on empty canvas = lasso select
  if (e.shiftKey) {
    e.preventDefault(); // prevent Safari Shift+Click text selection
    isLassoing = true;
    lassoStartX = e.clientX;
    lassoStartY = e.clientY;
    lassoEl.style.display = 'none';
    canvasWrap.classList.add('dragging');
    return;
  }

  isDragging = true;
  dragStartX = e.clientX - panX;
  dragStartY = e.clientY - panY;
  canvasWrap.classList.add('dragging');
});

window.addEventListener('mousemove', (e) => {
  if (draggingNode) return; // node drag takes priority
  if (!isDragging) return;
  panX = e.clientX - dragStartX;
  panY = e.clientY - dragStartY;
  updateTransform();
});

window.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    canvasWrap.classList.remove('dragging');
  }
});

canvasWrap.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = canvasWrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const prevScale = scale;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.max(0.2, Math.min(2, scale * delta));

  // Zoom toward cursor
  panX = mx - (mx - panX) * (scale / prevScale);
  panY = my - (my - panY) * (scale / prevScale);
  updateTransform();
}, { passive: false });

canvasWrap.addEventListener('click', (e) => {
  if (!e.target.closest('.node')) {
    if (!e.shiftKey) clearGroupSelection();
    closeDetail();
  }
});

function resetView() {
  scale = 0.7; panX = 50; panY = 10;
  updateTransform();
}

function fitToScreen() {
  const wrap = canvasWrap.getBoundingClientRect();
  // Find bounding box of all visible nodes
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  const viewNodes = activeView ? FUNCTIONAL_VIEWS[activeView].nodes : null;
  nodes.forEach(n => {
    if (!layerVisibility[n.layer]) return;
    if (viewNodes && !viewNodes.has(n.id)) return;
    const el = document.getElementById(`node-${n.id}`);
    if (!el) return;
    minX = Math.min(minX, n.x);
    minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + el.offsetWidth);
    maxY = Math.max(maxY, n.y + el.offsetHeight);
  });

  const contentW = maxX - minX + 80;
  const contentH = maxY - minY + 80;
  const panelW = document.getElementById('detail-panel').classList.contains('open') ? 380 : 0;
  const availW = wrap.width - panelW - 40;
  const availH = wrap.height - 40;

  scale = Math.min(availW / contentW, availH / contentH, 1.2);
  panX = (availW - contentW * scale) / 2 - minX * scale + 20;
  panY = (availH - contentH * scale) / 2 - minY * scale + 20;
  updateTransform();
}

// ── MINIMAP ─────────────────────────────────────────────────────────
function updateMinimap() {
  const mc = document.getElementById('minimap-canvas');
  const ctx = mc.getContext('2d');
  const mw = mc.width, mh = mc.height;
  ctx.clearRect(0, 0, mw, mh);

  // Find bounds
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    minX = Math.min(minX, n.x);
    minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + 180);
    maxY = Math.max(maxY, n.y + 60);
  });

  const cw = maxX - minX + 60;
  const ch = maxY - minY + 60;
  const ms = Math.min(mw / cw, mh / ch);

  // Draw nodes
  nodes.forEach(n => {
    if (!layerVisibility[n.layer]) return;
    const color = LAYERS[n.layer].color;
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.6;
    ctx.fillRect(
      (n.x - minX + 30) * ms,
      (n.y - minY + 30) * ms,
      8, 4
    );
  });
  ctx.globalAlpha = 1;

  // Draw viewport
  const wrap = canvasWrap.getBoundingClientRect();
  const vp = document.getElementById('minimap-vp');
  const vpLeft = (-panX / scale - minX + 30) * ms;
  const vpTop = (-panY / scale - minY + 30) * ms;
  const vpW = (wrap.width / scale) * ms;
  const vpH = ((wrap.height - 48) / scale) * ms;
  const clampedL = Math.max(0, Math.min(vpLeft, mw));
  const clampedT = Math.max(0, Math.min(vpTop, mh));
  const clampedW = Math.min(vpW, mw - clampedL);
  const clampedH = Math.min(vpH, mh - clampedT);
  vp.style.left = clampedL + 'px';
  vp.style.top = clampedT + 'px';
  vp.style.width = Math.max(0, clampedW) + 'px';
  vp.style.height = Math.max(0, clampedH) + 'px';
}

// Close layout dropdown on outside click
window.addEventListener('click', (e) => {
  if (!e.target.closest('#layout-dropdown-wrap')) closeLayoutDropdown();
});

// ── KEYBOARD ────────────────────────────────────────────────────────
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('save-modal-backdrop')) { closeSaveModal(); return; }
    closeLayoutDropdown();
    clearGroupSelection(); closeDetail();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (activeLayoutName) {
      savedLayouts[activeLayoutName] = snapshotPositions();
      savedLayoutSnapshot = JSON.stringify(savedLayouts[activeLayoutName]);
      persistLayouts();
      refreshLayoutSelect();
      updateActiveLayoutDisplay();
      autosave();
      showToast(`Saved "${activeLayoutName}"`);
    } else {
      openSaveModal();
    }
    return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
    e.preventDefault();
    closeDetail();
    nodes.forEach(n => { if (layerVisibility[n.layer]) groupSelected.add(n.id); });
    updateGroupVisuals();
    return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
    if (groupSelected.size > 0 || selectedNode) {
      e.preventDefault();
      copySelectedMetadata();
      return;
    }
  }
  // Ctrl+Z / Cmd+Z = undo, Ctrl+Shift+Z / Cmd+Shift+Z = redo
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'Z' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); return; }
  if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redo(); return; }
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return; // don't intercept typing
  if (e.key === 'f') fitToScreen();
  if (e.key === 'r') resetView();
  if (e.key === ' ') { e.preventDefault(); toggleFlow(); }
});

// ── MINIMAP CLICK-TO-PAN ─────────────────────────────────────────────
(function() {
  const mm = document.getElementById('minimap');
  let mmDragging = false;

  function minimapPan(e) {
    const mc = document.getElementById('minimap-canvas');
    const mw = mc.width, mh = mc.height;
    const rect = mc.getBoundingClientRect();
    // Mouse position in minimap pixel space
    const mx = (e.clientX - rect.left) / rect.width * mw;
    const my = (e.clientY - rect.top) / rect.height * mh;

    // Recompute the same bounds as updateMinimap
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    nodes.forEach(n => {
      minX = Math.min(minX, n.x);
      minY = Math.min(minY, n.y);
      maxX = Math.max(maxX, n.x + 180);
      maxY = Math.max(maxY, n.y + 60);
    });
    const cw = maxX - minX + 60;
    const ch = maxY - minY + 60;
    const ms = Math.min(mw / cw, mh / ch);

    // Convert minimap coords back to canvas coords
    const canvasX = mx / ms + minX - 30;
    const canvasY = my / ms + minY - 30;

    // Center the viewport on that point
    const wrap = canvasWrap.getBoundingClientRect();
    panX = -(canvasX * scale) + wrap.width / 2;
    panY = -(canvasY * scale) + wrap.height / 2;
    updateTransform();
  }

  mm.addEventListener('mousedown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    mmDragging = true;
    minimapPan(e);
  });

  window.addEventListener('mousemove', (e) => {
    if (mmDragging) minimapPan(e);
  });

  window.addEventListener('mouseup', () => {
    mmDragging = false;
  });
})();

// ── DRAGGABLE FLOATING PANELS ────────────────────────────────────────
document.querySelectorAll('.floating-panel').forEach(panel => {
  let px, py, startL, startT;
  panel.addEventListener('mousedown', (e) => {
    // Don't drag if clicking interactive children (buttons, inputs, selects)
    if (e.target.closest('button, input, select, a, .minimap')) return;
    e.preventDefault();
    px = e.clientX; py = e.clientY;
    const rect = panel.getBoundingClientRect();
    startL = rect.left; startT = rect.top;
    panel.classList.add('fp-dragging');

    function onMove(ev) {
      const dx = ev.clientX - px;
      const dy = ev.clientY - py;
      panel.style.left = (startL + dx) + 'px';
      panel.style.top = (startT + dy) + 'px';
      panel.style.right = 'auto';
      panel.style.bottom = 'auto';
    }
    function onUp() {
      panel.classList.remove('fp-dragging');
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });
});

// ── INIT ────────────────────────────────────────────────────────────
init();
// Re-render edges after layout settles
setTimeout(renderEdges, 100);
setTimeout(renderEdges, 300);
</script>
</body>
