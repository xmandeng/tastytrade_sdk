<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tasty-chart</title>
  <script src="https://unpkg.com/lightweight-charts@5/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #131313; --surface: #1a1a1a; --surface-2: #222;
      --border: #2a2a2a; --text: #d1d4dc; --text-muted: #787b86;
      --text-dim: #4a4a5a; --accent: #58a6ff;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* --- Toolbar --- */
    .toolbar {
      display: flex; align-items: center;
      padding: 0 16px; background: var(--surface);
      border-bottom: 1px solid var(--border); height: 40px; flex-shrink: 0;
      gap: 16px;
    }
    .toolbar-section { display: flex; align-items: center; gap: 8px; }

    .dropdown { position: relative; display: inline-block; }
    .dropdown-btn {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-size: 12px; font-family: monospace; font-weight: 600;
      padding: 4px 24px 4px 8px; cursor: pointer; white-space: nowrap;
      appearance: none; user-select: none;
    }
    .dropdown-btn:hover { border-color: var(--text-dim); }
    .dropdown-btn::after {
      content: '\25BE'; position: absolute; right: 8px; top: 50%;
      transform: translateY(-50%); font-size: 9px; color: var(--text-dim);
      pointer-events: none;
    }
    .dropdown-btn.sym { font-size: 15px; font-weight: 700; padding: 4px 28px 4px 8px; letter-spacing: 0.3px; }
    .dropdown-list {
      display: none; position: absolute; top: 100%; left: 0; z-index: 30;
      background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
      margin-top: 2px; max-height: 300px; overflow-y: auto; min-width: 100%;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .dropdown-list.open { display: block; }
    .dropdown-item {
      padding: 6px 12px; font-size: 12px; font-family: monospace;
      color: var(--text-muted); cursor: pointer; white-space: nowrap;
    }
    .dropdown-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .dropdown-item.active { color: var(--accent); }
    .date-input {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-size: 12px; padding: 4px 8px; cursor: pointer;
      font-family: monospace; color-scheme: dark;
    }
    .date-input:hover { border-color: var(--text-dim); }
    .date-input:focus { outline: none; border-color: var(--accent); }

    .seg-ctrl { display: inline-flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .seg-btn {
      padding: 3px 10px; font-size: 10px; font-weight: 600; letter-spacing: 0.3px;
      color: var(--text-dim); background: transparent; border: none;
      cursor: pointer; transition: all 0.12s;
    }
    .seg-btn:not(:last-child) { border-right: 1px solid var(--border); }
    .seg-btn.active { color: var(--text); background: rgba(255,255,255,0.06); }
    .seg-btn:hover:not(.active) { color: var(--text-muted); }

    .status { display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
    .status-dot.connected { background: #3fb950; }
    .status-dot.connecting { background: #d29922; animation: pulse 1s infinite; }
    .status-dot.disconnected { background: #ef5350; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    /* --- Legend (draggable, values-only) --- */
    .chart-legend {
      position: absolute; top: 16px; left: 90px; z-index: 10;
      background: rgba(19,19,19,0.88); border: 1px solid var(--border);
      border-radius: 5px; overflow: hidden;
      font-family: monospace; font-size: 11px;
      color: var(--text-muted); user-select: none;
      min-width: 200px;
    }
    .chart-legend.dragging .legend-grip { cursor: grabbing; }
    .legend-grip {
      height: 14px; cursor: grab; display: flex; align-items: center;
      justify-content: center; background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--border);
    }
    .legend-grip-dots { width: 24px; height: 2px; border-top: 2px dotted rgba(255,255,255,0.15); }

    .legend-values {
      padding: 6px 12px;
      display: grid; grid-template-columns: auto 1fr; gap: 4px 12px;
      align-items: baseline;
    }
    .legend-values .lbl { color: var(--text-dim); font-size: 10px; letter-spacing: 0.3px; }
    .legend-values .val { color: var(--text); text-align: right; }

    /* --- Studies panel (hierarchical toggle list inside the dropdown) --- */
    .studies-panel {
      padding: 6px 4px; min-width: 220px;
    }
    .study-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 10px;
      font-size: 12px; color: var(--text-muted);
      cursor: pointer; user-select: none;
      border-radius: 3px;
    }
    .study-row:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .study-row.child { padding-left: 28px; font-size: 11px; }
    .study-row.group { font-weight: 600; color: var(--text); }
    .study-row .study-swatch {
      width: 14px; height: 2px; flex-shrink: 0;
      border-top-width: 2px; border-top-style: solid;
    }
    .study-row .study-swatch.dotted { border-top-style: dotted; }
    .study-row .study-swatch.dashed { border-top-style: dashed; }
    .study-row .study-checkbox {
      width: 14px; height: 14px; flex-shrink: 0;
      border: 1px solid var(--text-dim); border-radius: 2px;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; line-height: 1; color: var(--accent);
    }
    .study-row.checked .study-checkbox { background: var(--accent); border-color: var(--accent); }
    .study-row.checked .study-checkbox::before { content: '\2713'; color: #131313; font-size: 10px; font-weight: 700; }
    .study-row.indeterminate .study-checkbox { background: var(--accent); border-color: var(--accent); }
    .study-row.indeterminate .study-checkbox::before { content: '\2212'; color: #131313; font-size: 10px; font-weight: 700; }
    .study-row .study-label { flex: 1; white-space: nowrap; }

    /* --- Single chart container (v5: native panes inside) --- */
    #chart { flex: 1; position: relative; min-height: 0; }
  </style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-section">
    <div class="dropdown" id="symbolDropdown">
      <div class="dropdown-btn sym" id="symbolBtn">---</div>
      <div class="dropdown-list" id="symbolList"></div>
    </div>
    <div class="dropdown" id="intervalDropdown">
      <div class="dropdown-btn" id="intervalBtn">1m</div>
      <div class="dropdown-list" id="intervalList"></div>
    </div>
    <input type="date" class="date-input" id="dateInput" title="Trading date">
  </div>

  <div class="toolbar-section" style="flex:1"></div>

  <div class="toolbar-section">
    <div class="dropdown" id="studiesDropdown">
      <div class="dropdown-btn" id="studiesBtn">Studies</div>
      <div class="dropdown-list right" id="studiesList">
        <div class="studies-panel" id="studiesPanel"></div>
      </div>
    </div>
    <div class="seg-ctrl" id="mktExtCtrl"></div>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
    </div>
  </div>
</div>

<div id="chart">
  <div class="chart-legend" id="chartLegend">
    <div class="legend-grip" id="legendGrip"><div class="legend-grip-dots"></div></div>
    <div class="legend-values" id="legendValues"></div>
  </div>
</div>

<script>
// --- Colors (plots.py) ---
const C = {
  bg:'#131313', grid:'rgba(255,255,255,0.03)', text:'#787b86', border:'#2a2a2a',
  candleUpBorder:'#4CAF50', candleUpBody:'rgba(19,19,19,0.1)',
  candleDownBorder:'#EF5350', candleDownBody:'#EF5350',
  hmaUp:'#01FFFF', hmaDown:'#FF66FE',
  macdValue:'#01FFFF', macdSignal:'#F8E9A6', macdZero:'rgba(255,255,255,0.12)',
  priorClose:'#FF66FE', priorHigh:'#4CAF50', priorLow:'#F44336', orLevel:'#4CAF50',
  watermark:'rgba(255,255,255,0.06)',
};

const MARKET_OPEN_H = 9, MARKET_OPEN_M = 30;
const chartEl = document.getElementById('chart');

function fmtTime(epochSec) {
  const d = new Date(epochSec * 1000);
  const h = d.getUTCHours(), m = d.getUTCMinutes();
  const hh = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  const mm = m < 10 ? '0' + m : '' + m;
  return `${hh}:${mm} ${h >= 12 ? 'PM' : 'AM'}`;
}

// ============================================================================
// Series Primitive: HMA as a colored polyline on the candle series.
// Owns its own data + draw logic; contributes to autoscale.
// ============================================================================
class HmaPrimitive {
  constructor() {
    this._data = [];
    this._series = null;
    this._chart = null;
    this._visible = true;
    this._paneView = {
      renderer: () => ({
        draw: (target) => this.drawPolyline(target),
      }),
    };
  }
  attached({ series, chart }) { this._series = series; this._chart = chart; }
  detached() { this._series = null; this._chart = null; }
  paneViews() { return [this._paneView]; }
  updateAllViews() {}

  requestRedraw() {
    // Primitives don't trigger redraws automatically on data mutation — nudge the
    // host series so the chart repaints. applyOptions({}) is a no-op options change.
    if (this._series) this._series.applyOptions({});
  }

  setData(arr) {
    this._data = (arr || []).slice().sort((a, b) => a.time - b.time);
    this.requestRedraw();
  }
  update(point) {
    if (!point || point.value == null) return;
    const last = this._data[this._data.length - 1];
    if (last && last.time === point.time) this._data[this._data.length - 1] = point;
    else this._data.push(point);
    this.requestRedraw();
  }
  clear() { this._data = []; this.requestRedraw(); }
  setVisible(v) { this._visible = v; this.requestRedraw(); }

  autoscaleInfo() {
    if (!this._visible || !this._data.length) return null;
    let lo = Infinity, hi = -Infinity;
    for (const p of this._data) {
      if (p.value == null) continue;
      if (p.value < lo) lo = p.value;
      if (p.value > hi) hi = p.value;
    }
    return lo === Infinity ? null : { priceRange: { minValue: lo, maxValue: hi } };
  }

  drawPolyline(target) {
    if (!this._visible || !this._series || !this._chart || this._data.length < 2) return;
    const series = this._series;
    const ts = this._chart.timeScale();
    target.useBitmapCoordinateSpace(scope => {
      const ctx = scope.context;
      const xR = scope.horizontalPixelRatio;
      const yR = scope.verticalPixelRatio;
      ctx.lineWidth = Math.max(1, Math.round(yR));
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      for (let i = 0; i < this._data.length - 1; i++) {
        const p1 = this._data[i], p2 = this._data[i + 1];
        if (p1.value == null || p2.value == null) continue;
        const x1 = ts.timeToCoordinate(p1.time);
        const x2 = ts.timeToCoordinate(p2.time);
        const y1 = series.priceToCoordinate(p1.value);
        const y2 = series.priceToCoordinate(p2.value);
        if (x1 == null || x2 == null || y1 == null || y2 == null) continue;
        ctx.strokeStyle = p1.color || '#888';
        ctx.beginPath();
        ctx.moveTo(x1 * xR, y1 * yR);
        ctx.lineTo(x2 * xR, y2 * yR);
        ctx.stroke();
      }
    });
  }
}

// ============================================================================
// Pane primitive: text watermark (e.g. "MACD (12,26,9)" in the MACD pane).
// Attach/detach to toggle visibility — pane primitives don't have a visible flag.
// ============================================================================
class TextWatermark {
  constructor(text, opt = {}) {
    this._text = text;
    this._opt = {
      color: C.watermark, fontSize: 12, fontFamily: 'monospace',
      padding: 8, ...opt,
    };
    this._paneView = {
      renderer: () => ({
        draw: (target) => {
          target.useMediaCoordinateSpace(scope => {
            const ctx = scope.context;
            ctx.fillStyle = this._opt.color;
            ctx.font = `${this._opt.fontSize}px ${this._opt.fontFamily}`;
            ctx.textBaseline = 'top';
            ctx.fillText(this._text, this._opt.padding, this._opt.padding);
          });
        },
      }),
    };
  }
  paneViews() { return [this._paneView]; }
  updateAllViews() {}
}

// ============================================================================
// Chart
// ============================================================================
const chart = LightweightCharts.createChart(chartEl, {
  layout: {
    background: { type: 'solid', color: C.bg },
    textColor: C.text,
    fontFamily: 'monospace',
    panes: {
      separatorColor: C.border,
      separatorHoverColor: C.accent,
      enableResize: true,
    },
    attributionLogo: false,
  },
  grid: { vertLines: { color: C.grid }, horzLines: { color: C.grid } },
  crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  rightPriceScale: { visible: false },
  leftPriceScale: {
    visible: true, borderColor: C.border,
    scaleMargins: { top: 0.05, bottom: 0.05 },
  },
  localization: { timeFormatter: (t) => fmtTime(t) },
  timeScale: {
    borderColor: C.border, timeVisible: true, secondsVisible: false,
    tickMarkFormatter: (time, tickMarkType) => {
      if (tickMarkType <= 2) {
        const d = new Date(time * 1000);
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${months[d.getUTCMonth()]} ${d.getUTCDate()}`;
      }
      return fmtTime(time);
    },
  },
  handleScroll: { mouseWheel: true, pressedMouseMove: true, horzTouchDrag: true },
  handleScale: { mouseWheel: true, pinch: true, axisPressedMouseMove: true },
});

// --- Pane 0: candles + HMA ---
const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
  upColor: C.candleUpBody, downColor: C.candleDownBody,
  borderUpColor: C.candleUpBorder, borderDownColor: C.candleDownBorder,
  wickUpColor: C.candleUpBorder, wickDownColor: C.candleDownBorder,
  lastValueVisible: false, priceLineVisible: false,
  priceScaleId: 'left',
}, 0);

// HMA: a Series Primitive on the candle series — one object, per-segment color,
// contributes to candle-pane autoscale. Replaces v4's N segment-series allocation.
const hmaPrimitive = new HmaPrimitive();
candleSeries.attachPrimitive(hmaPrimitive);

// --- Pane 1: MACD ---
const macdHistSeries = chart.addSeries(LightweightCharts.HistogramSeries, {
  priceLineVisible: false, lastValueVisible: false,
  priceFormat: { type: 'price', precision: 2, minMove: 0.01 },
  priceScaleId: 'left',
}, 1);
const macdValueSeries = chart.addSeries(LightweightCharts.LineSeries, {
  color: C.macdValue, lineWidth: 1,
  priceLineVisible: false, lastValueVisible: false,
  priceFormat: { type: 'price', precision: 2, minMove: 0.01 },
  priceScaleId: 'left',
}, 1);
const macdSignalSeries = chart.addSeries(LightweightCharts.LineSeries, {
  color: C.macdSignal, lineWidth: 1,
  priceLineVisible: false, lastValueVisible: false,
  priceFormat: { type: 'price', precision: 2, minMove: 0.01 },
  priceScaleId: 'left',
}, 1);
// MACD zero line: built-in price line on the value series — replaces the fake 2-point series.
macdValueSeries.createPriceLine({
  price: 0, color: C.macdZero, lineWidth: 1,
  lineStyle: LightweightCharts.LineStyle.Dotted, axisLabelVisible: false,
});

// Watermark on the MACD pane — held as a singleton so the studies toggle
// can attach/detach it (pane primitives don't have a visible flag).
const macdWatermark = new TextWatermark('MACD (12,26,9)');
let macdWatermarkAttached = false;
function attachMacdWatermark() {
  const panes = chart.panes();
  if (panes.length < 2) { setTimeout(attachMacdWatermark, 30); return; }
  if (!macdWatermarkAttached) {
    panes[1].attachPrimitive(macdWatermark);
    macdWatermarkAttached = true;
  }
}
function detachMacdWatermark() {
  const panes = chart.panes();
  if (panes.length < 2 || !macdWatermarkAttached) return;
  panes[1].detachPrimitive(macdWatermark);
  macdWatermarkAttached = false;
}
attachMacdWatermark();

// Initial pane sizing: 3:1 candle:macd
function sizePanes() {
  const h = chartEl.clientHeight;
  if (h < 100) return;
  const panes = chart.panes();
  if (panes.length < 2) return;
  panes[0].setHeight(Math.floor(h * 0.75));
}
setTimeout(sizePanes, 50);

// ============================================================================
// State
// ============================================================================
let lastCandles = [];
let lastHmaByTime = new Map();  // time epoch -> { value, color }
let lastMacdByTime = new Map(); // time epoch -> { value, signal, histogram }
let latestHma = null;   // last known HMA — fallback when hovered candle has no HMA yet
let latestMacd = null;  // same for MACD

// ============================================================================
// Studies registry + state.
// Hierarchy: top-level keys are either standalone studies (kind: 'simple')
// or groups with children (kind: 'group'). Group parent off → entire group
// hidden regardless of child state. Children remember their own state.
// ============================================================================
const STUDIES = {
  hma: {
    kind: 'simple', label: 'Hull MA (20)',
    swatch: { color: C.hmaUp, style: 'solid' },
  },
  macd: {
    kind: 'simple', label: 'MACD (12,26,9)',
    swatch: { color: C.macdValue, style: 'solid' },
  },
  priorOHLC: {
    kind: 'group', label: 'Prior Day OHLC',
    children: {
      priorClose: { label: 'Prior Close', swatch: { color: C.priorClose, style: 'dotted' } },
      priorHigh:  { label: 'Prior Hi',    swatch: { color: C.priorHigh,  style: 'dotted' } },
      priorLow:   { label: 'Prior Lo',    swatch: { color: C.priorLow,   style: 'dotted' } },
    },
  },
  openingRange: {
    kind: 'group', label: 'Opening Range',
    children: {
      or5:  { label: '5m OR',  swatch: { color: C.orLevel, style: 'solid' } },
      or15: { label: '15m OR', swatch: { color: C.orLevel, style: 'dashed' } },
      or30: { label: '30m OR', swatch: { color: C.orLevel, style: 'dotted' } },
    },
  },
};

// All toggles default ON. Children of a group are also ON by default.
const studyState = {
  hma: true, macd: true,
  priorOHLC: true, priorClose: true, priorHigh: true, priorLow: true,
  openingRange: true, or5: true, or15: true, or30: true,
};

// Map level id -> {group, child} so applyLevelVisibility can resolve via studyState.
const LEVEL_STUDY_MAP = {
  priorClose: { group: 'priorOHLC',    child: 'priorClose' },
  priorHigh:  { group: 'priorOHLC',    child: 'priorHigh'  },
  priorLow:   { group: 'priorOHLC',    child: 'priorLow'   },
  or5:        { group: 'openingRange', child: 'or5'        },
  or15:       { group: 'openingRange', child: 'or15'       },
  or30:       { group: 'openingRange', child: 'or30'       },
};

function isLevelVisible(id) {
  const m = LEVEL_STUDY_MAP[id];
  if (!m) return true;                       // unmanaged (e.g. live levels from Redis)
  return studyState[m.group] && studyState[m.child];
}
let viewStartEpoch = 0;
let levelStartEpoch = 0;
let levelEndEpoch = 0;
let marketCloseEpoch = 0;
const levels = {};  // id -> { lines: IPriceLine[], visible, entries }

function lwcStyle(s) {
  if (s === 'dot' || s === 'dotted') return LightweightCharts.LineStyle.Dotted;
  if (s === 'dash' || s === 'dashed') return LightweightCharts.LineStyle.Dashed;
  return LightweightCharts.LineStyle.Solid;
}

let hasMarketHours = true;

function computeBounds(candles) {
  viewStartEpoch = 0; levelStartEpoch = 0; levelEndEpoch = 0; marketCloseEpoch = 0;
  for (const c of candles) {
    const d = new Date(c.time * 1000);
    const h = d.getUTCHours(), m = d.getUTCMinutes();
    if (h < 16 || (h === 16 && m <= 30)) levelEndEpoch = c.time;
  }
  if (candles.length) {
    const d = new Date(candles[0].time * 1000);
    const y = d.getUTCFullYear(), mo = d.getUTCMonth(), day = d.getUTCDate();
    viewStartEpoch = Date.UTC(y, mo, day, 8, 30) / 1000;
    levelStartEpoch = Date.UTC(y, mo, day, 9, 30) / 1000;
    marketCloseEpoch = Date.UTC(y, mo, day, 16, 30) / 1000;
  }
  if (candles.length && hasMarketHours) {
    const anyInMarket = candles.some(c => c.time >= viewStartEpoch && c.time <= marketCloseEpoch);
    if (!anyInMarket) hasMarketHours = false;
  }
  if (!hasMarketHours) {
    viewStartEpoch = candles.length ? candles[0].time : 0;
    levelStartEpoch = viewStartEpoch;
    levelEndEpoch = candles.length ? candles[candles.length - 1].time : 0;
    marketCloseEpoch = levelEndEpoch;
  } else if (levelEndEpoch === 0 && candles.length) {
    levelEndEpoch = candles[candles.length - 1].time;
  }
}

function toggleMarketHours() {
  hasMarketHours = !hasMarketHours;
  computeBounds(lastCandles);
  setTradingHoursView();
  renderControls();
}

// ============================================================================
// Level lines (createPriceLine, with axis labels on prior-day levels).
// Visibility is owned by studyState — entries are always registered, and
// applyLevelVisibility(id) reconciles the rendered lines with current state.
// ============================================================================
function createLevelLine(entry, axisLabel) {
  return candleSeries.createPriceLine({
    price: entry.price,
    color: entry.color,
    lineWidth: 1,
    lineStyle: lwcStyle(entry.lineStyle),
    axisLabelVisible: !!axisLabel,
    title: entry.label,
  });
}

function registerLevel(id, entries, axisLabel) {
  if (levels[id]) return;
  levels[id] = { entries, axisLabel: !!axisLabel, lines: [] };
  applyLevelVisibility(id);
}

function applyLevelVisibility(id) {
  const lv = levels[id];
  if (!lv) return;
  // Tear down current lines
  lv.lines.forEach(l => { try { candleSeries.removePriceLine(l); } catch (e) {} });
  lv.lines = [];
  if (isLevelVisible(id)) {
    lv.lines = lv.entries.map(e => createLevelLine(e, lv.axisLabel));
  }
}

function clearAllLevels() {
  Object.keys(levels).forEach(id => {
    levels[id].lines.forEach(l => { try { candleSeries.removePriceLine(l); } catch (e) {} });
    delete levels[id];
  });
}

// ============================================================================
// MACD pane: hide/show series + watermark together.
// ============================================================================
function setMacdVisible(visible) {
  macdHistSeries.applyOptions({ visible });
  macdValueSeries.applyOptions({ visible });
  macdSignalSeries.applyOptions({ visible });
  if (visible) attachMacdWatermark(); else detachMacdWatermark();
}

// ============================================================================
// Apply the full studyState to the chart. Called on every toggle.
// ============================================================================
function applyStudyState() {
  hmaPrimitive.setVisible(studyState.hma);
  setMacdVisible(studyState.macd);
  Object.keys(levels).forEach(id => applyLevelVisibility(id));
  renderStudiesPanel();
}

// ============================================================================
// Legend — crosshair-driven values + toggleable rows
// ============================================================================
const PRICE_FMT_NONE = (v) => v == null ? '—' : '—';
let priceFmt = (v) => v == null ? '—' : v.toFixed(2);

function setPriceFormatter(midPrice) {
  if (midPrice == null) return;
  const dec = midPrice >= 1000 ? 1 : midPrice >= 10 ? 2 : 4;
  priceFmt = (v) => v == null ? '—' : v.toFixed(dec);
}

function macdFmt(v) { return v == null ? '—' : v.toFixed(2); }

function updateValuesAtTime(time) {
  const valEl = document.getElementById('legendValues');
  let candle = null, hma = null, macd = null;
  if (time != null) {
    candle = lastCandles.find(c => c.time === time) || null;
    hma = lastHmaByTime.get(time) || null;
    macd = lastMacdByTime.get(time) || null;
  }
  // Fall back to most recent values. Indicators lag candles by one period
  // (they only advance on candle close), so the hovered candle's time may
  // not exist in lastHmaByTime / lastMacdByTime yet — use the latest known instead.
  if (!candle && lastCandles.length) candle = lastCandles[lastCandles.length - 1];
  if (!hma) hma = latestHma;
  if (!macd) macd = latestMacd;

  const sign = candle ? (candle.close >= candle.open ? C.candleUpBorder : C.candleDownBorder) : C.text;
  const macdSign = macd && macd.histogram >= 0 ? C.candleUpBorder : C.candleDownBorder;
  const hmaColor = hma ? hma.color : C.text;

  valEl.innerHTML = `
    <span class="lbl">O</span><span class="val">${candle ? priceFmt(candle.open) : '—'}</span>
    <span class="lbl">H</span><span class="val">${candle ? priceFmt(candle.high) : '—'}</span>
    <span class="lbl">L</span><span class="val">${candle ? priceFmt(candle.low) : '—'}</span>
    <span class="lbl">C</span><span class="val" style="color:${sign}">${candle ? priceFmt(candle.close) : '—'}</span>
    <span class="lbl">HMA</span><span class="val" style="color:${hmaColor}">${hma ? priceFmt(hma.value) : '—'}</span>
    <span class="lbl">MACD</span><span class="val" style="color:${macdSign}">${macd ? `${macdFmt(macd.value)} / ${macdFmt(macd.signal)}` : '—'}</span>
  `;
}

function renderLegend() {
  // Values section uses last candle by default. The studies panel owns toggles now.
  updateValuesAtTime(null);
}

// ============================================================================
// Studies panel rendering and toggle handling.
// ============================================================================
function isGroupIndeterminate(groupKey) {
  const study = STUDIES[groupKey];
  if (!study || !study.children) return false;
  const states = Object.keys(study.children).map(k => studyState[k]);
  const allOn = states.every(Boolean);
  const allOff = states.every(s => !s);
  return !allOn && !allOff;
}

function renderStudiesPanel() {
  const panel = document.getElementById('studiesPanel');
  if (!panel) return;
  const out = [];

  function swatchHtml(swatch) {
    if (!swatch) return '<span class="study-swatch" style="border-color:transparent"></span>';
    const cls = swatch.style === 'dotted' ? 'dotted' : swatch.style === 'dashed' ? 'dashed' : '';
    return `<span class="study-swatch ${cls}" style="border-color:${swatch.color}"></span>`;
  }
  function checkboxState(key, indeterminate) {
    if (indeterminate) return 'indeterminate';
    return studyState[key] ? 'checked' : '';
  }

  Object.keys(STUDIES).forEach(key => {
    const s = STUDIES[key];
    if (s.kind === 'simple') {
      out.push(`
        <div class="study-row ${checkboxState(key)}" data-study="${key}">
          <span class="study-checkbox"></span>
          ${swatchHtml(s.swatch)}
          <span class="study-label">${s.label}</span>
        </div>
      `);
    } else if (s.kind === 'group') {
      const indet = isGroupIndeterminate(key);
      out.push(`
        <div class="study-row group ${checkboxState(key, indet)}" data-study="${key}">
          <span class="study-checkbox"></span>
          <span class="study-label">${s.label}</span>
        </div>
      `);
      Object.keys(s.children).forEach(ck => {
        const c = s.children[ck];
        out.push(`
          <div class="study-row child ${checkboxState(ck)}" data-study="${ck}">
            <span class="study-checkbox"></span>
            ${swatchHtml(c.swatch)}
            <span class="study-label">${c.label}</span>
          </div>
        `);
      });
    }
  });
  panel.innerHTML = out.join('');
}

// Toggle handler attached directly to the studies panel, NOT to document.
// (A document-level handler is swallowed by the outer "click inside the
// dropdown shouldn't close it" stopPropagation guard on #studiesList.
// Attaching here means the toggle fires before bubbling reaches the guard.)
// The panel element itself is stable across renderStudiesPanel() — only its
// innerHTML changes — so this listener survives re-renders.
document.getElementById('studiesPanel').addEventListener('click', (e) => {
  const row = e.target.closest('.study-row');
  if (!row) return;
  const key = row.dataset.study;
  if (!key) return;
  // Toggling a group flips just the parent flag — children keep their own state,
  // so re-enabling the group restores only the children that were individually on.
  studyState[key] = !studyState[key];
  applyStudyState();
});

// Crosshair-driven readout — only the values row updates, not the toggle rows.
chart.subscribeCrosshairMove(param => {
  const t = param.time;
  updateValuesAtTime(typeof t === 'number' ? t : null);
});

// Draggable legend
(function() {
  const legend = document.getElementById('chartLegend');
  const grip = document.getElementById('legendGrip');
  let dragging = false, startX = 0, startY = 0, origLeft = 0, origTop = 0;
  grip.addEventListener('mousedown', (e) => {
    dragging = true; startX = e.clientX; startY = e.clientY;
    origLeft = legend.offsetLeft; origTop = legend.offsetTop;
    legend.classList.add('dragging');
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    legend.style.left = (origLeft + e.clientX - startX) + 'px';
    legend.style.top = (origTop + e.clientY - startY) + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false; legend.classList.remove('dragging');
  });
})();

function renderControls() {
  const seg = document.getElementById('mktExtCtrl');
  seg.innerHTML = `
    <button class="seg-btn ${hasMarketHours ? 'active' : ''}" onclick="toggleMarketHours()">MKT</button>
    <button class="seg-btn ${hasMarketHours ? '' : 'active'}" onclick="toggleMarketHours()">EXT</button>`;
}

// ============================================================================
// Opening range
// ============================================================================
const OR_WINDOWS = [
  { min:5, id:'or5', label:'5m', style:'solid', opacity:0.6 },
  { min:15, id:'or15', label:'15m', style:'dashed', opacity:0.4 },
  { min:30, id:'or30', label:'30m', style:'dotted', opacity:0.3 },
];
const orState = {};

function initOR() {
  OR_WINDOWS.forEach(w => { orState[w.min] = { high:null, low:null, locked:false }; });
}

function processCandleOR(candle) {
  const d = new Date(candle.time * 1000);
  const h = d.getUTCHours(), m = d.getUTCMinutes();
  const minSinceOpen = (h - MARKET_OPEN_H) * 60 + (m - MARKET_OPEN_M);
  if (minSinceOpen < 0) return;
  OR_WINDOWS.forEach(w => {
    const st = orState[w.min];
    if (!st || st.locked) return;
    if (minSinceOpen >= w.min) {
      st.locked = true;
      if (st.high !== null) {
        registerLevel(w.id, [
          { price:st.high, label:`${w.label} Hi`, color:C.orLevel, lineStyle:w.style },
          { price:st.low,  label:`${w.label} Lo`, color:C.orLevel, lineStyle:w.style },
        ], /*axisLabel=*/false);
        renderStudiesPanel();
      }
      return;
    }
    if (st.high === null || candle.high > st.high) st.high = candle.high;
    if (st.low === null || candle.low < st.low) st.low = candle.low;
  });
}

// ============================================================================
// View / scale
// ============================================================================
function floorHour(e) { return e - (e % 3600); }
function ceilHour(e)  { return e % 3600 === 0 ? e : floorHour(e) + 3600; }

function setTradingHoursView() {
  if (!hasMarketHours) {
    if (!lastCandles.length) return;
    const from = floorHour(lastCandles[0].time - 1800);
    const to = ceilHour(lastCandles[lastCandles.length - 1].time + 1800);
    chart.timeScale().setVisibleRange({ from, to });
    return;
  }
  if (viewStartEpoch === 0 || marketCloseEpoch === 0) return;
  const from = floorHour(viewStartEpoch);
  const lastCandle = lastCandles.length ? lastCandles[lastCandles.length - 1].time : levelStartEpoch;
  const to = ceilHour(Math.min(marketCloseEpoch, Math.max(lastCandle + 3600, levelStartEpoch + 3600)));
  chart.timeScale().setVisibleRange({ from, to });
}

// Prior-day levels: createPriceLine doesn't expand the price scale, so extend
// candle y-range to include them.
let priorLevelPrices = [];
function applyPriorLevelScale(candles) {
  if (!priorLevelPrices.length || !candles.length) return;
  let lo = Infinity, hi = -Infinity;
  candles.forEach(c => { if (c.low < lo) lo = c.low; if (c.high > hi) hi = c.high; });
  priorLevelPrices.forEach(p => { if (p < lo) lo = p; if (p > hi) hi = p; });
  const pad = (hi - lo) * 0.03;
  candleSeries.applyOptions({
    autoscaleInfoProvider: () => ({ priceRange: { minValue: lo - pad, maxValue: hi + pad } }),
  });
}

// ============================================================================
// WebSocket + UI wiring (toolbar, dropdowns, connect)
// ============================================================================
let ws = null;
let intentionalClose = false;
function setStatus(state) { document.getElementById('statusDot').className = 'status-dot ' + state; }

const INTERVALS = [
  { value:'m', label:'1m' }, { value:'5m', label:'5m' },
  { value:'15m', label:'15m' }, { value:'30m', label:'30m' },
  { value:'1h', label:'1h' }, { value:'1d', label:'1d' },
];
let currentSymbol = 'SPX';
let currentInterval = 'm';

function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { symbol: p.get('symbol') || 'SPX', interval: p.get('interval') || 'm' };
}

function initDropdown(btnId, listId, onSelect) {
  const btn = document.getElementById(btnId);
  const list = document.getElementById(listId);
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    document.querySelectorAll('.dropdown-list.open').forEach(el => {
      if (el.id !== listId) el.classList.remove('open');
    });
    list.classList.toggle('open');
  });
  list.addEventListener('click', (e) => {
    const item = e.target.closest('.dropdown-item');
    if (!item) return;
    onSelect(item.dataset.value);
    list.classList.remove('open');
  });
}

function populateIntervals() {
  const list = document.getElementById('intervalList');
  list.innerHTML = INTERVALS.map(i =>
    `<div class="dropdown-item ${i.value === currentInterval ? 'active' : ''}" data-value="${i.value}">${i.label}</div>`
  ).join('');
}

async function populateSymbols() {
  try {
    const resp = await fetch('/api/symbols');
    const data = await resp.json();
    const list = document.getElementById('symbolList');
    list.innerHTML = (data.symbols || []).map(s =>
      `<div class="dropdown-item ${s === currentSymbol ? 'active' : ''}" data-value="${s}">${s}</div>`
    ).join('');
  } catch (e) { /* unavailable */ }
}

document.addEventListener('click', () => {
  document.querySelectorAll('.dropdown-list.open').forEach(el => el.classList.remove('open'));
});

initDropdown('symbolBtn', 'symbolList', (sym) => {
  currentSymbol = sym;
  const p = new URLSearchParams(window.location.search);
  p.set('symbol', sym); p.set('interval', currentInterval);
  history.replaceState(null, '', '?' + p.toString());
  document.getElementById('symbolBtn').textContent = sym;
  connect();
});
initDropdown('intervalBtn', 'intervalList', (intv) => {
  currentInterval = intv;
  const label = INTERVALS.find(i => i.value === intv)?.label || intv;
  const p = new URLSearchParams(window.location.search);
  p.set('symbol', currentSymbol); p.set('interval', intv);
  history.replaceState(null, '', '?' + p.toString());
  document.getElementById('intervalBtn').textContent = label;
  connect();
});

// Studies dropdown opens the toggle panel. No onSelect — clicks on rows
// inside the panel are handled by the document-level click listener above.
(function () {
  const btn = document.getElementById('studiesBtn');
  const list = document.getElementById('studiesList');
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    document.querySelectorAll('.dropdown-list.open').forEach(el => {
      if (el.id !== 'studiesList') el.classList.remove('open');
    });
    list.classList.toggle('open');
  });
  // Clicks inside the panel shouldn't close it — they toggle rows.
  list.addEventListener('click', (e) => e.stopPropagation());
})();

let connectTimer = null;
function connect(dateOverride) {
  if (connectTimer) clearTimeout(connectTimer);
  connectTimer = setTimeout(() => doConnect(dateOverride), 100);
}

function doConnect(dateOverride) {
  setStatus('connecting');
  intentionalClose = true;
  const { symbol, interval } = getParams();
  currentSymbol = symbol; currentInterval = interval;
  document.getElementById('symbolBtn').textContent = symbol;
  document.getElementById('intervalBtn').textContent = INTERVALS.find(i => i.value === interval)?.label || interval;
  populateIntervals();

  if (ws) { try { ws.close(); } catch (e) {} ws = null; }

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  let url = `${proto}//${location.host}/ws?symbol=${symbol}&interval=${interval}`;
  if (dateOverride) url += `&date=${dateOverride}`;
  ws = new WebSocket(url);

  ws.onopen = () => { intentionalClose = false; setStatus('connected'); };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    if (msg.type === 'error') { setStatus('disconnected'); return; }

    if (msg.type === 'init') {
      clearAllLevels();
      initOR();
      lastHmaByTime.clear();
      lastMacdByTime.clear();
      latestHma = null;
      latestMacd = null;

      if (msg.date) document.getElementById('dateInput').value = msg.date;

      lastCandles = msg.candles;
      if (msg.candles.length) {
        const mid = msg.candles[Math.floor(msg.candles.length / 2)].close;
        setPriceFormatter(mid);
        const prec = mid >= 1000 ? 0 : mid >= 100 ? 1 : mid >= 1 ? 2 : 4;
        const mv = mid >= 1000 ? 1 : mid >= 100 ? 0.1 : mid >= 1 ? 0.01 : 0.0001;
        candleSeries.applyOptions({ priceFormat: { type:'price', precision:prec, minMove:mv } });
      }
      candleSeries.setData(msg.candles);
      computeBounds(msg.candles);
      if (hasMarketHours) msg.candles.forEach(c => processCandleOR(c));

      if (msg.hma && msg.hma.length > 0) {
        hmaPrimitive.setData(msg.hma);
        msg.hma.forEach(p => lastHmaByTime.set(p.time, { value: p.value, color: p.color }));
        const last = msg.hma[msg.hma.length - 1];
        latestHma = { value: last.value, color: last.color };
      } else {
        hmaPrimitive.clear();
      }

      if (msg.macd && msg.macd.length > 0) {
        macdHistSeries.setData(msg.macd.map(p => ({ time:p.time, value:p.histogram, color:p.histogramColor })));
        macdValueSeries.setData(msg.macd.map(p => ({ time:p.time, value:p.value })));
        macdSignalSeries.setData(msg.macd.map(p => ({ time:p.time, value:p.signal })));
        msg.macd.forEach(p => lastMacdByTime.set(p.time, { value: p.value, signal: p.signal, histogram: p.histogram }));
        const lastM = msg.macd[msg.macd.length - 1];
        latestMacd = { value: lastM.value, signal: lastM.signal, histogram: lastM.histogram };
      }

      priorLevelPrices = [];
      if (msg.dailyCandle) {
        const dc = msg.dailyCandle;
        if (dc.close != null) {
          registerLevel('priorClose',
            [{ price:dc.close, label:'Prior Close', color:C.priorClose, lineStyle:'dotted' }],
            /*axisLabel=*/true);
          priorLevelPrices.push(dc.close);
        }
        if (dc.high != null) {
          registerLevel('priorHigh',
            [{ price:dc.high, label:'Prior Hi', color:C.priorHigh, lineStyle:'dotted' }],
            /*axisLabel=*/true);
          priorLevelPrices.push(dc.high);
        }
        if (dc.low != null) {
          registerLevel('priorLow',
            [{ price:dc.low, label:'Prior Lo', color:C.priorLow, lineStyle:'dotted' }],
            /*axisLabel=*/true);
          priorLevelPrices.push(dc.low);
        }
        applyPriorLevelScale(msg.candles);
      }

      renderControls();
      renderStudiesPanel();
      renderLegend();
      applyStudyState();
      setTimeout(() => { setTradingHoursView(); sizePanes(); }, 100);
      return;
    }

    if (msg.type === 'update') {
      candleSeries.update(msg.candle);
      // Keep lastCandles in sync so the legend's "last candle" fallback is current.
      if (lastCandles.length && lastCandles[lastCandles.length - 1].time === msg.candle.time) {
        lastCandles[lastCandles.length - 1] = msg.candle;
      } else {
        lastCandles.push(msg.candle);
      }
      processCandleOR(msg.candle);

      if (msg.hma) {
        hmaPrimitive.update(msg.hma);
        lastHmaByTime.set(msg.hma.time, { value: msg.hma.value, color: msg.hma.color });
        latestHma = { value: msg.hma.value, color: msg.hma.color };
      }
      if (msg.macd) {
        macdHistSeries.update({ time:msg.macd.time, value:msg.macd.histogram, color:msg.macd.histogramColor });
        macdValueSeries.update({ time:msg.macd.time, value:msg.macd.value });
        macdSignalSeries.update({ time:msg.macd.time, value:msg.macd.signal });
        lastMacdByTime.set(msg.macd.time, { value: msg.macd.value, signal: msg.macd.signal, histogram: msg.macd.histogram });
        latestMacd = { value: msg.macd.value, signal: msg.macd.signal, histogram: msg.macd.histogram };
      }
      // Refresh the legend's current values (will use latest candle since no hover)
      updateValuesAtTime(null);
      return;
    }

    if (msg.type === 'level') {
      const id = (msg.label||'').replace(/\s+/g,'').toLowerCase();
      registerLevel(id, [{ price:msg.price, label:msg.label, color:msg.color, lineStyle:msg.lineStyle }],
                    /*axisLabel=*/false);
      renderStudiesPanel();
      return;
    }
  };

  ws.onclose = () => {
    if (intentionalClose) return;
    setStatus('disconnected');
    setTimeout(() => connect(), 3000);
  };
  ws.onerror = () => setStatus('disconnected');
}

document.getElementById('dateInput').addEventListener('change', (e) => {
  if (e.isTrusted && e.target.value) connect(e.target.value);
});

function resize() {
  if (chartEl.clientWidth && chartEl.clientHeight) chart.resize(chartEl.clientWidth, chartEl.clientHeight);
}
window.addEventListener('resize', resize);
new ResizeObserver(resize).observe(chartEl);

populateSymbols();
populateIntervals();
connect();
</script>
</body>
</html>
