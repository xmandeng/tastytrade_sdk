<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tasty-chart (KLineChart)</title>
  <script src="https://unpkg.com/klinecharts@9/dist/umd/klinecharts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #131313; --surface: #1a1a1a; --surface-2: #222;
      --border: #2a2a2a; --text: #d1d4dc; --text-muted: #787b86;
      --text-dim: #4a4a5a; --accent: #58a6ff;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* --- Toolbar (same shape as TT-147) --- */
    .toolbar {
      display: flex; align-items: center;
      padding: 0 16px; background: var(--surface);
      border-bottom: 1px solid var(--border); height: 40px; flex-shrink: 0;
      gap: 16px;
    }
    .toolbar-section { display: flex; align-items: center; gap: 8px; }

    .dropdown { position: relative; display: inline-block; }
    .dropdown-btn {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-size: 12px; font-family: monospace; font-weight: 600;
      padding: 4px 24px 4px 8px; cursor: pointer; white-space: nowrap;
      appearance: none; user-select: none;
    }
    .dropdown-btn:hover { border-color: var(--text-dim); }
    .dropdown-btn::after {
      content: '\25BE'; position: absolute; right: 8px; top: 50%;
      transform: translateY(-50%); font-size: 9px; color: var(--text-dim);
      pointer-events: none;
    }
    .dropdown-btn.sym { font-size: 15px; font-weight: 700; padding: 4px 28px 4px 8px; letter-spacing: 0.3px; }
    .dropdown-list {
      display: none; position: absolute; top: 100%; left: 0; z-index: 30;
      background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
      margin-top: 2px; max-height: 360px; overflow-y: auto; min-width: 100%;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .dropdown-list.right { left: auto; right: 0; }
    .dropdown-list.open { display: block; }
    .dropdown-item {
      padding: 6px 12px; font-size: 12px; font-family: monospace;
      color: var(--text-muted); cursor: pointer; white-space: nowrap;
    }
    .dropdown-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .dropdown-item.active { color: var(--accent); }
    .date-input {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-size: 12px; padding: 4px 8px; cursor: pointer;
      font-family: monospace; color-scheme: dark;
    }
    .date-input:hover { border-color: var(--text-dim); }
    .date-input:focus { outline: none; border-color: var(--accent); }

    .seg-ctrl { display: inline-flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .seg-btn {
      padding: 3px 10px; font-size: 10px; font-weight: 600; letter-spacing: 0.3px;
      color: var(--text-dim); background: transparent; border: none;
      cursor: pointer; transition: all 0.12s;
    }
    .seg-btn:not(:last-child) { border-right: 1px solid var(--border); }
    .seg-btn.active { color: var(--text); background: rgba(255,255,255,0.06); }
    .seg-btn:hover:not(.active) { color: var(--text-muted); }

    .status { display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
    .status-dot.connected { background: #3fb950; }
    .status-dot.connecting { background: #d29922; animation: pulse 1s infinite; }
    .status-dot.disconnected { background: #ef5350; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    /* --- Studies panel (sectioned: Overlays vs Sub-pane studies) --- */
    .studies-panel { padding: 6px 4px; min-width: 240px; }
    .studies-section-header {
      padding: 8px 10px 4px;
      font-size: 9px; font-weight: 700; letter-spacing: 0.6px;
      color: var(--text-dim); text-transform: uppercase;
    }
    .studies-section-header:first-child { padding-top: 4px; }
    .study-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 10px;
      font-size: 12px; color: var(--text-muted);
      cursor: pointer; user-select: none;
      border-radius: 3px;
    }
    .study-row:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .study-row.child { padding-left: 28px; font-size: 11px; }
    .study-row.group { font-weight: 600; color: var(--text); }
    .study-row .study-swatch {
      width: 14px; height: 2px; flex-shrink: 0;
      border-top-width: 2px; border-top-style: solid;
    }
    .study-row .study-swatch.dotted { border-top-style: dotted; }
    .study-row .study-swatch.dashed { border-top-style: dashed; }
    .study-row .study-checkbox {
      width: 14px; height: 14px; flex-shrink: 0;
      border: 1px solid var(--text-dim); border-radius: 2px;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; line-height: 1; color: var(--accent);
    }
    .study-row.checked .study-checkbox { background: var(--accent); border-color: var(--accent); }
    .study-row.checked .study-checkbox::before { content: '\2713'; color: #131313; font-size: 10px; font-weight: 700; }
    .study-row.indeterminate .study-checkbox { background: var(--accent); border-color: var(--accent); }
    .study-row.indeterminate .study-checkbox::before { content: '\2212'; color: #131313; font-size: 10px; font-weight: 700; }
    .study-row .study-label { flex: 1; white-space: nowrap; }

    /* --- Chart container — KLineChart fills it entirely --- */
    #chart { flex: 1; position: relative; min-height: 0; }
  </style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-section">
    <div class="dropdown" id="symbolDropdown">
      <div class="dropdown-btn sym" id="symbolBtn">---</div>
      <div class="dropdown-list" id="symbolList"></div>
    </div>
    <div class="dropdown" id="intervalDropdown">
      <div class="dropdown-btn" id="intervalBtn">1m</div>
      <div class="dropdown-list" id="intervalList"></div>
    </div>
    <input type="date" class="date-input" id="dateInput" title="Trading date">
  </div>

  <div class="toolbar-section" style="flex:1"></div>

  <div class="toolbar-section">
    <div class="dropdown" id="studiesDropdown">
      <div class="dropdown-btn" id="studiesBtn">Studies</div>
      <div class="dropdown-list right" id="studiesList">
        <div class="studies-panel" id="studiesPanel"></div>
      </div>
    </div>
    <div class="seg-ctrl" id="mktExtCtrl"></div>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
    </div>
  </div>
</div>

<div id="chart"></div>

<script>
// ============================================================================
// Colors + constants
// ============================================================================
const C = {
  bg:'#131313', grid:'rgba(255,255,255,0.03)', text:'#787b86', textHi:'#d1d4dc',
  border:'#2a2a2a',
  candleUp:'#4CAF50', candleDown:'#EF5350',
  hmaUp:'#01FFFF', hmaDown:'#FF66FE',
  macdValue:'#01FFFF', macdSignal:'#F8E9A6',
  priorClose:'#FF66FE', priorHigh:'#4CAF50', priorLow:'#F44336', orLevel:'#4CAF50',
};
const MARKET_OPEN_H = 9, MARKET_OPEN_M = 30;

// ============================================================================
// Custom indicator: Hull Moving Average with directional color.
// Two figures (up, down). Bar contributes to the figure matching its slope,
// the other field is null. Transition bars are included in both so the line
// doesn't break visibly.
// ============================================================================
function wma(values, length) {
  if (values.length < length) return null;
  let num = 0, denom = 0;
  for (let i = 0; i < length; i++) {
    const w = length - i;
    num += values[values.length - 1 - i] * w;
    denom += w;
  }
  return num / denom;
}

function calcHmaSeries(closes, length) {
  const halfLen = Math.round(length / 2);
  const sqrtLen = Math.round(Math.sqrt(length));
  const diff = new Array(closes.length).fill(null);
  const hma = new Array(closes.length).fill(null);
  for (let i = 0; i < closes.length; i++) {
    const sliceHalf = closes.slice(Math.max(0, i + 1 - halfLen), i + 1);
    const sliceFull = closes.slice(Math.max(0, i + 1 - length), i + 1);
    const wh = sliceHalf.length >= halfLen ? wma(sliceHalf, halfLen) : null;
    const wf = sliceFull.length >= length  ? wma(sliceFull, length)  : null;
    diff[i] = (wh != null && wf != null) ? 2 * wh - wf : null;
  }
  for (let i = 0; i < closes.length; i++) {
    const sliceDiff = [];
    for (let j = Math.max(0, i + 1 - sqrtLen); j <= i; j++) {
      if (diff[j] != null) sliceDiff.push(diff[j]);
    }
    hma[i] = sliceDiff.length >= sqrtLen ? wma(sliceDiff, sqrtLen) : null;
  }
  return hma;
}

klinecharts.registerIndicator({
  name: 'HMA',
  shortName: 'HMA',
  series: 'price',
  precision: 2,
  calcParams: [20],
  figures: [
    { key: 'up',   title: 'HMA: ', type: 'line', styles: () => ({ color: C.hmaUp,   size: 1 }) },
    { key: 'down', title: '',      type: 'line', styles: () => ({ color: C.hmaDown, size: 1 }) },
  ],
  calc: (kLineDataList, { calcParams }) => {
    const closes = kLineDataList.map(k => k.close);
    const hma = calcHmaSeries(closes, calcParams[0]);
    const out = new Array(kLineDataList.length);
    for (let i = 0; i < kLineDataList.length; i++) {
      const v = hma[i], prev = hma[i - 1];
      if (v == null || prev == null) { out[i] = { up: null, down: null }; continue; }
      // Rising bar: contributes to 'up'. Falling: 'down'. Also seed the
      // current value into the previous direction's figure if there's a
      // direction change, so the polyline crosses cleanly at the transition.
      const rising = v >= prev;
      const prevRising = hma[i - 2] != null ? prev >= hma[i - 2] : rising;
      out[i] = {
        up:   rising  ? v : (prevRising  ? v : null),
        down: !rising ? v : (!prevRising ? v : null),
      };
    }
    return out;
  },
});

// ============================================================================
// Chart
// ============================================================================
const chart = klinecharts.init('chart', {
  styles: {
    grid: {
      show: true,
      horizontal: { color: C.grid },
      vertical: { color: C.grid },
    },
    candle: {
      type: 'candle_solid',
      bar: {
        upColor: C.candleUp, downColor: C.candleDown,
        noChangeColor: '#888',
        upBorderColor: C.candleUp, downBorderColor: C.candleDown,
        upWickColor: C.candleUp, downWickColor: C.candleDown,
      },
      priceMark: {
        last: { show: false },
        high: { show: false },
        low: { show: false },
      },
      tooltip: {
        showRule: 'always',
        showType: 'standard',
        custom: [
          { title: 'O', value: '{open}' },
          { title: 'H', value: '{high}' },
          { title: 'L', value: '{low}' },
          { title: 'C', value: '{close}' },
        ],
        text: { color: C.textHi, family: 'monospace', size: 11 },
        title: { color: C.text, family: 'monospace', size: 10, weight: 'normal' },
      },
    },
    indicator: {
      tooltip: { showRule: 'always', showName: true, showParams: true },
      lines: [{ size: 1 }],
    },
    crosshair: {
      show: true,
      horizontal: {
        line: { color: C.border, style: 'dashed' },
        text: { color: C.textHi, backgroundColor: C.border },
      },
      vertical: {
        line: { color: C.border, style: 'dashed' },
        text: { color: C.textHi, backgroundColor: C.border },
      },
    },
    xAxis: {
      axisLine: { color: C.border },
      tickText: { color: C.text },
      tickLine: { color: C.border },
    },
    yAxis: {
      axisLine: { color: C.border },
      tickText: { color: C.text },
      tickLine: { color: C.border },
      position: 'left',
      inside: false,
    },
    separator: { color: C.border, size: 1 },
    overlay: {
      text: { color: C.textHi, family: 'monospace', size: 10 },
    },
  },
});

// Indicator pane IDs returned by createIndicator — we hold them so toggles
// can remove the right pane.
const indicatorPanes = {};

// ============================================================================
// Studies registry
// kind:  'simple' or 'group'
// place: 'overlay' (lives on main candle pane) | 'subPane' (own sub-pane below)
// ============================================================================
const STUDIES = {
  hma: {
    kind: 'simple', place: 'overlay', label: 'Hull MA (20)',
    swatch: { color: C.hmaUp, style: 'solid' },
    enable: () => {
      if (indicatorPanes.hma) return;
      indicatorPanes.hma = chart.createIndicator({ name: 'HMA', calcParams: [20] }, true, { id: 'candle_pane' });
    },
    disable: () => {
      if (!indicatorPanes.hma) return;
      chart.removeIndicator(indicatorPanes.hma, 'HMA');
      delete indicatorPanes.hma;
    },
  },
  macd: {
    kind: 'simple', place: 'subPane', label: 'MACD (12,26,9)',
    swatch: { color: C.macdValue, style: 'solid' },
    enable: () => {
      if (indicatorPanes.macd) return;
      indicatorPanes.macd = chart.createIndicator('MACD', false);
    },
    disable: () => {
      if (!indicatorPanes.macd) return;
      chart.removeIndicator(indicatorPanes.macd, 'MACD');
      delete indicatorPanes.macd;
    },
  },
  priorOHLC: {
    kind: 'group', place: 'overlay', label: 'Prior Day OHLC',
    children: {
      priorClose: { label: 'Prior Close', swatch: { color: C.priorClose, style: 'dotted' } },
      priorHigh:  { label: 'Prior Hi',    swatch: { color: C.priorHigh,  style: 'dotted' } },
      priorLow:   { label: 'Prior Lo',    swatch: { color: C.priorLow,   style: 'dotted' } },
    },
  },
  openingRange: {
    kind: 'group', place: 'overlay', label: 'Opening Range',
    children: {
      or5:  { label: '5m OR',  swatch: { color: C.orLevel, style: 'solid'  } },
      or15: { label: '15m OR', swatch: { color: C.orLevel, style: 'dashed' } },
      or30: { label: '30m OR', swatch: { color: C.orLevel, style: 'dotted' } },
    },
  },
};

const studyState = {
  hma: true, macd: true,
  priorOHLC: true, priorClose: true, priorHigh: true, priorLow: true,
  openingRange: true, or5: true, or15: true, or30: true,
};

// ============================================================================
// Level overlays — built-in priceLine overlay for prior-day + opening-range.
// Entries are held so toggles can recreate them.
// ============================================================================
const levels = {};  // id -> { entries, overlayIds, parentKey, childKey }

function lkcStyle(s) {
  if (s === 'dotted' || s === 'dot') return 'dotted';
  if (s === 'dashed' || s === 'dash') return 'dashed';
  return 'solid';
}

function createLevelOverlay(entry) {
  return chart.createOverlay({
    name: 'priceLine',
    points: [{ value: entry.price }],
    extendData: entry.label,
    styles: {
      line: { color: entry.color, style: lkcStyle(entry.lineStyle), size: 1 },
      text: { color: entry.color, backgroundColor: 'transparent', borderColor: 'transparent', size: 10, family: 'monospace' },
    },
  });
}

function registerLevel(id, entries, parentKey, childKey) {
  if (levels[id]) return;
  levels[id] = { entries, overlayIds: [], parentKey, childKey };
  applyLevelVisibility(id);
}

function isLevelVisible(id) {
  const lv = levels[id];
  if (!lv) return false;
  if (lv.parentKey == null) return true;  // live levels from Redis
  return studyState[lv.parentKey] && studyState[lv.childKey];
}

function applyLevelVisibility(id) {
  const lv = levels[id];
  if (!lv) return;
  lv.overlayIds.forEach(oid => { try { chart.removeOverlay(oid); } catch (e) {} });
  lv.overlayIds = [];
  if (isLevelVisible(id)) {
    lv.overlayIds = lv.entries.map(e => createLevelOverlay(e));
  }
}

function clearAllLevels() {
  Object.keys(levels).forEach(id => {
    levels[id].overlayIds.forEach(oid => { try { chart.removeOverlay(oid); } catch (e) {} });
    delete levels[id];
  });
}

// ============================================================================
// Studies panel rendering + toggle wiring
// ============================================================================
function isGroupIndeterminate(groupKey) {
  const study = STUDIES[groupKey];
  if (!study || !study.children) return false;
  const states = Object.keys(study.children).map(k => studyState[k]);
  const allOn = states.every(Boolean);
  const allOff = states.every(s => !s);
  return !allOn && !allOff;
}

function swatchHtml(swatch) {
  if (!swatch) return '<span class="study-swatch" style="border-color:transparent"></span>';
  const cls = swatch.style === 'dotted' ? 'dotted' : swatch.style === 'dashed' ? 'dashed' : '';
  return `<span class="study-swatch ${cls}" style="border-color:${swatch.color}"></span>`;
}
function rowClass(key, indet) {
  if (indet) return 'indeterminate';
  return studyState[key] ? 'checked' : '';
}

function renderStudiesPanel() {
  const panel = document.getElementById('studiesPanel');
  if (!panel) return;
  const out = [];

  function renderStudy(key) {
    const s = STUDIES[key];
    if (s.kind === 'simple') {
      out.push(`
        <div class="study-row ${rowClass(key)}" data-study="${key}">
          <span class="study-checkbox"></span>${swatchHtml(s.swatch)}<span class="study-label">${s.label}</span>
        </div>`);
    } else if (s.kind === 'group') {
      const indet = isGroupIndeterminate(key);
      out.push(`
        <div class="study-row group ${rowClass(key, indet)}" data-study="${key}">
          <span class="study-checkbox"></span><span class="study-label">${s.label}</span>
        </div>`);
      Object.keys(s.children).forEach(ck => {
        const c = s.children[ck];
        out.push(`
          <div class="study-row child ${rowClass(ck)}" data-study="${ck}">
            <span class="study-checkbox"></span>${swatchHtml(c.swatch)}<span class="study-label">${c.label}</span>
          </div>`);
      });
    }
  }

  out.push(`<div class="studies-section-header">Overlays</div>`);
  Object.keys(STUDIES).filter(k => STUDIES[k].place === 'overlay').forEach(renderStudy);
  out.push(`<div class="studies-section-header">Sub-pane studies</div>`);
  Object.keys(STUDIES).filter(k => STUDIES[k].place === 'subPane').forEach(renderStudy);

  panel.innerHTML = out.join('');
}

function applyStudyState() {
  ['hma', 'macd'].forEach(k => {
    const s = STUDIES[k];
    if (!s) return;
    if (studyState[k]) s.enable(); else s.disable();
  });
  Object.keys(levels).forEach(id => applyLevelVisibility(id));
  renderStudiesPanel();
}

// Toggle handler on the panel (not document) — same lesson as TT-147.
document.getElementById('studiesPanel').addEventListener('click', (e) => {
  const row = e.target.closest('.study-row');
  if (!row) return;
  const key = row.dataset.study;
  if (!key || !(key in studyState)) return;
  studyState[key] = !studyState[key];
  applyStudyState();
});

// ============================================================================
// MKT / EXT toggle
// ============================================================================
let hasMarketHours = true;
let lastCandles = [];

function computeBounds(candles) {
  if (candles.length && hasMarketHours) {
    const d = new Date(candles[0].timestamp);
    const y = d.getUTCFullYear(), mo = d.getUTCMonth(), day = d.getUTCDate();
    const open = Date.UTC(y, mo, day, 8, 30);
    const close = Date.UTC(y, mo, day, 16, 30);
    const anyInMarket = candles.some(c => c.timestamp >= open && c.timestamp <= close);
    if (!anyInMarket) hasMarketHours = false;
  }
}

function toggleMarketHours() { hasMarketHours = !hasMarketHours; computeBounds(lastCandles); renderControls(); chart.resize(); }
window.toggleMarketHours = toggleMarketHours;

function renderControls() {
  const seg = document.getElementById('mktExtCtrl');
  seg.innerHTML = `
    <button class="seg-btn ${hasMarketHours ? 'active' : ''}" onclick="toggleMarketHours()">MKT</button>
    <button class="seg-btn ${hasMarketHours ? '' : 'active'}" onclick="toggleMarketHours()">EXT</button>`;
}

// ============================================================================
// Opening range
// ============================================================================
const OR_WINDOWS = [
  { min:5,  id:'or5',  label:'5m',  style:'solid'  },
  { min:15, id:'or15', label:'15m', style:'dashed' },
  { min:30, id:'or30', label:'30m', style:'dotted' },
];
const orState = {};
function initOR() { OR_WINDOWS.forEach(w => { orState[w.min] = { high:null, low:null, locked:false }; }); }

function processCandleOR(candle) {
  const d = new Date(candle.timestamp);
  const h = d.getUTCHours(), m = d.getUTCMinutes();
  const minSinceOpen = (h - MARKET_OPEN_H) * 60 + (m - MARKET_OPEN_M);
  if (minSinceOpen < 0) return;
  OR_WINDOWS.forEach(w => {
    const st = orState[w.min];
    if (!st || st.locked) return;
    if (minSinceOpen >= w.min) {
      st.locked = true;
      if (st.high !== null) {
        registerLevel(w.id, [
          { price:st.high, label:`${w.label} Hi`, color:C.orLevel, lineStyle:w.style },
          { price:st.low,  label:`${w.label} Lo`, color:C.orLevel, lineStyle:w.style },
        ], 'openingRange', w.id);
        renderStudiesPanel();
      }
      return;
    }
    if (st.high === null || candle.high > st.high) st.high = candle.high;
    if (st.low === null || candle.low < st.low) st.low = candle.low;
  });
}

// ============================================================================
// WebSocket — converts server's epoch-seconds to KLineChart's milliseconds.
// Ignores server-pre-computed HMA/MACD; KLineChart computes natively.
// ============================================================================
let ws = null;
let intentionalClose = false;
function setStatus(state) { document.getElementById('statusDot').className = 'status-dot ' + state; }

const INTERVALS = [
  { value:'m', label:'1m' }, { value:'5m', label:'5m' },
  { value:'15m', label:'15m' }, { value:'30m', label:'30m' },
  { value:'1h', label:'1h' }, { value:'1d', label:'1d' },
];
let currentSymbol = 'SPX';
let currentInterval = 'm';

function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { symbol: p.get('symbol') || 'SPX', interval: p.get('interval') || 'm' };
}

function initDropdown(btnId, listId, onSelect) {
  const btn = document.getElementById(btnId);
  const list = document.getElementById(listId);
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    document.querySelectorAll('.dropdown-list.open').forEach(el => {
      if (el.id !== listId) el.classList.remove('open');
    });
    list.classList.toggle('open');
  });
  list.addEventListener('click', (e) => {
    const item = e.target.closest('.dropdown-item');
    if (!item) return;
    onSelect(item.dataset.value);
    list.classList.remove('open');
  });
}

function populateIntervals() {
  const list = document.getElementById('intervalList');
  list.innerHTML = INTERVALS.map(i =>
    `<div class="dropdown-item ${i.value === currentInterval ? 'active' : ''}" data-value="${i.value}">${i.label}</div>`
  ).join('');
}

async function populateSymbols() {
  try {
    const resp = await fetch('/api/symbols');
    const data = await resp.json();
    const list = document.getElementById('symbolList');
    list.innerHTML = (data.symbols || []).map(s =>
      `<div class="dropdown-item ${s === currentSymbol ? 'active' : ''}" data-value="${s}">${s}</div>`
    ).join('');
  } catch (e) { /* unavailable */ }
}

document.addEventListener('click', () => {
  document.querySelectorAll('.dropdown-list.open').forEach(el => el.classList.remove('open'));
});

initDropdown('symbolBtn', 'symbolList', (sym) => {
  currentSymbol = sym;
  const p = new URLSearchParams(window.location.search);
  p.set('symbol', sym); p.set('interval', currentInterval);
  history.replaceState(null, '', '?' + p.toString());
  document.getElementById('symbolBtn').textContent = sym;
  connect();
});
initDropdown('intervalBtn', 'intervalList', (intv) => {
  currentInterval = intv;
  const label = INTERVALS.find(i => i.value === intv)?.label || intv;
  const p = new URLSearchParams(window.location.search);
  p.set('symbol', currentSymbol); p.set('interval', intv);
  history.replaceState(null, '', '?' + p.toString());
  document.getElementById('intervalBtn').textContent = label;
  connect();
});

// Studies dropdown — clicks inside the list don't bubble out (which would
// close the dropdown), but the panel's own click listener catches row clicks.
(function () {
  const btn = document.getElementById('studiesBtn');
  const list = document.getElementById('studiesList');
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    document.querySelectorAll('.dropdown-list.open').forEach(el => {
      if (el.id !== 'studiesList') el.classList.remove('open');
    });
    list.classList.toggle('open');
  });
  list.addEventListener('click', (e) => e.stopPropagation());
})();

let connectTimer = null;
function connect(dateOverride) {
  if (connectTimer) clearTimeout(connectTimer);
  connectTimer = setTimeout(() => doConnect(dateOverride), 100);
}

function toKlineBar(c) {
  return {
    timestamp: c.time * 1000,
    open: c.open, high: c.high, low: c.low, close: c.close,
    volume: c.volume || 0,
  };
}

function doConnect(dateOverride) {
  setStatus('connecting');
  intentionalClose = true;
  const { symbol, interval } = getParams();
  currentSymbol = symbol; currentInterval = interval;
  document.getElementById('symbolBtn').textContent = symbol;
  document.getElementById('intervalBtn').textContent = INTERVALS.find(i => i.value === interval)?.label || interval;
  populateIntervals();

  if (ws) { try { ws.close(); } catch (e) {} ws = null; }

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  let url = `${proto}//${location.host}/ws?symbol=${symbol}&interval=${interval}`;
  if (dateOverride) url += `&date=${dateOverride}`;
  ws = new WebSocket(url);

  ws.onopen = () => { intentionalClose = false; setStatus('connected'); };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    if (msg.type === 'error') { setStatus('disconnected'); return; }

    if (msg.type === 'init') {
      clearAllLevels();
      initOR();
      if (msg.date) document.getElementById('dateInput').value = msg.date;

      const bars = (msg.candles || []).map(toKlineBar);
      lastCandles = bars;
      chart.applyNewData(bars);

      computeBounds(bars);
      if (hasMarketHours) bars.forEach(b => processCandleOR(b));

      if (msg.dailyCandle) {
        const dc = msg.dailyCandle;
        if (dc.close != null) registerLevel('priorClose', [{ price:dc.close, label:'Prior Close', color:C.priorClose, lineStyle:'dotted' }], 'priorOHLC', 'priorClose');
        if (dc.high  != null) registerLevel('priorHigh',  [{ price:dc.high,  label:'Prior Hi',    color:C.priorHigh,  lineStyle:'dotted' }], 'priorOHLC', 'priorHigh');
        if (dc.low   != null) registerLevel('priorLow',   [{ price:dc.low,   label:'Prior Lo',    color:C.priorLow,   lineStyle:'dotted' }], 'priorOHLC', 'priorLow');
      }

      // applyStudyState registers HMA + MACD indicators and reconciles all level overlays
      // with current studyState.
      applyStudyState();
      renderControls();
      return;
    }

    if (msg.type === 'update') {
      const bar = toKlineBar(msg.candle);
      chart.updateData(bar);
      if (lastCandles.length && lastCandles[lastCandles.length - 1].timestamp === bar.timestamp) {
        lastCandles[lastCandles.length - 1] = bar;
      } else {
        lastCandles.push(bar);
      }
      processCandleOR(bar);
      // Indicators recompute automatically — KLineChart re-runs registered calc()
      // over the dataset on every updateData(). No manual indicator update needed.
      return;
    }

    if (msg.type === 'level') {
      const id = (msg.label||'').replace(/\s+/g,'').toLowerCase() || `lv_${Date.now()}`;
      registerLevel(id, [{ price:msg.price, label:msg.label, color:msg.color, lineStyle:msg.lineStyle }], null, null);
      return;
    }
  };

  ws.onclose = () => {
    if (intentionalClose) return;
    setStatus('disconnected');
    setTimeout(() => connect(), 3000);
  };
  ws.onerror = () => setStatus('disconnected');
}

document.getElementById('dateInput').addEventListener('change', (e) => {
  if (e.isTrusted && e.target.value) connect(e.target.value);
});

window.addEventListener('resize', () => chart.resize());

renderStudiesPanel();
renderControls();
populateSymbols();
populateIntervals();
connect();
</script>
</body>
</html>
