services:
  tastytrade-sdk-dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      target: final
      args:
        USERNAME: developer
        USER_UID: 1000
        USER_GID: 1000
    container_name: tastytrade-sdk-devcontainer
    volumes:
      - ..:/workspace:cached
      - ~/.gitconfig:/home/developer/.gitconfig-host:ro
      - ~/.ssh:/home/developer/.ssh:ro
      # Persist uv cache between container rebuilds
      - uv-cache:/home/developer/.cache/uv
      # Share full Claude config directory (plugins, marketplaces, credentials)
      - ~/.claude:/home/developer/.claude
      - ~/.claude.json:/home/developer/.claude.json
      # Docker-from-Docker: mount host Docker socket
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ../.env
    environment:
      # Host home directory for Claude plugin path compatibility
      HOST_HOME: "${HOME}"
    working_dir: /workspace
    command: /bin/bash
    stdin_open: true
    tty: true
    user: developer
    network_mode: host

volumes:
  uv-cache:
